<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CQP Toulouse">
<meta name="description" content="Annonces des habitants des quartiers populaires de Toulouse.">
<meta property="og:title" content="Annonces — CQP Toulouse">
<meta property="og:image" content="https://kwiid31.github.io/cqp-toulouse/icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Annonces — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rouge:#C8102E;--rouge-light:#fff0f2;--or:#E8940F;
  --txt:#1A1A1A;--txt2:#555;--txt3:#999;
  --bg:#FFFFFF;--bg2:#F7F8FA;--bg3:#F0F2F5;
  --border:#E4E6EA;--radius:12px;--nav-h:60px;--bar-h:64px;
}
html{font-size:16px}
body{background:var(--bg2);color:var(--txt);font-family:'Barlow',sans-serif;
  padding-bottom:calc(var(--bar-h) + env(safe-area-inset-bottom) + 8px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:center;gap:12px;padding:0 16px;
  box-shadow:0 1px 4px rgba(0,0,0,.06)}
.back-btn{width:36px;height:36px;border:none;background:var(--bg2);border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.back-btn svg{width:20px;height:20px;stroke:var(--txt2);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.5px;flex:1}
.topbar-pill{background:var(--rouge);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem;letter-spacing:2px;padding:4px 10px;border-radius:20px}

/* PAGE HERO */
.page-hero{background:linear-gradient(135deg,#0d0d0d,var(--rouge));
  padding:32px 16px 24px;color:#fff}
.page-hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:4px;
  text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.page-hero h2{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1}
.page-hero p{font-size:.85rem;color:rgba(255,255,255,.6);margin-top:6px}

/* GRID */
.content{max-width:900px;margin:0 auto;padding:16px}
.actus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* CARD */
.actu-card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  overflow:hidden;cursor:pointer;transition:box-shadow .2s;display:flex;flex-direction:column}
.actu-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
.actu-cover{height:160px;display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;position:relative;overflow:hidden}
.actu-cover::before{content:'';position:absolute;inset:0;opacity:.9}
.actu-cover-bg1::before{background:linear-gradient(160deg,#1a0508,#5a0b18 50%,var(--rouge))}
.actu-cover-bg2::before{background:linear-gradient(160deg,#0a1520,#0a3a6a 50%,#1a5acc)}
.actu-cover-bg3::before{background:linear-gradient(160deg,#0a1a0e,#1a4a24 50%,#2a7a3a)}
.actu-cover-bg4::before{background:linear-gradient(160deg,#1a0a1a,#4a0a6a 50%,#8a2acc)}
.actu-cover-cat{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.6);position:relative;z-index:1;margin-bottom:4px}
.actu-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#fff;
  line-height:1.15;position:relative;z-index:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actu-body{padding:12px 14px 8px;flex:1}
.actu-excerpt{font-size:.85rem;color:var(--txt2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actu-footer{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;
  letter-spacing:.5px;color:var(--txt3)}

/* SOCIAL */
.card-actions{display:flex;padding:4px 8px;border-top:1px solid var(--bg2);gap:2px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 4px;border:none;background:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--txt2);
  transition:background .15s}
.action-btn:hover{background:var(--bg2)}
.action-btn.liked{color:var(--rouge)}
.action-btn .h{font-size:1rem;transition:transform .15s;display:inline-block}
.action-btn.pop .h{transform:scale(1.5)}
.action-sep{width:1px;height:26px;background:var(--border);flex-shrink:0;align-self:center}

/* MINI DRAWER */
.mini-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600}
.mini-overlay.open{display:block}
.mini-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:3px solid var(--rouge);border-radius:20px 20px 0 0;z-index:601;
  max-height:75vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.mini-drawer.open{transform:none}
.mini-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.mini-head{padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bg2);flex-shrink:0}
.mini-head h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.5px}
.mini-body{overflow-y:auto;padding:12px 16px;flex:1}
.mini-foot{padding:12px 16px;border-top:1px solid var(--bg2);display:flex;flex-direction:column;gap:8px;flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cmt-item{display:flex;gap:10px;margin-bottom:12px}
.cmt-av{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--rouge);
  display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#fff}
.cmt-bubble{background:var(--bg2);border-radius:0 10px 10px 10px;padding:8px 12px;flex:1}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1px;
  text-transform:uppercase;color:var(--rouge);margin-bottom:3px;font-weight:700}
.cmt-text{font-size:.85rem;color:var(--txt);line-height:1.5}
input.cmt-input{background:var(--bg2);border:1px solid var(--border);border-radius:24px;
  padding:10px 16px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;
  outline:none;width:100%;transition:border .15s}
input.cmt-input:focus{border-color:var(--rouge)}
.cmt-send-row{display:flex;gap:8px}
.cmt-send-btn{background:var(--rouge);border:none;color:#fff;width:42px;height:42px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;
  stroke-linecap:round;stroke-linejoin:round}

/* DRAWER ACTU */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;
  display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);
  padding:16px;display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;flex:1;line-height:1.2}
.drawer-close-btn{width:32px;height:32px;border:1px solid var(--border);background:none;
  border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.drawer-body{padding:16px;flex:1}
.drawer-text{font-size:.92rem;color:var(--txt2);line-height:1.9;white-space:pre-wrap}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;
  border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.06);
  display:flex;align-items:stretch;height:var(--bar-h);
  padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;
  font-size:.52rem;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;padding:8px 0}
.nav-item.active{color:var(--rouge)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.nav-publish{width:52px;height:52px;border-radius:50%;background:var(--rouge);color:#fff;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(200,16,46,.45);margin-top:-14px;flex-shrink:0;gap:1px;
  font-family:'Barlow Condensed',sans-serif}
.nav-publish-icon{font-size:1.4rem;line-height:1}
.nav-publish-lbl{font-size:.42rem;letter-spacing:1.5px;text-transform:uppercase}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;flex-shrink:0}

/* SPINNER / EMPTY */
.spinner{text-align:center;padding:48px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3)}

/* REVEAL */
.reveal-card{opacity:0;transform:translateY(12px);transition:opacity .3s ease,transform .3s ease}
.reveal-card.revealed{opacity:1;transform:none}
@keyframes ripple{to{transform:scale(2.5);opacity:0}}

@media(min-width:701px){.bottom-nav{display:none}body{padding-bottom:0}}

.filters{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;color:var(--txt2);white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.filter-btn.active{background:var(--rouge);color:#fff;border-color:var(--rouge)}
.ann-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.ann-card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);padding:16px;cursor:pointer;transition:box-shadow .2s}
.ann-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
.ann-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.ann-cat{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:var(--bg2);color:var(--txt2);padding:3px 8px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}
.ann-fresh{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:1px;padding:3px 8px;border-radius:20px}
.fresh-new{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.fresh-recent{background:#fefce8;color:#ca8a04;border:1px solid #fde68a}
.ann-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;color:var(--txt);line-height:1.3;margin-bottom:5px}
.ann-desc{font-size:.83rem;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.ann-meta{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--txt3);flex-wrap:wrap}
.ann-contact-btn{margin-left:auto;background:var(--rouge-light);color:var(--rouge);border:1px solid rgba(200,16,46,.2);padding:5px 12px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;flex-shrink:0}
.ann-contact-btn:hover{background:var(--rouge);color:#fff}
/* Drawer annonce */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:16px;display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;flex:1;line-height:1.2}
.drawer-close-btn{width:32px;height:32px;border:1px solid var(--border);background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.drawer-body{padding:16px;flex:1}
.contact-box{background:var(--bg2);border-radius:10px;padding:16px;margin-top:16px}
.contact-box h4{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;margin-bottom:12px}
.contact-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid var(--border);text-decoration:none;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.5px;margin-bottom:8px;transition:all .15s}
.contact-item:hover{border-color:var(--rouge);background:var(--rouge-light)}
/* Formulaire déposer */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Barlow',sans-serif;font-size:.9rem;color:var(--txt);outline:none;transition:border .15s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--rouge)}
.form-group textarea{resize:vertical;min-height:80px}
.btn-submit{width:100%;background:var(--rouge);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.form-msg{text-align:center;padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;border-radius:6px;display:none}
.form-msg.ok{background:#f0fdf4;color:#16a34a;display:block}
.form-msg.err{background:var(--rouge-light);color:var(--rouge);display:block}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="back-btn"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:var(--txt2);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg></a>
  <h1>Annonces</h1>
  <span class="topbar-pill" id="count-pill">…</span>
</header>
<div class="page-hero" style="background:linear-gradient(135deg,#0a1a0e,#2E7D32)">
  <div class="page-hero-tag">Logement · Emploi · Solidarité</div>
  <h2>Annonces des habitants</h2>
  <p>Les habitants des quartiers s'entraident directement.</p>
</div>
<div class="content">
  <button style="width:100%;padding:12px;background:var(--rouge);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:14px" onclick="document.getElementById('form-depot').style.display=document.getElementById('form-depot').style.display==='none'?'block':'none'">
    📋 Déposer une annonce
  </button>
  <div id="form-depot" style="display:none;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px">
    <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;margin-bottom:12px">Déposer une annonce</h3>
    <div class="form-group"><label>Titre *</label><input type="text" id="dep-titre" placeholder="Ex: Cherche coloc Mirail"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Catégorie</label><select id="dep-cat"><option>Logement</option><option>Emploi</option><option>Solidarité</option><option>Service</option><option>Autre</option></select></div>
      <div class="form-group"><label>Quartier *</label><input type="text" id="dep-quartier" placeholder="Mirail…"></div>
    </div>
    <div class="form-group"><label>Description *</label><textarea id="dep-desc" rows="3" placeholder="Décrivez votre annonce…"></textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Prénom *</label><input type="text" id="dep-prenom"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="dep-email"></div>
    </div>
    <div class="form-group"><label>Téléphone</label><input type="tel" id="dep-tel" placeholder="06 xx xx xx xx"></div>
    <button class="btn-submit" onclick="submitDepot()">Envoyer l'annonce</button>
    <div class="form-msg" id="dep-msg"></div>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="Tous" onclick="filterBy('Tous',this)">Tous</button>
    <button class="filter-btn" data-cat="Logement" onclick="filterBy('Logement',this)">🏠 Logement</button>
    <button class="filter-btn" data-cat="Emploi" onclick="filterBy('Emploi',this)">💼 Emploi</button>
    <button class="filter-btn" data-cat="Solidarité" onclick="filterBy('Solidarité',this)">🤝 Solidarité</button>
    <button class="filter-btn" data-cat="Service" onclick="filterBy('Service',this)">🔧 Service</button>
    <button class="filter-btn" data-cat="Autre" onclick="filterBy('Autre',this)">📌 Autre</button>
  </div>
  <div class="ann-grid" id="ann-grid"><div class="spinner">Chargement…</div></div>
</div>
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Accueil</span></a>
  <a href="actus.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg><span>Actus</span></a>
  <div class="nav-middle"><button class="nav-publish" onclick="window.location='index.html'"><span class="nav-publish-icon">+</span><span class="nav-publish-lbl">Publier</span></button></div>
  <a href="evenements.html" class="nav-item"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Évts</span></a>
  <a href="annonces.html" class="nav-item active"><svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Annonces</span></a>
</nav>
<!-- Drawer détail annonce -->
<div class="drawer-overlay" id="dr-ann" onclick="if(event.target===this)closeDrAnn()">
  <div class="drawer">
    <div class="drawer-head"><div style="flex:1"><div style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px" id="dr-ann-cat"></div><h3 id="dr-ann-titre"></h3><div style="font-size:.78rem;color:var(--txt3);margin-top:4px" id="dr-ann-meta"></div></div><button class="drawer-close-btn" onclick="closeDrAnn()">✕</button></div>
    <div class="drawer-body">
      <p style="font-size:.9rem;color:var(--txt2);line-height:1.8;margin-bottom:16px" id="dr-ann-desc"></p>
      <div class="contact-box">
        <h4>Contacter</h4>
        <a id="dr-ann-email" href="#" class="contact-item">📧 <span id="dr-ann-email-txt"></span></a>
        <a id="dr-ann-tel" href="#" class="contact-item" style="display:none">📞 <span id="dr-ann-tel-txt"></span></a>
      </div>
    </div>
  </div>
</div>
<!-- Mini drawer commentaires -->
<div class="mini-overlay" id="mini-ov" onclick="closeMini()"></div>
<div class="mini-drawer" id="mini-drawer">
  <div class="mini-drag"></div>
  <div class="mini-head"><h4 id="mini-title">Commentaires</h4><button style="border:none;background:none;color:var(--txt3);font-size:1.1rem;cursor:pointer" onclick="closeMini()">✕</button></div>
  <div class="mini-body" id="mini-body"></div>
  <div class="mini-foot"><input class="cmt-input" id="mini-prenom" placeholder="Votre prénom"><div style="display:flex;gap:8px"><input class="cmt-input" id="mini-msg" placeholder="Votre commentaire…" onkeydown="if(event.key==='Enter')sendCmt()" style="flex:1"><button class="cmt-send-btn" onclick="sendCmt()"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div></div>
</div>
<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co',SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function getSid(){try{let s=sessionStorage.getItem('sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);sessionStorage.setItem('sid',s);}return s;}catch{return 'x'+Math.random().toString(36).slice(2);}}
function savePrenomLocal(v){try{if(v.trim())localStorage.setItem('cqp_prenom',v.trim());}catch{}}
function timeAgo(d){const diff=(Date.now()-new Date(d))/1000;if(diff<60)return'À l\'instant';if(diff<3600)return`Il y a ${Math.floor(diff/60)} min`;if(diff<86400)return`Il y a ${Math.floor(diff/3600)} h`;return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function freshnessLabel(d){const h=(Date.now()-new Date(d))/3600000;if(h<24)return'<span class="ann-fresh fresh-new">🟢 Nouvelle</span>';if(h<72)return'<span class="ann-fresh fresh-recent">🟡 Récente</span>';return'';}
let allAnn=[],currentCat='Tous';
async function load(){
  try{
    const{data,error}=await sb.from('annonces').select('*').eq('validee',true).order('date_depot',{ascending:false});
    if(error)throw error;allAnn=data||[];
    document.getElementById('count-pill').textContent=allAnn.length+' annonce'+(allAnn.length>1?'s':'');
    render();
  }catch(e){document.getElementById('ann-grid').innerHTML=`<div class="empty-state">Erreur: ${e.message}</div>`;}
}
function filterBy(cat,btn){currentCat=cat;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function render(){
  const g=document.getElementById('ann-grid');
  const filtered=currentCat==='Tous'?allAnn:allAnn.filter(a=>a.categorie===currentCat);
  if(!filtered.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1">Aucune annonce dans cette catégorie.</div>';return;}
  g.innerHTML=filtered.map(a=>`<article class="ann-card reveal-card" id="card-${a.id}" onclick="openAnn(${a.id})">
    <div class="ann-header"><span class="ann-cat">${esc(a.categorie)}</span>${freshnessLabel(a.date_depot)}</div>
    <div class="ann-title">${esc(a.titre)}</div>
    <div class="ann-desc">${esc(a.description).substring(0,140)}${a.description.length>140?'…':''}</div>
    <div class="ann-meta">
      <span>📍 ${esc(a.quartier)}</span><span>👤 ${esc(a.prenom)}</span><span>${timeAgo(a.date_depot)}</span>
      <button class="ann-contact-btn" onclick="event.stopPropagation();openAnn(${a.id})">Contacter →</button>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="action-btn" id="lk-${a.id}" onclick="toggleLike(${a.id})"><span class="h">🤍</span><span id="lc-${a.id}">0</span> J'aime</button>
      <div class="action-sep"></div>
      <button class="action-btn" onclick="openMini(${a.id},'${esc(a.titre).substring(0,28).replace(/'/g,"\\'")}')">💬 <span id="cc-${a.id}">0</span> Commenter</button>
    </div>
  </article>`).join('');
  loadAllCounts(filtered.map(a=>a.id));
  const obs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}})},{threshold:.05});
  document.querySelectorAll('.reveal-card').forEach(el=>obs.observe(el));
}
function openAnn(id){
  const a=allAnn.find(x=>x.id===id);if(!a)return;
  document.getElementById('dr-ann-cat').textContent=a.categorie;
  document.getElementById('dr-ann-titre').textContent=a.titre;
  document.getElementById('dr-ann-meta').textContent='📍 '+a.quartier+' · 👤 '+a.prenom;
  document.getElementById('dr-ann-desc').textContent=a.description;
  document.getElementById('dr-ann-email-txt').textContent=a.email;
  document.getElementById('dr-ann-email').href='mailto:'+a.email;
  const telEl=document.getElementById('dr-ann-tel');
  if(a.telephone){telEl.style.display='flex';document.getElementById('dr-ann-tel-txt').textContent=a.telephone;telEl.href='tel:'+a.telephone;}
  else{telEl.style.display='none';}
  document.getElementById('dr-ann').classList.add('open');document.body.style.overflow='hidden';
}
function closeDrAnn(){document.getElementById('dr-ann').classList.remove('open');document.body.style.overflow='';}
async function loadAllCounts(ids){
  const sid=getSid();
  try{
    const[{data:lk},{data:my},{data:cm}]=await Promise.all([sb.from('likes').select('item_id').eq('item_type','annonce').in('item_id',ids),sb.from('likes').select('item_id').eq('item_type','annonce').eq('session_id',sid).in('item_id',ids),sb.from('commentaires').select('item_id').eq('item_type','annonce').eq('visible',true).in('item_id',ids)]);
    const lm={},mm={},cm2={};(lk||[]).forEach(r=>{lm[r.item_id]=(lm[r.item_id]||0)+1;});(my||[]).forEach(r=>{mm[r.item_id]=true;});(cm||[]).forEach(r=>{cm2[r.item_id]=(cm2[r.item_id]||0)+1;});
    ids.forEach(id=>{const liked=!!mm[id];const btn=document.getElementById('lk-'+id);if(btn){btn.classList.toggle('liked',liked);btn.querySelector('.h').textContent=liked?'❤️':'🤍';}const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=lm[id]||0;const cc=document.getElementById('cc-'+id);if(cc)cc.textContent=cm2[id]||0;});
  }catch{}
}
async function toggleLike(id){
  const sid=getSid();const btn=document.getElementById('lk-'+id);if(!btn)return;const liked=btn.classList.contains('liked');btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);
  if(liked){await sb.from('likes').delete().eq('item_type','annonce').eq('item_id',id).eq('session_id',sid);btn.classList.remove('liked');btn.querySelector('.h').textContent='🤍';}
  else{(()=>{try{sb.from(\'likes\').insert({item_type:'annonce',item_id:id,session_id:sid});}catch{}})();btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';}
  const{data:l}=await sb.from('likes').select('item_id').eq('item_type','annonce').eq('item_id',id);
  const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=(l||[]).length;
}
let miniId=null;
function openMini(id,titre){miniId=id;document.getElementById('mini-title').textContent='💬 '+titre;document.getElementById('mini-ov').classList.add('open');document.getElementById('mini-drawer').classList.add('open');document.body.style.overflow='hidden';try{const p=localStorage.getItem('cqp_prenom');if(p)document.getElementById('mini-prenom').value=p;}catch{}refreshCmts();}
function closeMini(){document.getElementById('mini-ov').classList.remove('open');document.getElementById('mini-drawer').classList.remove('open');document.body.style.overflow='';miniId=null;}
async function refreshCmts(){if(!miniId)return;const{data}=await sb.from('commentaires').select('*').eq('item_type','annonce').eq('item_id',miniId).eq('visible',true).order('created_at',{ascending:true});const list=data||[];const cc=document.getElementById('cc-'+miniId);if(cc)cc.textContent=list.length;const box=document.getElementById('mini-body');if(!box)return;box.innerHTML=list.length?list.map(c=>`<div class="cmt-item"><div class="cmt-av">${esc(c.prenom[0]).toUpperCase()}</div><div class="cmt-bubble"><div class="cmt-name">${esc(c.prenom)}</div><div class="cmt-text">${esc(c.message)}</div></div></div>`).join(''):'<p style="color:var(--txt3);text-align:center;padding:24px">Soyez le premier !</p>';box.scrollTop=box.scrollHeight;}
async function sendCmt(){const msg=document.getElementById('mini-msg')?.value.trim();const prenom=document.getElementById('mini-prenom')?.value.trim()||'Anonyme';if(!msg||!miniId)return;savePrenomLocal(prenom);document.getElementById('mini-msg').value='';await sb.from('commentaires').insert({item_type:'annonce',item_id:miniId,prenom,message:msg});refreshCmts();}
async function submitDepot(){
  const titre=document.getElementById('dep-titre')?.value.trim();const cat=document.getElementById('dep-cat')?.value;const quartier=document.getElementById('dep-quartier')?.value.trim();const desc=document.getElementById('dep-desc')?.value.trim();const prenom=document.getElementById('dep-prenom')?.value.trim();const email=document.getElementById('dep-email')?.value.trim();const tel=document.getElementById('dep-tel')?.value.trim();const msg=document.getElementById('dep-msg');
  if(!titre||!quartier||!desc||!prenom||!email){if(msg){msg.textContent='⚠ Champs obligatoires manquants.';msg.className='form-msg err';}return;}
  const{error}=await sb.from('annonces').insert({titre,categorie:cat,quartier,description:desc,prenom,email,telephone:tel||null,validee:false});
  if(error){if(msg){msg.textContent='⚠ '+error.message;msg.className='form-msg err';}}
  else{if(msg){msg.textContent='✅ Annonce envoyée ! Publication sous 24–48h.';msg.className='form-msg ok';}setTimeout(()=>{document.getElementById('form-depot').style.display='none';['dep-titre','dep-quartier','dep-desc','dep-prenom','dep-email','dep-tel'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';})},3000);}
}
load();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/cqp-toulouse/sw.js').catch(()=>{});
</script>
</body></html>
