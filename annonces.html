<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#42B72A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Annonces — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rouge:#C8102E;--green:#2E7D32;--green-light:#f0fdf4;--green2:#42B72A;
  --txt:#050505;--txt2:#65676B;--txt3:#8A8D91;
  --bg:#F0F2F5;--bg2:#fff;--bg3:#E4E6EB;--border:#CED0D4;
  --shadow:0 1px 2px rgba(0,0,0,.1);--radius:8px;--nav-h:56px;
}
html,body{font-size:15px;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;}
body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 4px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;outline:none}

.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--shadow)}
.back-btn{width:38px;height:38px;border:none;background:var(--bg3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn svg{width:20px;height:20px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.5px;flex:1}
.topbar-count{background:var(--green);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:2px;padding:4px 10px;border-radius:20px}
.topbar-post{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase}

.page-hero{background:linear-gradient(135deg,#061008 0%,#1a4a1f 60%,var(--green) 100%);
  padding:28px 16px 24px;color:#fff;position:relative;overflow:hidden}
.page-hero::after{content:'';position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,.05)"/></svg>')}
.hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;position:relative;z-index:1}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;position:relative;z-index:1}
.hero-sub{font-size:.83rem;color:rgba(255,255,255,.6);margin-top:6px;position:relative;z-index:1}
.hero-cta{margin-top:16px;position:relative;z-index:1}
.hero-cta button{background:#fff;color:var(--green);border:none;padding:12px 24px;border-radius:24px;
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}

.filter-wrap{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none;position:sticky;top:var(--nav-h);z-index:190}
.filter-wrap::-webkit-scrollbar{display:none}
.filter-btn{border:none;background:none;padding:12px 14px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s}
.filter-btn.active{color:var(--green);border-bottom-color:var(--green)}

.ann-wrap{max-width:680px;margin:0 auto;padding:8px 0}

.ann-card{background:#fff;margin:0 0 8px;overflow:hidden;opacity:0;transform:translateY(12px);transition:opacity .35s,transform .35s}
.ann-card.revealed{opacity:1;transform:none}
@media(min-width:600px){.ann-card{border-radius:var(--radius);margin:0 8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.15)}}

.ac-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.ac-av{width:42px;height:42px;min-width:42px;border-radius:50%;background:var(--green);
  display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff}
.ac-meta{flex:1;min-width:0}
.ac-src{font-family:'Barlow',sans-serif;font-weight:600;font-size:.92rem;color:var(--txt)}
.ac-ts{font-size:.75rem;color:var(--txt3)}
.ac-badge{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:var(--green);color:#fff;white-space:nowrap;flex-shrink:0}

.ac-body{padding:12px 14px 8px}
.ac-title{font-family:'Barlow',sans-serif;font-weight:600;font-size:.96rem;line-height:1.35;color:var(--txt);margin-bottom:5px}
.ac-desc{font-size:.86rem;color:var(--txt2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ac-tags{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
.ac-tag{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;letter-spacing:1px;text-transform:uppercase;background:var(--bg3);color:var(--txt2);padding:3px 9px;border-radius:20px}
.fresh-new{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;background:var(--green-light);color:#16a34a;border:1px solid #bbf7d0;padding:3px 8px;border-radius:20px}
.fresh-rec{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;background:#fefce8;color:#ca8a04;border:1px solid #fde68a;padding:3px 8px;border-radius:20px}

.ac-contact-btn{margin:6px 14px 12px;padding:11px;background:var(--green-light);border:1.5px solid #bbf7d0;border-radius:8px;
  width:calc(100% - 28px);color:var(--green);font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;text-align:center}
.ac-contact-btn:active{opacity:.8}

.ac-stats{display:flex;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--bg3);font-size:.77rem;color:var(--txt3)}
.ac-actions{display:flex;align-items:center;padding:2px 6px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border:none;background:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:600;color:var(--txt2);transition:background .15s}
.act-btn:hover,.act-btn:active{background:var(--bg3)}
.act-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-btn.liked{color:var(--rouge)}
.act-btn.liked svg{stroke:var(--rouge);fill:var(--rouge)}
.act-sep{width:1px;height:24px;background:var(--bg3)}

.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;
  display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:var(--green);padding:18px 16px;
  display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;flex:1;line-height:1.2;color:#fff;letter-spacing:.5px}
.dh-close{width:30px;height:30px;background:rgba(255,255,255,.2);border:none;border-radius:50%;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.drawer-body{padding:20px;flex:1}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.73rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border .15s;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green)}
.btn-submit{width:100%;padding:14px;background:var(--green);border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;margin-top:8px}
.btn-submit:active{opacity:.85}
.form-msg{margin-top:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:1px}

.spinner{text-align:center;padding:36px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px}
@keyframes pul{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-state p{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:1px;text-transform:uppercase}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;transition:color .15s;text-decoration:none;padding:6px 0}
.nav-item.active,.nav-item:hover{color:var(--green)}
.nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{stroke:var(--green)}
.nav-pub{width:48px;height:48px;border-radius:50%;background:var(--rouge);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(200,16,46,.45);margin-top:-12px;flex-shrink:0}
.nav-pub svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;flex-shrink:0}
@media(min-width:700px){.bottom-nav{display:none}body{padding-bottom:0}}
</style>
<body>
<header class="topbar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">Annonces</span>
  <span class="topbar-count" id="ann-count">…</span>
  <button class="topbar-post" onclick="openDepot()">+ Déposer</button>
</header>

<div class="page-hero">
  <div class="hero-tag">CQP Toulouse</div>
  <h2 class="hero-title">Annonces</h2>
  <p class="hero-sub">Petites annonces des habitants des quartiers populaires</p>
  <div class="hero-cta"><button onclick="openDepot()">📋 Déposer une annonce</button></div>
</div>

<div class="filter-wrap">
  <button class="filter-btn active" onclick="filterAnn('',this)">Toutes</button>
  <button class="filter-btn" onclick="filterAnn('Logement',this)">Logement</button>
  <button class="filter-btn" onclick="filterAnn('Emploi',this)">Emploi</button>
  <button class="filter-btn" onclick="filterAnn('Solidarité',this)">Solidarité</button>
  <button class="filter-btn" onclick="filterAnn('Service',this)">Services</button>
  <button class="filter-btn" onclick="filterAnn('Autre',this)">Autres</button>
</div>

<main class="ann-wrap">
  <div class="spinner" id="spinner">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px">
      <div style="width:8px;height:8px;background:var(--green);border-radius:50%;animation:pul 1.2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--green);border-radius:50%;animation:pul 1.2s .2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--green);border-radius:50%;animation:pul 1.2s .4s infinite"></div>
    </div>
  </div>
  <div id="ann-list"></div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil</a>
  <a class="nav-item" href="actus.html"><svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Actus</a>
  <div class="nav-middle"><a href="index.html" class="nav-pub"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a></div>
  <a class="nav-item" href="evenements.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Évts</a>
  <a class="nav-item active" href="annonces.html"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Annonces</a>
</nav>

<!-- DRAWER DÉPÔT -->
<div class="drawer-overlay" id="dr-depot" onclick="if(event.target===this)closeDr()">
  <div class="drawer">
    <div class="drawer-head">
      <h3>📋 Déposer une annonce</h3>
      <button class="dh-close" onclick="closeDr()">✕</button>
    </div>
    <div class="drawer-body">
      <p style="font-size:.85rem;color:var(--txt2);margin-bottom:16px;line-height:1.7">Votre annonce sera publiée après validation (24–48h).</p>
      <div class="form-group"><label>Titre *</label><input type="text" id="dep-titre" placeholder="Ex: Cherche colocation Mirail"></div>
      <div class="form-group"><label>Catégorie *</label><select id="dep-cat"><option>Logement</option><option>Emploi</option><option>Solidarité</option><option>Service</option><option>Autre</option></select></div>
      <div class="form-group"><label>Quartier *</label><input type="text" id="dep-quartier" placeholder="Mirail, Bellefontaine…"></div>
      <div class="form-group"><label>Description *</label><textarea id="dep-desc" rows="4" placeholder="Décrivez votre annonce…"></textarea></div>
      <div class="form-group"><label>Votre prénom *</label><input type="text" id="dep-prenom" placeholder="Marie"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="dep-email" placeholder="marie@exemple.fr"></div>
      <div class="form-group"><label>Téléphone</label><input type="tel" id="dep-tel" placeholder="06 xx xx xx xx"></div>
      <button class="btn-submit" onclick="submitDepot()">Déposer l'annonce</button>
      <div class="form-msg" id="dep-msg"></div>
    </div>
  </div>
</div>

<!-- DRAWER CONTACT ANNONCEUR -->
<div class="drawer-overlay" id="dr-contact" onclick="if(event.target===this)closeContact()">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="ct-ann-titre">Contacter</h3>
      <button class="dh-close" onclick="closeContact()">✕</button>
    </div>
    <div class="drawer-body">
      <div style="background:var(--green-light);border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:.85rem;color:var(--green)">
        Votre message sera transmis à l'annonceur par email.
      </div>
      <div class="form-group"><label>Votre prénom *</label><input type="text" id="ct-prenom" placeholder="Karim"></div>
      <div class="form-group"><label>Votre email *</label><input type="email" id="ct-email" placeholder="karim@exemple.fr"></div>
      <div class="form-group"><label>Message *</label><textarea id="ct-msg" rows="5" placeholder="Votre message…"></textarea></div>
      <button class="btn-submit" onclick="submitContact()">✉️ Envoyer le message</button>
      <div class="form-msg" id="ct-result"></div>
    </div>
  </div>
</div>

<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function getSid(){try{let s=sessionStorage.getItem('sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);sessionStorage.setItem('sid',s);}return s;}catch{return 'x'+Math.random().toString(36).slice(2);}}
function timeAgo(d){const diff=(Date.now()-new Date(d))/1000;if(diff<60)return"À l'instant";if(diff<3600)return`Il y a ${Math.floor(diff/60)} min`;if(diff<86400)return`Il y a ${Math.floor(diff/3600)} h`;if(diff<604800)return`Il y a ${Math.floor(diff/86400)} j`;return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function freshnessLabel(d){const h=(Date.now()-new Date(d))/3600000;if(h<24)return'<span class="fresh-new">🟢 Nouvelle</span>';if(h<72)return'<span class="fresh-rec">🟡 Récente</span>';return'';}
function catColor(cat){const m={'Logement':'#1565C0','Emploi':'#7C3AED','Solidarité':'#C8102E','Service':'#E8940F'};return m[cat]||'#2E7D32';}

let allAnn=[],curAnnId=null;
async function loadAnn(){
  try{
    const{data}=await sb.from('annonces').select('*').eq('validee',true).order('date_depot',{ascending:false}).limit(60);
    allAnn=data||[];
    document.getElementById('ann-count').textContent=allAnn.length+' annonces';
    renderAnn(allAnn);
  }catch(e){document.getElementById('spinner').textContent='Erreur de chargement.';console.error(e);}
}
function filterAnn(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAnn(cat?allAnn.filter(a=>a.categorie===cat):allAnn);
}
function renderAnn(list){
  document.getElementById('spinner').style.display='none';
  const el=document.getElementById('ann-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><p>Aucune annonce dans cette catégorie</p></div>';return;}
  el.innerHTML=list.map(a=>{
    const initLetter=a.prenom?a.prenom[0].toUpperCase():'A';
    const cc=catColor(a.categorie);
    const titre=esc(a.titre||'');
    return `<article class="ann-card reveal-card" id="card-${a.id}">
      <div class="ac-head">
        <div class="ac-av" style="background:${cc}">${esc(initLetter)}</div>
        <div class="ac-meta">
          <div class="ac-src">${esc(a.prenom||'Anonyme')} · ${esc(a.quartier||'Toulouse')}</div>
          <div class="ac-ts">📋 ${timeAgo(a.date_depot)}</div>
        </div>
        <span class="ac-badge" style="background:${cc}">${esc(a.categorie||'Annonce')}</span>
      </div>
      <div class="ac-body">
        <div class="ac-title">${titre}</div>
        <div class="ac-desc">${esc((a.description||'').substring(0,200))}${(a.description||'').length>200?'…':''}</div>
        <div class="ac-tags"><span class="ac-tag">${esc(a.categorie||'Annonce')}</span>${freshnessLabel(a.date_depot)}</div>
      </div>
      <button class="ac-contact-btn" onclick="openContact(${a.id})">✉️ Contacter ${esc(a.prenom||"l'annonceur")}</button>
      <div class="ac-stats"><span id="sl-${a.id}">0 j'aime</span></div>
      <div class="ac-actions">
        <button class="act-btn" id="lk-${a.id}" onclick="toggleLike(${a.id})"><span class="h">👍</span> J'aime</button>
        <div class="act-sep"></div>
        <button class="act-btn" onclick="navigator.share?.({title:'${titre.substring(0,30)}',url:location.href})">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Partager
        </button>
      </div>
    </article>`;
  }).join('');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});},{threshold:.05});
  document.querySelectorAll('.reveal-card').forEach(el=>obs.observe(el));
  loadLikes(list.map(a=>a.id));
}
async function loadLikes(ids){
  if(!ids.length)return;
  const sid=getSid();
  try{
    const[{data:lk},{data:my}]=await Promise.all([
      sb.from('likes').select('item_id').eq('item_type','annonce').in('item_id',ids),
      sb.from('likes').select('item_id').eq('item_type','annonce').eq('session_id',sid).in('item_id',ids)
    ]);
    const lm={},mm={};
    (lk||[]).forEach(r=>{lm[r.item_id]=(lm[r.item_id]||0)+1;});
    (my||[]).forEach(r=>{mm[r.item_id]=true;});
    ids.forEach(id=>{
      const liked=!!mm[id];
      const btn=document.getElementById('lk-'+id);
      if(btn){btn.classList.toggle('liked',liked);btn.querySelector('.h').textContent=liked?'❤️':'👍';}
      const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(lm[id]||0)+" j'aime";
    });
  }catch{}
}
async function toggleLike(id){
  const sid=getSid(),btn=document.getElementById('lk-'+id);if(!btn)return;
  const liked=btn.classList.contains('liked');
  if(liked){await sb.from('likes').delete().eq('item_type','annonce').eq('item_id',id).eq('session_id',sid);btn.classList.remove('liked');btn.querySelector('.h').textContent='👍';}
  else{try{await sb.from('likes').insert({item_type:'annonce',item_id:id,session_id:sid});}catch{}btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';}
  const{data:l}=await sb.from('likes').select('item_id').eq('item_type','annonce').eq('item_id',id);
  const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(l||[]).length+" j'aime";
}
function openDepot(){document.getElementById('dr-depot').classList.add('open');document.body.style.overflow='hidden';}
function closeDr(){document.getElementById('dr-depot').classList.remove('open');document.body.style.overflow='';}
function openContact(id){
  curAnnId=id;
  const a=allAnn.find(x=>x.id===id);
  document.getElementById('ct-ann-titre').textContent='✉️ Contacter '+(a?.prenom||"l'annonceur");
  document.getElementById('dr-contact').classList.add('open');document.body.style.overflow='hidden';
}
function closeContact(){document.getElementById('dr-contact').classList.remove('open');document.body.style.overflow='';curAnnId=null;}
async function submitDepot(){
  const titre=document.getElementById('dep-titre').value.trim();
  const cat=document.getElementById('dep-cat').value;
  const quartier=document.getElementById('dep-quartier').value.trim();
  const desc=document.getElementById('dep-desc').value.trim();
  const prenom=document.getElementById('dep-prenom').value.trim();
  const email=document.getElementById('dep-email').value.trim();
  const tel=document.getElementById('dep-tel').value.trim();
  const msg=document.getElementById('dep-msg');
  if(!titre||!quartier||!desc||!prenom||!email){msg.textContent='Champs obligatoires manquants.';msg.style.color='var(--rouge)';return;}
  try{
    await sb.from('annonces').insert({titre,categorie:cat,quartier,description:desc,prenom,email,tel:tel||null,validee:false});
    msg.textContent='✅ Annonce envoyée — validation sous 24–48h !';msg.style.color='var(--green)';
    setTimeout(closeDr,2000);
  }catch(e){msg.textContent="Erreur lors de l'envoi.";msg.style.color='var(--rouge)';console.error(e);}
}
async function submitContact(){
  const ann=allAnn.find(x=>x.id===curAnnId);
  const prenom=document.getElementById('ct-prenom').value.trim();
  const email=document.getElementById('ct-email').value.trim();
  const msg=document.getElementById('ct-msg').value.trim();
  const res=document.getElementById('ct-result');
  if(!prenom||!email||!msg){res.textContent='Champs obligatoires manquants.';res.style.color='var(--rouge)';return;}
  try{
    await sb.from('contacts').insert({prenom,email,sujet:'Contact annonce: '+(ann?.titre||''),message:msg,annonce_id:curAnnId});
    res.textContent='✅ Message envoyé !';res.style.color='var(--green)';
    setTimeout(closeContact,2000);
  }catch(e){res.textContent="Erreur lors de l'envoi.";res.style.color='var(--rouge)';console.error(e);}
}
loadAnn();
</script>
