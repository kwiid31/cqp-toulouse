<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Annonces – CQP Toulouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/core.js"></script>
<style>
:root{--red:#C8102E;--green:#059669;--bg:#F7F8FA;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-tap-highlight-color:transparent;}

.topbar{background:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topbar-back{color:var(--muted);text-decoration:none;display:flex;align-items:center;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.5px;}
.topbar-count{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-left:auto;}
.topbar-deposer{background:var(--green);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}

/* Filter chips */
.filters{padding:12px 12px 4px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;text-transform:uppercase;letter-spacing:.3px;}
.chip.active{background:var(--red);border-color:var(--red);color:#fff;}

.list{padding:12px 12px 4px;}
.card{background:#fff;border-radius:var(--r);box-shadow:0 3px 14px rgba(0,0,0,.07);padding:14px;margin-bottom:18px;border-left:4px solid transparent;opacity:0;transform:translateY(18px) scale(.97);transition:opacity .35s ease,transform .35s cubic-bezier(.22,.61,.36,1);}
.card.visible{opacity:1;transform:none;}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.card-cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:1.38rem;font-weight:700;line-height:1.2;margin-bottom:3px;}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;color:#fff;}
.badge-cat{color:#fff;}
.card-quartier{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:3px;}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-left:auto;}
.card-desc{font-size:.85rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:6px;}
.card-footer{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid #f5f5f5;margin-top:8px;}
.btn-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.92rem;color:var(--muted);padding:8px 12px;min-height:44px;border-radius:20px;transition:all .18s;}
.btn-act:hover{background:var(--bg);}
.btn-act.liked{color:var(--red);}
.btn-act svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-act.liked svg{fill:var(--red);stroke:var(--red);}
.btn-contact{margin-left:auto;background:var(--green);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty p{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;}

/* Modal Déposer */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:auto;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;}
.modal-bg.open .modal-sheet{transform:none;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 0;}
.modal-head{padding:14px 16px 12px;display:flex;align-items:center;border-bottom:1px solid #f0f0f0;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;flex:1;}
.modal-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.form-body{padding:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:5px;}
.inp{width:100%;padding:11px 12px;border:1.5px solid #eee;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--red);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px;cursor:pointer;margin-top:4px;}
.btn-primary:disabled{opacity:.5;cursor:default;}
.success-msg{text-align:center;padding:24px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;color:#059669;display:none;}

/* Comment drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:#fff;border-radius:20px 20px 0 0;z-index:301;transform:translateY(100%);transition:transform .3s;overflow:hidden;display:flex;flex-direction:column;}
.drawer.open{transform:none;}
.drawer-handle-bar{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 4px;}
.drawer-head{padding:10px 16px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;}
.drawer-head-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;flex:1;}
.drawer-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.drawer-body{overflow-y:auto;flex:1;padding:0 16px;}
.cmt-item{padding:9px 0;border-bottom:1px solid #f8f8f8;}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--red);}
.cmt-msg{font-size:.85rem;margin-top:2px;line-height:1.4;}
.cmt-time{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-top:2px;}
.cmt-form{padding:12px 16px 20px;border-top:1px solid #f0f0f0;background:#fff;}
.btn-send{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;cursor:pointer;}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px 8px;z-index:100;height:64px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.65rem;text-decoration:none;padding:8px 4px 0;flex:1;}
.bnav-item.active{color:var(--red);}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.bnav-fab-wrap{flex:0 0 64px;display:flex;justify-content:center;align-items:flex-end;padding-bottom:4px;}
.bnav-fab{width:52px;height:52px;background:var(--red);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(200,16,46,.4);margin-bottom:10px;}
.bnav-fab svg{width:26px;height:26px;fill:#fff;stroke:none;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Annonces</div>
  <span class="topbar-count" id="count-label"></span>
  <button class="topbar-deposer" onclick="openDeposer()">+ Déposer</button>
  <a href="admin.html" style="color:var(--muted);display:flex;align-items:center;" title="Admin">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
  </a>
</header>

<div class="filters">
  <button class="chip active" onclick="filterBy('', this)">Toutes</button>
  <button class="chip" onclick="filterBy('Logement', this)">🏠 Logement</button>
  <button class="chip" onclick="filterBy('Emploi', this)">💼 Emploi</button>
  <button class="chip" onclick="filterBy('Solidarité', this)">🤝 Solidarité</button>
  <button class="chip" onclick="filterBy('Service', this)">🔧 Service</button>
  <button class="chip" onclick="filterBy('Autre', this)">📌 Autre</button>
</div>

<div class="list" id="list">
  <div class="loading">Chargement…</div>
</div>

<!-- Modal Déposer -->
<div class="modal-bg" id="deposer-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title">Déposer une annonce</div>
      <button class="modal-close" onclick="closeDeposer()">✕</button>
    </div>
    <div class="form-body" id="deposer-form">
      <div class="field">
        <label>Titre *</label>
        <input class="inp" id="da-titre" placeholder="Ex : Cherche colocation Mirail" maxlength="120">
      </div>
      <div class="row2">
        <div class="field">
          <label>Catégorie *</label>
          <select class="inp" id="da-cat">
            <option value="">— Choisir —</option>
            <option>Logement</option>
            <option>Emploi</option>
            <option>Solidarité</option>
            <option>Service</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="field">
          <label>Quartier *</label>
          <input class="inp" id="da-quartier" placeholder="Mirail, Izards…" maxlength="80">
        </div>
      </div>
      <div class="field">
        <label>Description *</label>
        <textarea class="inp" id="da-desc" rows="3" placeholder="Décrivez votre annonce…" maxlength="1000" style="resize:vertical"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Prénom *</label>
          <input class="inp" id="da-prenom" placeholder="Prénom" maxlength="50">
        </div>
        <div class="field">
          <label>Téléphone</label>
          <input class="inp" id="da-tel" placeholder="06…" maxlength="20">
        </div>
      </div>
      <div class="field">
        <label>Email *</label>
        <input class="inp" id="da-email" type="email" placeholder="contact@example.com" maxlength="150">
      </div>
      <button class="btn-primary" id="deposer-btn" onclick="submitDeposer()">Publier l'annonce</button>
    </div>
    <div class="success-msg" id="deposer-success">
      ✅ Annonce déposée !<br>Elle sera visible après validation par l'équipe CQP.
    </div>
  </div>
</div>

<!-- Comments Drawer -->
<div class="drawer-overlay" id="cmt-overlay" onclick="closeCmt()"></div>
<div class="drawer" id="cmt-drawer">
  <div class="drawer-handle-bar"></div>
  <div class="drawer-head">
    <div class="drawer-head-title" id="cmt-title">Commentaires</div>
    <button class="drawer-close" onclick="closeCmt()">✕</button>
  </div>
  <div class="drawer-body" id="cmt-list"></div>
  <div class="cmt-form">
    <input class="inp" id="cmt-name" placeholder="Votre prénom" maxlength="40" style="margin-bottom:8px">
    <input class="inp" id="cmt-text" placeholder="Votre commentaire…" maxlength="500" style="margin-bottom:8px">
    <button class="btn-send" onclick="sendCmt()">Envoyer</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <a href="index.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
  </a>
  <a href="actus.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
    <span>Actus</span>
  </a>
  <div class="bnav-fab-wrap">
    <button class="bnav-fab" onclick="openDeposer()" aria-label="Déposer">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
  <a href="evenements.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Évts</span>
  </a>
  <a href="annonces.html" class="bnav-item active">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Annonces</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
var allAnnonces = [];
var displayedAnnonces = [];
var likedSet = {};
var cmtTarget = null;
var currentFilter = '';

var CAT_COLORS = {Logement:'#f59e0b',Emploi:'#3b82f6',Solidarité:'#8b5cf6',Service:'#10b981',Autre:'#6b7280'};
var CAT_ICONS = {Logement:'🏠',Emploi:'💼',Solidarité:'🤝',Service:'🔧',Autre:'📌'};

function load() {
  document.getElementById('list').innerHTML = buildSkeletons(3, false);
  sb.from('annonces').select('*').eq('validee', true).order('date_depot', {ascending: false}).then(function(res) {
    if (res.error) { document.getElementById('list').innerHTML = '<div class="loading">Erreur de chargement</div>'; return; }
    allAnnonces = res.data || [];
    filterBy(currentFilter, null);
  });
}

function filterBy(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  displayedAnnonces = cat ? allAnnonces.filter(function(a){ return a.categorie === cat; }) : allAnnonces;
  document.getElementById('count-label').textContent = displayedAnnonces.length + ' annonce' + (displayedAnnonces.length > 1 ? 's' : '');
  renderList();
  loadCounts();
}

function renderList() {
  var el = document.getElementById('list');
  if (!displayedAnnonces.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Aucune annonce dans cette catégorie</p></div>';
    return;
  }
  el.innerHTML = displayedAnnonces.map(function(a) {
    var color = CAT_COLORS[a.categorie] || '#6b7280';
    var icon = CAT_ICONS[a.categorie] || '📌';
    var title=a.titre&&a.titre===a.titre.toUpperCase()?a.titre.toLowerCase().split(' ').map(function(w,i){return i===0||!['et','de','du','des','le','la','les','un','une','à','au','aux','en','sur','pour','par','avec','dans'].includes(w)?w.charAt(0).toUpperCase()+w.slice(1):w;}).join(' '):a.titre;
    return '<div class="card" id="card-'+a.id+'" style="border-left-color:'+color+'">' +
      '<div class="card-top">' +
        '<div class="card-cat-icon" style="background:'+color+'22">'+icon+'</div>' +
        '<div class="card-info">' +
          '<div class="card-title">'+esc(title)+'</div>' +
          '<div class="card-meta">' +
            '<span class="badge" style="background:'+color+'">'+esc(a.categorie||'')+'</span>' +
            '<span class="card-quartier"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>'+esc(a.quartier||'')+'</span>' +
            '<span class="card-date">'+timeAgo(a.date_depot)+'</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-desc">'+esc(a.description||'')+'</div>' +
      '<div class="card-footer">' +
        '<button class="btn-act" id="like-'+a.id+'" onclick="toggleLike('+a.id+')">' +
          '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
          '<span id="lc-'+a.id+'">0</span>' +
        '</button>' +
        '<button class="btn-act" onclick="openCmt('+a.id+',\''+esc(a.titre)+'\')">' +
          '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<span id="cc-'+a.id+'">0</span>' +
        '</button>' +
        (a.email ? '<a class="btn-contact" href="mailto:'+esc(a.email)+'">Contacter</a>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  setTimeout(function() {
    document.querySelectorAll('.card').forEach(function(c, i) {
      setTimeout(function(){ c.classList.add('visible'); }, i * 60);
    });
  }, 50);
}

function loadCounts() {
  var ids = displayedAnnonces.map(function(a){ return a.id; });
  if (!ids.length) return;
  var sid = getSid();
  sb.from('likes').select('item_id').eq('item_type','annonce').in('item_id',ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id]=(counts[l.item_id]||0)+1; });
    Object.keys(counts).forEach(function(id){ animCount(document.getElementById('lc-'+id), counts[id]); });
  });
  sb.from('likes').select('item_id').eq('item_type','annonce').eq('session_id',sid).in('item_id',ids).then(function(res) {
    (res.data||[]).forEach(function(l){
      likedSet[l.item_id]=true;
      var btn=document.getElementById('like-'+l.item_id);
      if(btn) btn.classList.add('liked');
    });
  });
  sb.from('commentaires').select('item_id').eq('item_type','annonce').eq('visible',true).in('item_id',ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id]=(counts[l.item_id]||0)+1; });
    Object.keys(counts).forEach(function(id){ animCount(document.getElementById('cc-'+id), counts[id]); });
  });
}

function toggleLike(id) {
  var btn=document.getElementById('like-'+id);
  var cnt=document.getElementById('lc-'+id);
  var sid=getSid();
  if (navigator.vibrate) navigator.vibrate(40);
  if (btn) { btn.classList.remove('popping'); void btn.offsetWidth; btn.classList.add('popping'); setTimeout(function(){ btn.classList.remove('popping'); }, 400); }
  var wasLiked = !!likedSet[id];
  var prev = parseInt((cnt && cnt.textContent) || 0);
  likedSet[id] = !wasLiked;
  if (btn) wasLiked ? btn.classList.remove('liked') : btn.classList.add('liked');
  animCount(cnt, wasLiked ? Math.max(0, prev - 1) : prev + 1);
  if (wasLiked) {
    sb.from('likes').delete().eq('item_type','annonce').eq('item_id',id).eq('session_id',sid).then(function(r){
      if(r.error){likedSet[id]=true;if(btn)btn.classList.add('liked');animCount(cnt,prev);}
    });
  } else {
    sb.from('likes').insert({item_type:'annonce',item_id:id,session_id:sid}).then(function(r){
      if(r.error){likedSet[id]=false;if(btn)btn.classList.remove('liked');animCount(cnt,prev);}
    });
  }
}

function openCmt(id, titre) {
  cmtTarget={id:id};
  document.getElementById('cmt-title').textContent=titre;
  document.getElementById('cmt-overlay').classList.add('open');
  document.getElementById('cmt-drawer').classList.add('open');
  var saved=localStorage.getItem('cqp_prenom');
  if(saved) document.getElementById('cmt-name').value=saved;
  loadCmts(id);
}
function closeCmt() {
  document.getElementById('cmt-overlay').classList.remove('open');
  document.getElementById('cmt-drawer').classList.remove('open');
  cmtTarget=null;
}
function loadCmts(id) {
  sb.from('commentaires').select('*').eq('item_type','annonce').eq('item_id',id).eq('visible',true).order('created_at',{ascending:true}).then(function(res) {
    var el=document.getElementById('cmt-list');
    if(!res.data||!res.data.length){el.innerHTML='<div style="padding:16px;font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem;color:var(--muted)">Aucun commentaire</div>';return;}
    el.innerHTML=res.data.map(function(c){return '<div class="cmt-item"><div class="cmt-name">'+esc(c.prenom)+'</div><div class="cmt-msg">'+esc(c.message)+'</div><div class="cmt-time">'+timeAgo(c.created_at)+'</div></div>';}).join('');
  });
}
function sendCmt() {
  if(!cmtTarget) return;
  var name=document.getElementById('cmt-name').value.trim();
  var text=document.getElementById('cmt-text').value.trim();
  if(!name||!text){toast('Prénom et commentaire requis');return;}
  localStorage.setItem('cqp_prenom',name);
  var list=document.getElementById('cmt-list');
  var tempId='ctmp-'+Date.now();
  var tempEl=document.createElement('div');
  tempEl.className='cmt-item'; tempEl.id=tempId;
  tempEl.innerHTML='<div class="cmt-name">'+esc(name)+'</div><div class="cmt-msg">'+esc(text)+'</div><div class="cmt-time">à l\'instant</div>';
  if(!list.querySelector('.cmt-item')) list.innerHTML='';
  list.appendChild(tempEl);
  document.getElementById('cmt-text').value='';
  var cc=document.getElementById('cc-'+cmtTarget.id);
  animCount(cc, parseInt((cc&&cc.textContent)||0)+1);
  var savedTarget=cmtTarget.id;
  sb.from('commentaires').insert({item_type:'annonce',item_id:savedTarget,prenom:name,message:text,visible:true}).then(function(r){
    if(r.error){
      var te=document.getElementById(tempId); if(te) te.parentNode.removeChild(te);
      animCount(cc, Math.max(0,parseInt((cc&&cc.textContent)||0)-1));
      toast('Erreur: '+r.error.message,'err'); return;
    }
    toast('Commentaire publié ✓','ok');
    loadCmts(savedTarget);
  });
}

function openDeposer() {
  document.getElementById('deposer-modal').classList.add('open');
  document.getElementById('deposer-form').style.display='block';
  document.getElementById('deposer-success').style.display='none';
  document.getElementById('deposer-btn').disabled=false;
  document.getElementById('deposer-btn').textContent="Publier l'annonce";
  var saved=localStorage.getItem('cqp_prenom');
  if(saved) document.getElementById('da-prenom').value=saved;
}
function closeDeposer() {
  document.getElementById('deposer-modal').classList.remove('open');
}
function submitDeposer() {
  var titre=document.getElementById('da-titre').value.trim();
  var cat=document.getElementById('da-cat').value;
  var quartier=document.getElementById('da-quartier').value.trim();
  var desc=document.getElementById('da-desc').value.trim();
  var prenom=document.getElementById('da-prenom').value.trim();
  var email=document.getElementById('da-email').value.trim();
  if(!titre||!cat||!quartier||!desc||!prenom||!email){toast('Champs obligatoires manquants');return;}
  if(!/\S+@\S+\.\S+/.test(email)){toast('Email invalide');return;}
  var btn=document.getElementById('deposer-btn');
  btn.disabled=true;
  btn.textContent='Envoi…';
  localStorage.setItem('cqp_prenom',prenom);
  sb.from('annonces').insert({
    titre:titre,categorie:cat,quartier:quartier,description:desc,
    prenom:prenom,email:email,telephone:document.getElementById('da-tel').value.trim()||null,
    validee:false
  }).then(function(r){
    if(r.error){toast('Erreur: '+r.error.message);btn.disabled=false;btn.textContent="Publier l'annonce";return;}
    document.getElementById('deposer-form').style.display='none';
    document.getElementById('deposer-success').style.display='block';
  });
}

if(window.location.hash==='#deposer') openDeposer();
load();
trackPage();
</script>
