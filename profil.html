<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<title>Mon Profil — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--rouge:#C8102E;--green:#42B72A;--purple:#7C3AED;--txt:#050505;--txt2:#65676B;--txt3:#8A8D91;--bg:#F0F2F5;--bg3:#E4E6EB;--border:#CED0D4;--shadow:0 1px 2px rgba(0,0,0,.1);--r:10px;--nav:56px;}
html,body{font-size:15px;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;}
body{padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 8px);}
button,label{cursor:pointer;font-family:inherit;outline:none;border:none;}
.topbar{position:sticky;top:0;z-index:100;height:var(--nav);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:var(--shadow);}
.back-btn{width:36px;height:36px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;flex-shrink:0;}
.back-btn svg{width:20px;height:20px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.5px;flex:1;}
.profil-hero{background:#fff;padding:28px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.profil-av-wrap{position:relative;width:90px;height:90px;}
.profil-av{width:90px;height:90px;border-radius:50%;background:var(--rouge);border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;overflow:hidden;}
.profil-av img{width:100%;height:100%;object-fit:cover;}
.av-cam{position:absolute;bottom:0;right:0;width:30px;height:30px;background:var(--rouge);border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;}
.av-cam svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.av-cam input{display:none;}
.profil-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.5px;}
.profil-sub{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);}
.profil-bio{font-size:.88rem;color:var(--txt2);text-align:center;line-height:1.6;max-width:300px;}
.profil-stats{display:flex;gap:28px;margin-top:4px;}
.pstat{text-align:center;}
.pstat-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--rouge);}
.pstat-l{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);}
.section{background:#fff;margin-top:10px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.sec-head h3{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);font-weight:700;}
.sec-head svg{width:18px;height:18px;stroke:var(--txt3);fill:none;stroke-width:2;stroke-linecap:round;transition:transform .2s;}
.sec-head.open svg{transform:rotate(180deg);}
.sec-body{display:none;padding:0 16px 16px;flex-direction:column;gap:12px;}
.sec-body.open{display:flex;}
.fg label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border .15s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--rouge);}
.btn-save{width:100%;padding:13px;background:var(--rouge);border:none;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:2px;text-transform:uppercase;}
.save-msg{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:1px;min-height:16px;}
.sec-title{padding:14px 16px 8px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.5px;background:#fff;border-top:1px solid var(--border);}
.post-row{padding:12px 16px;border-bottom:1px solid var(--bg3);display:flex;gap:10px;align-items:flex-start;background:#fff;}
.post-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.post-txt{font-size:.88rem;color:var(--txt2);line-height:1.5;flex:1;}
.post-date{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:var(--txt3);margin-top:3px;}
.empty{padding:32px 16px;text-align:center;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;background:#fff;border-top:1px solid var(--border);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;height:var(--nav);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;padding:6px 0;}
.nav-item.active,.nav-item:hover{color:var(--rouge);}
.nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-center{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;flex-shrink:0;}
.nav-pub{width:50px;height:50px;border-radius:50%;background:var(--rouge);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(200,16,46,.4);margin-top:-14px;}
.nav-pub svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}
</style>
</head>
<body>
<header class="topbar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <span class="topbar-title">Mon Profil</span>
</header>
<div class="profil-hero">
  <div class="profil-av-wrap">
    <div class="profil-av" id="pav">?</div>
    <label class="av-cam"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><input type="file" id="av-file" accept="image/*" onchange="uploadAvatar(this)"></label>
  </div>
  <div class="profil-name" id="pnom">—</div>
  <div class="profil-sub" id="pquartier"></div>
  <div class="profil-bio" id="pbio"></div>
  <div class="profil-stats">
    <div class="pstat"><div class="pstat-n" id="ps-posts">0</div><div class="pstat-l">Posts</div></div>
    <div class="pstat"><div class="pstat-n" id="ps-stories">0</div><div class="pstat-l">Stories</div></div>
    <div class="pstat"><div class="pstat-n" id="ps-groupes">0</div><div class="pstat-l">Groupes</div></div>
  </div>
</div>
<div class="section">
  <div class="sec-head" onclick="this.classList.toggle('open');document.getElementById('eform').classList.toggle('open')">
    <h3>✏️ Modifier mon profil</h3>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="sec-body" id="eform">
    <div class="fg"><label>Prénom *</label><input type="text" id="e-prenom" placeholder="Votre prénom" maxlength="30"></div>
    <div class="fg"><label>Quartier</label>
      <select id="e-quartier">
        <option value="">— Votre quartier —</option>
        <option>Mirail</option><option>Bellefontaine</option><option>Reynerie</option><option>Bagatelle</option>
        <option>La Faourette</option><option>Empalot</option><option>Rangueil</option><option>Basso Cambo</option>
        <option>Borderouge</option><option>Izards</option><option>Sept Deniers</option><option>Autre</option>
      </select>
    </div>
    <div class="fg"><label>Bio</label><textarea id="e-bio" rows="2" placeholder="Quelques mots…" maxlength="160"></textarea></div>
    <button class="btn-save" onclick="saveProfil()">💾 Enregistrer</button>
    <div class="save-msg" id="smsg"></div>
  </div>
</div>
<div class="sec-title">📝 Mes publications</div>
<div id="mes-posts"><div class="empty">Chargement…</div></div>
<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil</a>
  <a class="nav-item" href="groupes.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Groupes</a>
  <div class="nav-center"><a href="index.html" class="nav-pub"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a></div>
  <a class="nav-item" href="actus.html"><svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>Actus</a>
  <a class="nav-item active" href="profil.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profil</a>
</nav>
<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co',SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};
const getSid=()=>{try{let s=sessionStorage.getItem('sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);sessionStorage.setItem('sid',s);}return s;}catch{return 'x'+Date.now();}};
const timeAgo=d=>{if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return"À l'instant";if(s<3600)return`Il y a ${Math.floor(s/60)} min`;if(s<86400)return`Il y a ${Math.floor(s/3600)} h`;return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});};
let _profil=null;
function renderAv(p){const av=document.getElementById('pav');if(p?.photo_url)av.innerHTML=`<img src="${esc(p.photo_url)}">`;else av.textContent=(p?.prenom||'?')[0].toUpperCase();}
async function loadProfil(){
  const sid=getSid();
  const{data}=await sb.from('profils').select('*').eq('session_id',sid).single().catch(()=>({data:null}));
  if(data){_profil=data;document.getElementById('pnom').textContent=data.prenom;document.getElementById('pquartier').textContent=data.quartier?'📍 '+data.quartier:'';document.getElementById('pbio').textContent=data.bio||'';document.getElementById('e-prenom').value=data.prenom||'';document.getElementById('e-quartier').value=data.quartier||'';document.getElementById('e-bio').value=data.bio||'';renderAv(data);}
  else{try{const p=localStorage.getItem('cqp_prenom');if(p)document.getElementById('e-prenom').value=p;}catch{}}
  const[{count:cp},{count:cs},{count:cg}]=await Promise.all([sb.from('posts').select('*',{count:'exact',head:true}).eq('session_id',sid),sb.from('stories').select('*',{count:'exact',head:true}).eq('session_id',sid),sb.from('groupe_membres').select('*',{count:'exact',head:true}).eq('session_id',sid)]);
  document.getElementById('ps-posts').textContent=cp||0;document.getElementById('ps-stories').textContent=cs||0;document.getElementById('ps-groupes').textContent=cg||0;
  const{data:posts}=await sb.from('posts').select('*').eq('session_id',sid).eq('visible',true).order('created_at',{ascending:false}).limit(20);
  const el=document.getElementById('mes-posts');
  if(!posts?.length){el.innerHTML='<div class="empty">Aucune publication pour l\'instant</div>';return;}
  el.innerHTML=posts.map(p=>`<div class="post-row">${p.photo_url?`<img class="post-thumb" src="${esc(p.photo_url)}" loading="lazy">`:'<div class="post-thumb"></div>'}<div style="flex:1"><div class="post-txt">${esc((p.contenu||'Photo').substring(0,120))}</div><div class="post-date">${timeAgo(p.created_at)}</div></div></div>`).join('');
}
async function saveProfil(){
  const prenom=document.getElementById('e-prenom').value.trim();const quartier=document.getElementById('e-quartier').value;const bio=document.getElementById('e-bio').value.trim();const msg=document.getElementById('smsg');
  if(!prenom){msg.textContent='Prénom obligatoire.';msg.style.color='var(--rouge)';return;}
  const{data,error}=await sb.from('profils').upsert({session_id:getSid(),prenom,quartier:quartier||null,bio:bio||null,photo_url:_profil?.photo_url||null,updated_at:new Date().toISOString()},{onConflict:'session_id'}).select().single();
  if(error){msg.textContent='Erreur.';msg.style.color='var(--rouge)';return;}
  _profil=data;try{localStorage.setItem('cqp_prenom',prenom);}catch{}
  document.getElementById('pnom').textContent=prenom;document.getElementById('pquartier').textContent=quartier?'📍 '+quartier:'';document.getElementById('pbio').textContent=bio;renderAv(data);
  msg.textContent='✅ Profil mis à jour !';msg.style.color='var(--green)';setTimeout(()=>msg.textContent='',3000);
}
async function uploadAvatar(inp){
  if(!inp.files[0])return;const f=inp.files[0];const name=`av-${getSid()}-${Date.now()}.${f.name.split('.').pop()||'jpg'}`;
  const{error}=await sb.storage.from('site-photos').upload(name,f,{contentType:f.type,upsert:true});
  if(error){alert('Erreur upload photo');return;}
  const url=sb.storage.from('site-photos').getPublicUrl(name).data.publicUrl;
  await sb.from('profils').upsert({session_id:getSid(),photo_url:url,prenom:_profil?.prenom||'Anonyme'},{onConflict:'session_id'});
  if(!_profil)_profil={};_profil.photo_url=url;
  document.getElementById('pav').innerHTML=`<img src="${url}">`;
}
loadProfil();
</script>
</body>
</html>
