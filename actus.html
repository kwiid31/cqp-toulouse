<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Actualités – CQP Toulouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--red:#C8102E;--bg:#F7F8FA;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-tap-highlight-color:transparent;}

.topbar{background:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topbar-back{color:var(--muted);text-decoration:none;display:flex;align-items:center;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--text);letter-spacing:.5px;}
.topbar-count{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-left:auto;}

.list{padding:12px;}
.card{background:#fff;border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:12px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;}
.card.visible{opacity:1;transform:none;}
.card-img{width:100%;height:190px;object-fit:cover;}
.card-body{padding:12px 14px 8px;}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;background:var(--red);color:#fff;}
.badge-cat{background:#f3f4f6;color:var(--muted);}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-left:auto;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;line-height:1.2;margin-bottom:6px;cursor:pointer;}
.card-title:hover{color:var(--red);}
.card-text{font-size:.85rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;align-items:center;gap:8px;padding:8px 14px 12px;border-top:1px solid #f5f5f5;margin-top:8px;}
.btn-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--muted);padding:5px 10px;border-radius:20px;transition:all .18s;}
.btn-act:hover{background:var(--bg);}
.btn-act.liked{color:var(--red);}
.btn-act svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-act.liked svg{fill:var(--red);stroke:var(--red);}
.btn-share{margin-left:auto;color:var(--muted);}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty p{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;}

/* Article drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:90vh;background:#fff;border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s;overflow:hidden;display:flex;flex-direction:column;}
.drawer.open{transform:none;}
.drawer-handle-bar{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 0;}
.drawer-head{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;}
.drawer-head-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;flex:1;}
.drawer-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;padding:4px;}
.drawer-body{overflow-y:auto;flex:1;}
.art-img{width:100%;max-height:240px;object-fit:cover;}
.art-content{padding:16px;font-size:.9rem;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.art-meta{padding:0 16px 12px;display:flex;gap:8px;flex-wrap:wrap;}
.cmt-section{border-top:1px solid #f0f0f0;padding:0;}
.cmt-header{padding:12px 16px 8px;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--text);}
.cmt-list{padding:0 16px;}
.cmt-item{padding:8px 0;border-bottom:1px solid #f8f8f8;}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--red);}
.cmt-msg{font-size:.85rem;margin-top:2px;line-height:1.4;}
.cmt-time{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-top:2px;}
.cmt-form{padding:12px 16px 20px;border-top:1px solid #f0f0f0;position:sticky;bottom:0;background:#fff;}
.inp{width:100%;padding:10px 12px;border:1.5px solid #eee;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.85rem;margin-bottom:8px;outline:none;}
.inp:focus{border-color:var(--red);}
.btn-send{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.5px;cursor:pointer;}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px 8px;z-index:100;height:64px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.65rem;text-decoration:none;padding:8px 4px 0;flex:1;}
.bnav-item.active{color:var(--red);}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.bnav-fab-wrap{flex:0 0 64px;display:flex;justify-content:center;align-items:flex-end;padding-bottom:4px;}
.bnav-fab{width:52px;height:52px;background:var(--red);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(200,16,46,.4);margin-bottom:10px;}
.bnav-fab svg{width:26px;height:26px;fill:#fff;stroke:none;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Actualités</div>
  <span class="topbar-count" id="count-label"></span>
  <a href="admin.html" style="color:var(--muted);display:flex;align-items:center;" title="Admin">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
  </a>
</header>

<div class="list" id="list">
  <div class="loading">Chargement…</div>
</div>

<!-- Article Drawer -->
<div class="drawer-overlay" id="art-overlay" onclick="closeArt()"></div>
<div class="drawer" id="art-drawer">
  <div class="drawer-handle-bar"></div>
  <div class="drawer-head">
    <div class="drawer-head-title" id="art-drawer-title"></div>
    <button class="drawer-close" onclick="closeArt()">✕</button>
  </div>
  <div class="drawer-body" id="art-body"></div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <a href="index.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
  </a>
  <a href="actus.html" class="bnav-item active">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
    <span>Actus</span>
  </a>
  <div class="bnav-fab-wrap">
    <button class="bnav-fab" onclick="location.href='index.html'" aria-label="Accueil">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
  <a href="evenements.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Évts</span>
  </a>
  <a href="annonces.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Annonces</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL = 'https://vzfwtyczqfbhbjzotjft.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var actus = [];
var likedSet = {};
var openActuId = null;

function getSid() {
  var s = sessionStorage.getItem('cqp_sid');
  if (!s) { s = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2)); sessionStorage.setItem('cqp_sid', s); }
  return s;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d) {
  var diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return 'à l\'instant';
  if (diff < 3600) return Math.floor(diff/60) + ' min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'j';
  return new Date(d).toLocaleDateString('fr-FR', {day:'numeric',month:'short'});
}
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function load() {
  sb.from('actus').select('*').eq('visible', true).order('date_publication', {ascending: false}).then(function(res) {
    if (res.error) { document.getElementById('list').innerHTML = '<div class="loading">Erreur de chargement</div>'; return; }
    actus = res.data || [];
    document.getElementById('count-label').textContent = actus.length + ' article' + (actus.length > 1 ? 's' : '');
    renderList();
    loadCounts();
  });
}

function renderList() {
  var el = document.getElementById('list');
  if (!actus.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div><p>Aucune actualité pour le moment</p></div>';
    return;
  }
  el.innerHTML = actus.map(function(a) {
    return '<div class="card" id="card-'+a.id+'">' +
      (a.photo_url ? '<img class="card-img" src="'+esc(a.photo_url)+'" loading="lazy">' : '') +
      '<div class="card-body">' +
        '<div class="card-meta">' +
          '<span class="badge">Actu</span>' +
          (a.categorie ? '<span class="badge badge-cat">'+esc(a.categorie)+'</span>' : '') +
          '<span class="card-date">'+timeAgo(a.date_publication)+'</span>' +
        '</div>' +
        '<div class="card-title" onclick="openArt('+a.id+')">'+esc(a.titre)+'</div>' +
        '<div class="card-text">'+esc(a.contenu||'')+'</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<button class="btn-act" id="like-'+a.id+'" onclick="toggleLike('+a.id+')">' +
          '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
          '<span id="lc-'+a.id+'">0</span>' +
        '</button>' +
        '<button class="btn-act" onclick="openArt('+a.id+')">' +
          '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<span id="cc-'+a.id+'">0</span>' +
        '</button>' +
        '<button class="btn-act btn-share" onclick="share(\''+esc(a.titre)+'\')">' +
          '<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';
  }).join('');
  // Animate in
  setTimeout(function() {
    document.querySelectorAll('.card').forEach(function(c, i) {
      setTimeout(function(){ c.classList.add('visible'); }, i * 40);
    });
  }, 50);
}

function loadCounts() {
  var ids = actus.map(function(a){ return a.id; });
  if (!ids.length) return;
  var sid = getSid();
  sb.from('likes').select('item_id').eq('item_type', 'actu').in('item_id', ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id] = (counts[l.item_id]||0) + 1; });
    Object.keys(counts).forEach(function(id) {
      var el = document.getElementById('lc-'+id);
      if (el) el.textContent = counts[id];
    });
  });
  sb.from('likes').select('item_id').eq('item_type', 'actu').eq('session_id', sid).in('item_id', ids).then(function(res) {
    (res.data||[]).forEach(function(l) {
      likedSet[l.item_id] = true;
      var btn = document.getElementById('like-'+l.item_id);
      if (btn) btn.classList.add('liked');
    });
  });
  sb.from('commentaires').select('item_id').eq('item_type', 'actu').eq('visible', true).in('item_id', ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id] = (counts[l.item_id]||0) + 1; });
    Object.keys(counts).forEach(function(id) {
      var el = document.getElementById('cc-'+id);
      if (el) el.textContent = counts[id];
    });
  });
}

function toggleLike(id) {
  var btn = document.getElementById('like-'+id);
  var cnt = document.getElementById('lc-'+id);
  var sid = getSid();
  if (likedSet[id]) {
    sb.from('likes').delete().eq('item_type','actu').eq('item_id',id).eq('session_id',sid).then(function(res) {
      if (!res.error) { likedSet[id]=false; btn.classList.remove('liked'); cnt.textContent = Math.max(0,parseInt(cnt.textContent||0)-1); }
    });
  } else {
    sb.from('likes').insert({item_type:'actu',item_id:id,session_id:sid}).then(function(res) {
      if (!res.error) { likedSet[id]=true; btn.classList.add('liked'); cnt.textContent = parseInt(cnt.textContent||0)+1; }
    });
  }
}

function share(titre) {
  if (navigator.share) navigator.share({title: titre, url: window.location.href});
  else { navigator.clipboard && navigator.clipboard.writeText(window.location.href); toast('Lien copié'); }
}

function openArt(id) {
  var a = actus.find(function(x){ return x.id === id; });
  if (!a) return;
  openActuId = id;
  document.getElementById('art-drawer-title').textContent = a.titre;
  document.getElementById('art-body').innerHTML =
    (a.photo_url ? '<img class="art-img" src="'+esc(a.photo_url)+'">' : '') +
    '<div class="art-meta">' +
      (a.categorie ? '<span class="badge badge-cat">'+esc(a.categorie)+'</span>' : '') +
      '<span class="badge" style="background:#f3f4f6;color:var(--muted)">'+timeAgo(a.date_publication)+'</span>' +
    '</div>' +
    '<div class="art-content">'+esc(a.contenu||'')+'</div>' +
    '<div class="cmt-section">' +
      '<div class="cmt-header">Commentaires</div>' +
      '<div class="cmt-list" id="art-cmts"><div style="padding:8px 0;color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem;">Chargement…</div></div>' +
      '<div class="cmt-form">' +
        '<input class="inp" id="art-cmt-name" placeholder="Votre prénom" maxlength="40">' +
        '<input class="inp" id="art-cmt-text" placeholder="Votre commentaire…" maxlength="500">' +
        '<button class="btn-send" onclick="sendCmt()">Envoyer</button>' +
      '</div>' +
    '</div>';
  document.getElementById('art-overlay').classList.add('open');
  document.getElementById('art-drawer').classList.add('open');
  // Restore saved name
  var saved = localStorage.getItem('cqp_prenom');
  if (saved) document.getElementById('art-cmt-name').value = saved;
  loadArtCmts(id);
}

function closeArt() {
  document.getElementById('art-overlay').classList.remove('open');
  document.getElementById('art-drawer').classList.remove('open');
  openActuId = null;
}

function loadArtCmts(id) {
  sb.from('commentaires').select('*').eq('item_type','actu').eq('item_id',id).eq('visible',true).order('created_at',{ascending:true}).then(function(res) {
    var el = document.getElementById('art-cmts');
    if (!el) return;
    if (!res.data || !res.data.length) {
      el.innerHTML = '<div style="padding:8px 0;color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem;">Aucun commentaire</div>';
      return;
    }
    el.innerHTML = res.data.map(function(c) {
      return '<div class="cmt-item"><div class="cmt-name">'+esc(c.prenom)+'</div><div class="cmt-msg">'+esc(c.message)+'</div><div class="cmt-time">'+timeAgo(c.created_at)+'</div></div>';
    }).join('');
  });
}

function sendCmt() {
  if (!openActuId) return;
  var name = document.getElementById('art-cmt-name').value.trim();
  var text = document.getElementById('art-cmt-text').value.trim();
  if (!name || !text) { toast('Prénom et commentaire requis'); return; }
  localStorage.setItem('cqp_prenom', name);
  sb.from('commentaires').insert({item_type:'actu',item_id:openActuId,prenom:name,message:text,visible:true}).then(function(res) {
    if (res.error) { toast('Erreur: '+res.error.message); return; }
    document.getElementById('art-cmt-text').value = '';
    toast('Commentaire publié ✓');
    loadArtCmts(openActuId);
    var el = document.getElementById('cc-'+openActuId);
    if (el) el.textContent = parseInt(el.textContent||0)+1;
  });
}

load();
(function(){ var k='pv_'+location.pathname; if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');sb.from('page_views').insert({session_id:getSid(),page:location.pathname});} })();
</script>
</body>
</html>
