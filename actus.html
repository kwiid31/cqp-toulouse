<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CQP Toulouse">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Actualités — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--rouge:#C8102E;--or:#F5A623;--noir:#0D0D0D;--gf:#1A1A1A;--blanc:#F4F1EB}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--noir);color:var(--blanc);font-family:'Barlow',sans-serif;font-size:16px}
</style>
<style>
nav{position:sticky;top:0;z-index:200;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--rouge);display:flex;justify-content:space-between;align-items:center;padding:0 5vw;height:68px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:42px;height:42px;background:var(--rouge);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--blanc);line-height:1.1}
.logo-text span{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--or);text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:16px}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:rgba(244,241,235,.6);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--or)}
.page-hero{padding:48px 8vw 32px;border-bottom:1px solid rgba(255,255,255,.06)}
.stag{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:4px;color:var(--or);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.stag::before{content:'';width:28px;height:2px;background:var(--or)}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,5rem);line-height:.95;margin-bottom:8px}
h1 em{color:var(--rouge);font-style:normal}
.content{padding:40px 8vw 60px}
.actus-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.actu-card{background:var(--gf);border:1px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column}
.actu-card:hover{border-color:var(--rouge);transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,16,46,.15)}
.actu-top{padding:14px 16px 10px;flex:1}
.actu-cat{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:var(--rouge);color:#fff;padding:3px 8px;border-radius:2px;display:inline-block;margin-bottom:10px}
.actu-top h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1.2;margin-bottom:8px;color:var(--blanc)}
.actu-top p{font-size:.88rem;color:rgba(244,241,235,.6);line-height:1.7;margin-bottom:10px}
.actu-date{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:1px;color:rgba(244,241,235,.3);text-transform:uppercase}
.actu-social{display:flex;align-items:center;gap:12px;padding:10px 16px 12px;border-top:1px solid rgba(255,255,255,.07)}
.lk-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:rgba(244,241,235,.4);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:1px;padding:0}
.lk-btn .h{font-size:1.1rem;transition:transform .15s;display:inline-block}
.lk-btn.liked{color:var(--rouge)}.lk-btn.pop .h{transform:scale(1.5)}
.cm-btn{background:none;border:none;cursor:pointer;color:rgba(244,241,235,.3);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:1px;padding:0;transition:color .2s}
.cm-btn:hover{color:rgba(244,241,235,.7)}
.spin,.empty{text-align:center;padding:80px;color:rgba(244,241,235,.35);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;grid-column:1/-1}
</style>
<style>
/* DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,96vw);height:100vh;background:var(--gf);border-left:2px solid var(--rouge);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-head{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;background:var(--noir);position:sticky;top:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1.2;color:var(--blanc);flex:1}
.drawer-close{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);width:32px;height:32px;border-radius:4px;cursor:pointer;font-size:.9rem;flex-shrink:0}
.drawer-body{padding:20px 24px;flex:1}
.dr-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.dr-content{font-size:.92rem;color:rgba(244,241,235,.78);line-height:1.9;white-space:pre-wrap}
/* MINI DRAWER COMMENTAIRES */
.mini-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:599}
.mini-ov.open{display:block}
.mini-drw{position:fixed;bottom:0;left:0;right:0;background:var(--gf);border-top:2px solid var(--rouge);border-radius:16px 16px 0 0;z-index:600;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:72vh;display:flex;flex-direction:column}
.mini-drw.open{transform:translateY(0)}
.mini-head{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mini-head h4{font-family:'Bebas Neue',sans-serif;font-size:1.2rem}
.mini-body{overflow-y:auto;padding:14px 20px;flex:1}
.mini-foot{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.ci{display:flex;gap:10px;margin-bottom:12px}
.ca{width:30px;height:30px;min-width:30px;background:var(--rouge);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:#fff}
.cb2{background:rgba(255,255,255,.06);border-radius:0 8px 8px 8px;padding:8px 12px;flex:1}
.cn{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--or);margin-bottom:3px}
.ct{font-size:.88rem;color:rgba(244,241,235,.8);line-height:1.5}
footer{background:var(--gf);border-top:1px solid rgba(255,255,255,.07);padding:24px 8vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
footer p{font-size:.8rem;color:rgba(244,241,235,.3)}
footer a{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:rgba(244,241,235,.4);text-decoration:none;text-transform:uppercase}
footer a:hover{color:var(--or)}
@media(max-width:900px){.actus-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.actus-grid{grid-template-columns:1fr}.nav-links a:not(:first-child){display:none}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">CQP</div>
    <div class="logo-text">Quartiers Populaires<span>Toulouse — En lutte</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html">← Accueil</a>
    <a href="actus.html" class="active">Actualités</a>
    <a href="evenements.html">Événements</a>
    <a href="annonces.html">Annonces</a>
  </div>
</nav>
<div class="page-hero">
  <div class="stag">Le comité vous informe</div>
  <h1>Actualités <em>&amp; infos</em></h1>
</div>
<div class="content">
  <div class="actus-grid" id="actus-grid">
    <div class="spin">⏳ Chargement…</div>
  </div>
</div>
<footer>
  <p>© 2026 Comité des Quartiers Populaires de Toulouse</p>
  <a href="index.html">← Accueil</a>
</footer>
<!-- DRAWER ACTU -->
<div class="drawer-overlay" id="dActu" onclick="if(event.target===this)closeDr()">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="dr-titre"></h3>
      <button class="drawer-close" onclick="closeDr()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="dr-meta">
        <span id="dr-cat" style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;background:var(--rouge);color:#fff;padding:4px 10px;border-radius:2px"></span>
        <span id="dr-date" style="font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:1px;color:rgba(244,241,235,.35)"></span>
      </div>
      <div class="dr-content" id="dr-content"></div>
    </div>
  </div>
</div>

<!-- MINI DRAWER COMMENTAIRES -->
<div class="mini-ov" id="mini-ov" onclick="closeMini()"></div>
<div class="mini-drw" id="mini-drw">
  <div class="mini-head">
    <h4 id="mini-titre">Commentaires</h4>
    <button onclick="closeMini()" style="background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);width:30px;height:30px;border-radius:4px;cursor:pointer">✕</button>
  </div>
  <div class="mini-body" id="mini-cmts"></div>
  <div class="mini-foot">
    <input id="mini-prenom" placeholder="Votre prénom" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:9px 16px;color:var(--blanc);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;width:100%">
    <div style="display:flex;gap:8px">
      <input id="mini-msg" placeholder="Votre commentaire…" onkeydown="if(event.key==='Enter')sendCmt()" style="flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:9px 16px;color:var(--blanc);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none">
      <button onclick="sendCmt()" style="background:var(--rouge);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;flex-shrink:0;font-size:1rem">➤</button>
    </div>
  </div>
</div>

<!-- SCRIPT UNIQUE : tout le JS en un seul bloc -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// ---- CHARGEMENT ACTUS ----
let cache=[];
async function load(){
  const g=document.getElementById('actus-grid');
  g.innerHTML='<div class="spin">⏳ Chargement…</div>';
  try{
    const{data,error}=await sb.from('actus').select('*').eq('visible',true).order('date_publication',{ascending:false});
    if(error)throw error;
    cache=data||[];
    if(!cache.length){g.innerHTML='<div class="empty">Aucune actualité pour le moment.</div>';return;}
    g.innerHTML=cache.map(a=>`
      <div class="actu-card" onclick="open(${a.id})">
        <div class="actu-top">
          <span class="actu-cat">${esc(a.categorie)}</span>
          <h3>${esc(a.titre)}</h3>
          <p>${esc(a.contenu).substring(0,150)}${a.contenu.length>150?'…':''}</p>
          <div class="actu-date">${new Date(a.date_publication).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}</div>
        </div>
        <div class="actu-social" onclick="event.stopPropagation()">
          <button class="lk-btn" id="lk-${a.id}" onclick="doLike(${a.id})"><span class="h">🤍</span> <span id="lc-${a.id}">0</span></button>
          <button class="cm-btn" onclick="openMini(${a.id},'${esc(a.titre).substring(0,30).replace(/'/g,"\\'")}')">💬 <span id="cc-${a.id}">0</span></button>
        </div>
      </div>`).join('');
    cache.forEach(a=>loadCounts(a.id));
  }catch(e){
    g.innerHTML=`<div class="empty">Erreur de chargement : ${e.message}</div>`;
  }
}
</script>
<script>
// ---- DRAWER ----
function open(id){
  const a=cache.find(x=>x.id===id);if(!a)return;
  document.getElementById('dr-titre').textContent=a.titre;
  document.getElementById('dr-cat').textContent=a.categorie;
  document.getElementById('dr-date').textContent=new Date(a.date_publication).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('dr-content').textContent=a.contenu;
  document.getElementById('dActu').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDr(){
  document.getElementById('dActu').classList.remove('open');
  document.body.style.overflow='';
}

// ---- SOCIAL : LIKES + COMMENTAIRES ----
function getSid(){
  try{
    let s=sessionStorage.getItem('cqp_sid');
    if(!s){s=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem('cqp_sid',s);}
    return s;
  }catch{return 'anon_'+Math.random().toString(36).slice(2);}
}

async function loadCounts(id){
  const sid=getSid();
  try{
    const[{count:nl},{data:ml},{count:nc}]=await Promise.all([
      sb.from('likes').select('*',{count:'exact',head:true}).eq('item_type','actu').eq('item_id',id),
      sb.from('likes').select('id').eq('item_type','actu').eq('item_id',id).eq('session_id',sid),
      sb.from('commentaires').select('*',{count:'exact',head:true}).eq('item_type','actu').eq('item_id',id).eq('visible',true)
    ]);
    const liked=(ml||[]).length>0;
    const btn=document.getElementById('lk-'+id);
    if(btn){if(liked)btn.classList.add('liked');btn.querySelector('.h').textContent=liked?'❤️':'🤍';}
    const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=nl||0;
    const cc=document.getElementById('cc-'+id);if(cc)cc.textContent=nc||0;
  }catch(e){console.warn('loadCounts error',e);}
}

async function doLike(id){
  const sid=getSid();
  const btn=document.getElementById('lk-'+id);if(!btn)return;
  const liked=btn.classList.contains('liked');
  btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);
  if(liked){
    await sb.from('likes').delete().eq('item_type','actu').eq('item_id',id).eq('session_id',sid);
    btn.classList.remove('liked');btn.querySelector('.h').textContent='🤍';
  }else{
    await sb.from('likes').insert({item_type:'actu',item_id:id,session_id:sid}).catch(()=>{});
    btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';
  }
  const{count}=await sb.from('likes').select('*',{count:'exact',head:true}).eq('item_type','actu').eq('item_id',id);
  const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=count||0;
}

let miniId=null;
async function openMini(id,titre){
  miniId=id;
  document.getElementById('mini-titre').textContent='💬 '+titre;
  document.getElementById('mini-ov').classList.add('open');
  document.getElementById('mini-drw').classList.add('open');
  document.body.style.overflow='hidden';
  await refreshCmts();
}
function closeMini(){
  document.getElementById('mini-ov').classList.remove('open');
  document.getElementById('mini-drw').classList.remove('open');
  document.body.style.overflow='';
  miniId=null;
}
async function refreshCmts(){
  if(!miniId)return;
  const{data:cmts}=await sb.from('commentaires').select('*').eq('item_type','actu').eq('item_id',miniId).eq('visible',true).order('created_at',{ascending:true});
  const list=cmts||[];
  const cc=document.getElementById('cc-'+miniId);if(cc)cc.textContent=list.length;
  const box=document.getElementById('mini-cmts');if(!box)return;
  box.innerHTML=list.length
    ?list.map(c=>`<div class="ci"><div class="ca">${esc(c.prenom[0]||'?').toUpperCase()}</div><div class="cb2"><div class="cn">${esc(c.prenom)}</div><div class="ct">${esc(c.message)}</div></div></div>`).join('')
    :'<div style="color:rgba(244,241,235,.3);font-size:.85rem;text-align:center;padding:20px">Soyez le premier à commenter !</div>';
  box.scrollTop=box.scrollHeight;
}
async function sendCmt(){
  const msg=document.getElementById('mini-msg')?.value.trim();
  const prenom=document.getElementById('mini-prenom')?.value.trim()||'Anonyme';
  if(!msg||!miniId)return;
  document.getElementById('mini-msg').value='';
  await sb.from('commentaires').insert({item_type:'actu',item_id:miniId,prenom,message:msg});
  await refreshCmts();
}

// ---- TRACKING ----
(function(){
  const TRACK='https://vzfwtyczqfbhbjzotjft.supabase.co/functions/v1/track';
  const page=location.pathname.split('/').pop()||'actus.html';
  let sid;try{sid=sessionStorage.getItem('cqp_sid');}catch{sid='anon';}
  if(sid)fetch(TRACK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,page,type:'view'})}).catch(()=>{});
})();

// ---- PWA ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/cqp-toulouse/sw.js').catch(()=>{});
  });
}

// Lancement
load();
</script>
</body>
</html>
