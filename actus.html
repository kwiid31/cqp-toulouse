<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CQP Toulouse">
<title>Actualités — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rouge:#C8102E;--rouge-light:#fff0f2;--blue:#1877F2;--green:#42B72A;
  --txt:#050505;--txt2:#65676B;--txt3:#8A8D91;
  --bg:#F0F2F5;--bg2:#fff;--bg3:#E4E6EB;--border:#CED0D4;
  --shadow:0 1px 2px rgba(0,0,0,.1);--radius:8px;--nav-h:56px;
}
html,body{font-size:15px;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;}
body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 4px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;outline:none}
img{max-width:100%;display:block}

.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--shadow)}
.back-btn{width:38px;height:38px;border:none;background:var(--bg3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn svg{width:20px;height:20px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.5px;flex:1}
.topbar-count{background:var(--rouge);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:.62rem;letter-spacing:2px;padding:4px 10px;border-radius:20px}

.page-hero{background:linear-gradient(135deg,#0d0d0d 0%,#2a0509 60%,var(--rouge) 100%);
  padding:28px 16px 24px;color:#fff;position:relative;overflow:hidden}
.page-hero::after{content:'';position:absolute;inset:0;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,.05)"/></svg>')}
.hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:4px;
  text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;position:relative;z-index:1}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;position:relative;z-index:1}
.hero-sub{font-size:.83rem;color:rgba(255,255,255,.6);margin-top:6px;position:relative;z-index:1}

/* FILTER TABS */
.filter-wrap{background:#fff;border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none;position:sticky;top:var(--nav-h);z-index:190}
.filter-wrap::-webkit-scrollbar{display:none}
.filter-btn{border:none;background:none;padding:12px 14px;
  font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--txt3);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s}
.filter-btn.active{color:var(--rouge);border-bottom-color:var(--rouge)}

/* GRID */
.actus-grid{max-width:680px;margin:0 auto;padding:8px 0}

/* CARDS */
.actu-card{background:#fff;margin:0 0 8px;overflow:hidden;transition:opacity .3s,transform .3s;
  opacity:0;transform:translateY(12px)}
.actu-card.revealed{opacity:1;transform:none}
@media(min-width:600px){.actu-card{border-radius:var(--radius);margin:0 8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.15)}}

.ac-img{width:100%;height:200px;object-fit:cover;display:block}
.ac-cover{display:flex;flex-direction:column;justify-content:flex-end;
  padding:20px;min-height:150px;position:relative;overflow:hidden}
.ac-cover::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#0d0508 0%,#3a0812 60%,var(--rouge) 100%);opacity:.95}
.ac-cover-cat{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.6);position:relative;z-index:1;margin-bottom:5px}
.ac-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff;line-height:1.1;position:relative;z-index:1}

.ac-body{padding:12px 14px 8px}
.ac-title{font-family:'Barlow',sans-serif;font-weight:600;font-size:.96rem;line-height:1.35;color:var(--txt);margin-bottom:6px}
.ac-excerpt{font-size:.86rem;color:var(--txt2);line-height:1.65;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ac-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
.ac-tag{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;letter-spacing:1px;
  text-transform:uppercase;background:var(--bg3);color:var(--txt2);padding:3px 9px;border-radius:20px}
.ac-time{font-size:.74rem;color:var(--txt3);margin-left:auto}

.ac-stats{display:flex;justify-content:space-between;padding:6px 14px;
  border-bottom:1px solid var(--bg3);font-size:.77rem;color:var(--txt3)}
.ac-actions{display:flex;align-items:center;padding:2px 6px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 4px;border:none;background:none;border-radius:6px;
  font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:600;
  color:var(--txt2);transition:background .15s}
.act-btn:hover,.act-btn:active{background:var(--bg3)}
.act-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.act-btn.liked{color:var(--rouge)}
.act-btn.liked svg{stroke:var(--rouge);fill:var(--rouge)}
.act-btn.pop .h{transform:scale(1.5)}
.act-sep{width:1px;height:24px;background:var(--bg3)}
.ac-read-more{margin:2px 14px 12px;padding:10px;background:var(--bg);border:none;
  border-radius:6px;width:calc(100% - 28px);font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);text-align:center}
.ac-read-more:hover{background:var(--bg3)}

/* SPINNER / EMPTY */
.spinner{text-align:center;padding:36px;color:var(--txt3);
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-state p{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:1px;text-transform:uppercase}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;
  height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;color:var(--txt3);
  font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.5px;
  text-transform:uppercase;transition:color .15s;text-decoration:none;padding:6px 0}
.nav-item.active,.nav-item:hover{color:var(--rouge)}
.nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{stroke:var(--rouge)}
.nav-pub{width:48px;height:48px;border-radius:50%;background:var(--rouge);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(200,16,46,.45);margin-top:-12px;flex-shrink:0}
.nav-pub svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;flex-shrink:0}

/* DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;
  display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;flex:1;line-height:1.2}
.dh-close{width:30px;height:30px;border:1px solid var(--border);background:none;
  border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.drawer-body{padding:16px;flex:1}
.drawer-text{font-size:.9rem;color:var(--txt2);line-height:1.9;white-space:pre-wrap}

/* MINI DRAWER */
.mini-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600}
.mini-overlay.open{display:block}
.mini-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:3px solid var(--rouge);border-radius:20px 20px 0 0;z-index:601;
  max-height:75vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.mini-drawer.open{transform:none}
.mini-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.mini-head{padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bg3);flex-shrink:0}
.mini-head h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.3px;color:var(--txt)}
.mini-body{overflow-y:auto;padding:12px 16px;flex:1}
.mini-foot{padding:12px 16px;border-top:1px solid var(--bg3);display:flex;flex-direction:column;gap:8px;flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cmt-item{display:flex;gap:10px;margin-bottom:12px}
.cmt-av{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--rouge);
  display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#fff}
.cmt-bubble{background:var(--bg3);border-radius:0 10px 10px 10px;padding:8px 12px;flex:1}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;color:var(--rouge);margin-bottom:3px;font-weight:700}
.cmt-text{font-size:.85rem;color:var(--txt);line-height:1.5}
input.cmt-input{background:var(--bg3);border:1px solid var(--border);border-radius:24px;
  padding:10px 16px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;width:100%}
input.cmt-input:focus{border-color:var(--rouge)}
.cmt-send-row{display:flex;gap:8px}
.cmt-send-btn{background:var(--rouge);border:none;color:#fff;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
@media(min-width:700px){.bottom-nav{display:none}body{padding-bottom:0}.actus-grid{padding-top:8px}}
</style>
<body>
<header class="topbar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'" aria-label="Retour">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">Actualités</span>
  <span class="topbar-count" id="actu-count">…</span>
</header>

<div class="page-hero">
  <div class="hero-tag">CQP Toulouse</div>
  <h2 class="hero-title">Actualités</h2>
  <p class="hero-sub">Toutes les nouvelles des Quartiers Populaires</p>
</div>

<div class="filter-wrap" id="filters">
  <button class="filter-btn active" onclick="filterActus('',this)">Toutes</button>
  <button class="filter-btn" onclick="filterActus('Politique',this)">Politique</button>
  <button class="filter-btn" onclick="filterActus('Logement',this)">Logement</button>
  <button class="filter-btn" onclick="filterActus('Culture',this)">Culture</button>
  <button class="filter-btn" onclick="filterActus('Social',this)">Social</button>
  <button class="filter-btn" onclick="filterActus('Emploi',this)">Emploi</button>
  <button class="filter-btn" onclick="filterActus('Sécurité',this)">Sécurité</button>
</div>

<main class="actus-grid">
  <div class="spinner" id="spinner">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px">
      <div style="width:8px;height:8px;background:var(--rouge);border-radius:50%;animation:pul 1.2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--rouge);border-radius:50%;animation:pul 1.2s .2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--rouge);border-radius:50%;animation:pul 1.2s .4s infinite"></div>
    </div>
  </div>
  <style>@keyframes pul{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}</style>
  <div id="actus-list"></div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Accueil
  </a>
  <a class="nav-item active" href="actus.html">
    <svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Actus
  </a>
  <div class="nav-middle">
    <a href="index.html" class="nav-pub">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
  </div>
  <a class="nav-item" href="evenements.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Évts
  </a>
  <a class="nav-item" href="annonces.html">
    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Annonces
  </a>
</nav>

<!-- DRAWER ARTICLE -->
<div class="drawer-overlay" id="dr-actu" onclick="if(event.target===this)closeDr()">
  <div class="drawer">
    <div class="drawer-head">
      <div style="flex:1">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px" id="dr-cat"></div>
        <h3 id="dr-titre"></h3>
        <div style="font-size:.75rem;color:var(--txt3);margin-top:4px" id="dr-date"></div>
      </div>
      <button class="dh-close" onclick="closeDr()">✕</button>
    </div>
    <div class="drawer-body"><div class="drawer-text" id="dr-content"></div></div>
  </div>
</div>

<!-- MINI DRAWER COMMENTAIRES -->
<div class="mini-overlay" id="mini-ov" onclick="closeMini()"></div>
<div class="mini-drawer" id="mini-drawer">
  <div class="mini-drag"></div>
  <div class="mini-head">
    <h4 id="mini-title">Commentaires</h4>
    <button style="border:none;background:none;color:var(--txt3);font-size:1.1rem" onclick="closeMini()">✕</button>
  </div>
  <div class="mini-body" id="mini-body"></div>
  <div class="mini-foot">
    <input class="cmt-input" id="mini-prenom" placeholder="Votre prénom" oninput="savePrenomLocal(this.value)">
    <div class="cmt-send-row">
      <input class="cmt-input" id="mini-msg" placeholder="Votre commentaire…" onkeydown="if(event.key==='Enter')sendCmt()" style="flex:1">
      <button class="cmt-send-btn" onclick="sendCmt()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function getSid(){try{let s=localStorage.getItem('cqp_sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);localStorage.setItem('cqp_sid',s);}return s;}catch{return 'x'+Math.random().toString(36).slice(2);}}
function savePrenomLocal(v){try{if(v.trim())localStorage.setItem('cqp_prenom',v.trim());}catch{}}
function timeAgo(d){const diff=(Date.now()-new Date(d))/1000;if(diff<60)return"À l'instant";if(diff<3600)return`Il y a ${Math.floor(diff/60)} min`;if(diff<86400)return`Il y a ${Math.floor(diff/3600)} h`;if(diff<604800)return`Il y a ${Math.floor(diff/86400)} j`;return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function readTime(text){const w=(text||'').split(' ').length;return Math.ceil(w/200)<=1?'⚡ 1 min':`📖 ${Math.ceil(w/200)} min`;}

let allActus=[],currentFilter='',_aPage=0,_aDone=false,_aLoading=false;
const A_PAGE=8;
async function loadActus(reset=false){
  if(_aLoading||_aDone)return;
  if(reset){_aPage=0;_aDone=false;allActus=[];}
  _aLoading=true;
  try{
    const from=_aPage*A_PAGE,to=from+A_PAGE-1;
    const{data}=await sb.from('actus').select('*').eq('visible',true).order('date_publication',{ascending:false}).range(from,to);
    const items=data||[];
    allActus=[...allActus,...items];
    if(items.length<A_PAGE)_aDone=true;
    document.getElementById('actu-count').textContent=allActus.length+(allActus.length>=A_PAGE?'+ ':' ')+'articles';
    renderActus(currentFilter?allActus.filter(a=>a.categorie===currentFilter):allActus);
    _aPage++;
  }catch(e){document.getElementById('spinner').innerHTML='<p style="color:var(--txt3)">Erreur. <button onclick="loadActus()" style="color:var(--rouge);background:none;border:none;cursor:pointer">Réessayer</button></p>';console.error(e);}
  finally{_aLoading=false;}
}
// Scroll infini + boucle
window.addEventListener('scroll',()=>{
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-300){
    if(_aDone){
      // Boucle naturelle : repartir du début
      const sep=document.createElement('div');
      sep.style.cssText='text-align:center;padding:16px 0;color:var(--txt3);font-family:Barlow Condensed,sans-serif;font-size:.68rem;letter-spacing:2px';
      sep.textContent='· · · · ·';
      document.getElementById('actus-list').appendChild(sep);
      _aPage=0;_aDone=false;allActus=[];
      setTimeout(()=>loadActus(),300);
    } else loadActus();
  }
},{passive:true});
function filterActus(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderActus(cat?allActus.filter(a=>a.categorie===cat):allActus);
}
function renderActus(list){
  document.getElementById('spinner').style.display='none';
  const el=document.getElementById('actus-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><p>Aucune actualité dans cette catégorie</p></div>';return;}
  el.innerHTML=list.map(a=>{
    const cover=a.photo_url
      ?`<img class="ac-img" src="${esc(a.photo_url)}" alt="${esc(a.titre)}" loading="lazy">`
      :`<div class="ac-cover"><div class="ac-cover-cat">${esc(a.categorie||'Actualité')}</div><div class="ac-cover-title">${esc(a.titre)}</div></div>`;
    return `<article class="actu-card reveal-card" id="card-${a.id}">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 6px">
        <div style="width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--rouge);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.92rem;color:#fff">CQP</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Barlow',sans-serif;font-weight:600;font-size:.92rem;color:var(--txt)">CQP Toulouse</div>
          <div style="font-size:.75rem;color:var(--txt3)">🌐 ${timeAgo(a.date_publication)}</div>
        </div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:var(--rouge);color:#fff">${esc(a.categorie||'Actu')}</span>
      </div>
      ${cover}
      <div class="ac-body">
        <div class="ac-title">${esc(a.titre)}</div>
        <div class="ac-excerpt">${esc((a.contenu||'').substring(0,220))}${(a.contenu||'').length>220?'…':''}</div>
        <div class="ac-meta">
          <span class="ac-tag">${esc(a.categorie||'Général')}</span>
          <span class="ac-time">${readTime(a.contenu)}</span>
        </div>
      </div>
      <button class="ac-read-more" onclick="openActu(${a.id})">Lire l'article complet →</button>
      <div class="ac-stats"><span id="sl-${a.id}">0 j'aime</span><span id="sc-${a.id}">0 commentaire</span></div>
      <div class="ac-actions">
        <button class="act-btn" id="lk-${a.id}" onclick="toggleLike(${a.id})">
          <span class="h">👍</span> J'aime
        </button>
        <div class="act-sep"></div>
        <button class="act-btn" onclick="openMini(${a.id},'${esc(a.titre).substring(0,30)}')">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span id="cc-${a.id}">0</span>
        </button>
        <div class="act-sep"></div>
        <button class="act-btn" onclick="navigator.share?.({title:'${esc(a.titre).substring(0,30)}',url:location.href})">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Partager
        </button>
      </div>
    </article>`;
  }).join('');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});},{threshold:.05});
  document.querySelectorAll('.reveal-card').forEach(el=>obs.observe(el));
  loadCounts(list.map(a=>a.id));
}
async function loadCounts(ids){
  if(!ids.length)return;
  const sid=getSid();
  try{
    const[{data:lk},{data:my},{data:cm}]=await Promise.all([
      sb.from('likes').select('item_id').eq('item_type','actu').in('item_id',ids),
      sb.from('likes').select('item_id').eq('item_type','actu').eq('session_id',sid).in('item_id',ids),
      sb.from('commentaires').select('item_id').eq('item_type','actu').eq('visible',true).in('item_id',ids)
    ]);
    const lm={},mm={},cm2={};
    (lk||[]).forEach(r=>{lm[r.item_id]=(lm[r.item_id]||0)+1;});
    (my||[]).forEach(r=>{mm[r.item_id]=true;});
    (cm||[]).forEach(r=>{cm2[r.item_id]=(cm2[r.item_id]||0)+1;});
    ids.forEach(id=>{
      const liked=!!mm[id];
      const btn=document.getElementById('lk-'+id);
      if(btn){btn.classList.toggle('liked',liked);btn.querySelector('.h').textContent=liked?'❤️':'👍';}
      const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(lm[id]||0)+" j'aime";
      const sc=document.getElementById('sc-'+id);if(sc)sc.textContent=(cm2[id]||0)+' commentaire'+(cm2[id]>1?'s':'');
      const cc=document.getElementById('cc-'+id);if(cc)cc.textContent=cm2[id]||0;
    });
  }catch{}
}
async function toggleLike(id){
  const sid=getSid(),btn=document.getElementById('lk-'+id);if(!btn)return;
  const liked=btn.classList.contains('liked');
  if(liked){await sb.from('likes').delete().eq('item_type','actu').eq('item_id',id).eq('session_id',sid);btn.classList.remove('liked');btn.querySelector('.h').textContent='👍';}
  else{try{await sb.from('likes').insert({item_type:'actu',item_id:id,session_id:sid});}catch{}btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';}
  const{data:l}=await sb.from('likes').select('item_id').eq('item_type','actu').eq('item_id',id);
  const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(l||[]).length+" j'aime";
}
function openActu(id){
  const a=allActus.find(x=>x.id===id);if(!a)return;
  document.getElementById('dr-cat').textContent=a.categorie||'Actualité';
  document.getElementById('dr-titre').textContent=a.titre;
  document.getElementById('dr-date').textContent=new Date(a.date_publication).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('dr-content').textContent=a.contenu;
  document.getElementById('dr-actu').classList.add('open');document.body.style.overflow='hidden';
}
function closeDr(){document.getElementById('dr-actu').classList.remove('open');document.body.style.overflow='';}
let miniId=null;
function openMini(id,titre){
  miniId=id;
  document.getElementById('mini-title').textContent='💬 '+titre;
  document.getElementById('mini-ov').classList.add('open');
  document.getElementById('mini-drawer').classList.add('open');
  document.body.style.overflow='hidden';
  try{const p=localStorage.getItem('cqp_prenom');if(p)document.getElementById('mini-prenom').value=p;}catch{}
  refreshCmts();
}
function closeMini(){document.getElementById('mini-ov').classList.remove('open');document.getElementById('mini-drawer').classList.remove('open');document.body.style.overflow='';miniId=null;}
async function refreshCmts(){
  if(!miniId)return;
  const{data}=await sb.from('commentaires').select('*').eq('item_type','actu').eq('item_id',miniId).eq('visible',true).order('created_at',{ascending:true});
  const list=data||[];
  const cc=document.getElementById('cc-'+miniId);if(cc)cc.textContent=list.length;
  const sc=document.getElementById('sc-'+miniId);if(sc)sc.textContent=list.length+' commentaire'+(list.length>1?'s':'');
  const box=document.getElementById('mini-body');
  box.innerHTML=list.length?list.map(c=>`<div class="cmt-item"><div class="cmt-av">${esc(c.prenom[0]).toUpperCase()}</div><div class="cmt-bubble"><div class="cmt-name">${esc(c.prenom)}</div><div class="cmt-text">${esc(c.message)}</div></div></div>`).join(''):'<p style="color:var(--txt3);text-align:center;padding:24px 0;font-family:Barlow Condensed,sans-serif;font-size:.85rem">Soyez le premier à commenter !</p>';
  box.scrollTop=box.scrollHeight;
}
async function sendCmt(){
  const msg=document.getElementById('mini-msg').value.trim();
  const prenom=document.getElementById('mini-prenom').value.trim()||'Anonyme';
  if(!msg||!miniId)return;
  savePrenomLocal(prenom);
  document.getElementById('mini-msg').value='';
  await sb.from('commentaires').insert({item_type:'actu',item_id:miniId,prenom,message:msg});
  refreshCmts();
}
loadActus();
</script>
