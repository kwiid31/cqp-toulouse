<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>À propos — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--rouge:#C8102E;--txt:#050505;--txt2:#65676B;--txt3:#8A8D91;--bg:#F0F2F5;--bg3:#E4E6EB;--border:#CED0D4;--nav-h:56px;}
html,body{font-size:15px;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh}
body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 4px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;outline:none}

.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);height:var(--nav-h);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.back-btn{width:38px;height:38px;border:none;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn svg{width:20px;height:20px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.5px;flex:1}

.page-hero{background:linear-gradient(135deg,#0d0d0d 0%,#2a0509 60%,var(--rouge) 100%);padding:28px 16px 24px;color:#fff;position:relative}
.hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1}

.content-wrap{max-width:680px;margin:0 auto;padding:16px}
.content-card{background:#fff;border-radius:8px;padding:20px 20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.1);line-height:1.9;font-size:.95rem;color:var(--txt2);white-space:pre-wrap;word-break:break-word}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;padding:6px 0}
.nav-item.active,.nav-item:hover{color:var(--rouge)}
.nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-pub{width:48px;height:48px;border-radius:50%;background:var(--rouge);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(200,16,46,.45);margin-top:-12px;flex-shrink:0}
.nav-pub svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;flex-shrink:0}
@media(min-width:700px){.bottom-nav{display:none}body{padding-bottom:0}}
</style>
</head>
<body>
<header class="topbar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">À propos</span>
</header>

<div class="page-hero">
  <div class="hero-tag">CQP Toulouse</div>
  <h2 class="hero-title">À propos</h2>
</div>

<main class="content-wrap">
  <div class="content-card" id="apropos-content">Chargement…</div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil</a>
  <a class="nav-item" href="actus.html"><svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Actus</a>
  <div class="nav-middle"><a href="index.html" class="nav-pub"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a></div>
  <a class="nav-item" href="evenements.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Évts</a>
  <a class="nav-item" href="annonces.html"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Annonces</a>
</nav>

<script>
const sb=supabase.createClient(
  'https://vzfwtyczqfbhbjzotjft.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk'
);
async function loadApropos(){
  try{
    const{data}=await sb.from('site_config').select('value').eq('key','apropos').single();
    document.getElementById('apropos-content').textContent=data?.value||'Contenu à venir.';
  }catch(e){
    document.getElementById('apropos-content').textContent='Contenu à venir.';
  }
}
loadApropos();
</script>
</body>
</html>
