<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CQP Toulouse</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--red:#C8102E;--bg:#F7F8FA;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain;}

/* TOP BAR */
.topbar{background:#fff;padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--red);letter-spacing:1px;line-height:1;}
.topbar-sub{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.topbar-info{color:var(--muted);text-decoration:none;display:flex;align-items:center;}

/* STORIES BAR */
.stories-bar{background:#fff;border-bottom:1px solid #f0f0f0;padding:10px 0;display:flex;gap:10px;padding-left:12px;padding-right:12px;overflow-x:auto;scrollbar-width:none;}
.stories-bar::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2px;background:conic-gradient(#C8102E 0deg, #ff6b35 180deg, #C8102E 360deg);display:flex;align-items:center;justify-content:center;position:relative;}
.story-ring.add{background:none;border:2px dashed #ddd;}
.story-ring.seen{background:conic-gradient(#d1d5db 0deg, #d1d5db 360deg);}
.story-inner{width:100%;height:100%;border-radius:50%;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.story-inner img,.story-inner video{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.story-add-icon{font-size:1.6rem;line-height:1;color:var(--red);}
.story-label{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;color:var(--text);max-width:58px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.story-views{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;color:var(--muted);}
.story-vid-badge{position:absolute;bottom:1px;right:1px;background:var(--red);color:#fff;font-size:.5rem;border-radius:4px;padding:1px 3px;font-family:'Barlow Condensed',sans-serif;line-height:1.2;}

/* FEED */
.feed-header{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.feed-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.5px;}
.feed-count{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--muted);}
.feed{padding:0;}

/* CARDS */
.card{background:#fff;border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin:0 12px 12px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;}
.card.vis{opacity:1;transform:none;}
.card-img{width:100%;height:180px;object-fit:cover;}
.card-body{padding:12px 14px 8px;}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;color:#fff;}
.badge.actu{background:var(--red);}
.badge.evt{background:#2563eb;}
.badge.ann{background:#059669;}
.badge-cat{background:#f3f4f6;color:var(--muted);}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-left:auto;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1.2;margin-bottom:5px;}
.card-text{font-size:.85rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-extra{margin-top:6px;}
.card-countdown{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:#2563eb;font-weight:600;}
.card-loc{display:flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:var(--muted);}
.card-footer{display:flex;align-items:center;gap:6px;padding:8px 14px 12px;border-top:1px solid #f5f5f5;margin-top:8px;}
.btn-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--muted);padding:5px 10px;border-radius:20px;transition:all .18s;}
.btn-act:hover{background:var(--bg);}
.btn-act.liked{color:var(--red);}
.btn-act svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-act.liked svg{fill:var(--red);stroke:var(--red);}
.loading-feed{text-align:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.feed-end{text-align:center;padding:32px 24px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px 8px;z-index:100;height:64px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.65rem;text-decoration:none;padding:8px 4px 0;flex:1;}
.bnav-item.active{color:var(--red);}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.bnav-fab-wrap{flex:0 0 64px;display:flex;justify-content:center;align-items:flex-end;padding-bottom:4px;}
.bnav-fab{width:52px;height:52px;background:var(--red);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(200,16,46,.45);margin-bottom:10px;transition:transform .15s;}
.bnav-fab:active{transform:scale(.93);}
.bnav-fab svg{width:26px;height:26px;fill:#fff;stroke:none;}

/* PUB MENU */
.pub-menu{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) scale(.92);background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:6px;width:196px;z-index:200;opacity:0;pointer-events:none;transition:all .2s;}
.pub-menu.open{opacity:1;pointer-events:auto;transform:translateX(-50%) scale(1);}
.pm-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:600;transition:background .15s;}
.pm-item:hover{background:var(--bg);}
.pm-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}

/* STORY MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:auto;}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.6,1);}
.overlay.open .sheet{transform:none;}
.sheet-handle{width:38px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;padding:0 16px 14px;letter-spacing:.5px;}
.story-btns{display:flex;gap:10px;padding:0 16px 14px;}
.story-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:2px solid #eee;cursor:pointer;background:none;transition:border-color .2s,background .2s;}
.story-btn:hover,.story-btn:focus{border-color:var(--red);background:#fef2f2;}
.story-btn-icon{font-size:1.7rem;}
.story-btn-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.3px;}
.story-preview{margin:0 16px 12px;border-radius:12px;overflow:hidden;display:none;max-height:260px;background:#000;}
.story-preview img,.story-preview video{width:100%;max-height:260px;object-fit:contain;display:block;}
.btn-primary{margin:0 16px 20px;display:block;width:calc(100% - 32px);padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px;cursor:pointer;}
.btn-primary:disabled{opacity:.45;cursor:default;}

/* STORY VIEWER */
.sv{position:fixed;inset:0;background:#000;z-index:400;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s;}
.sv.open{opacity:1;pointer-events:auto;}
.sv-progress{display:flex;gap:3px;padding:10px 10px 6px;position:absolute;top:0;left:0;right:0;z-index:10;}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.sv-seg-fill{height:100%;background:#fff;width:0;}
.sv-ui{position:absolute;top:18px;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.sv-views{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;display:flex;align-items:center;gap:4px;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.sv-close{background:rgba(0,0,0,.4);border:none;color:#fff;font-size:1.1rem;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sv-media{width:100%;height:100%;object-fit:contain;}
.sv-tap-l{position:absolute;left:0;top:0;width:38%;height:100%;z-index:5;}
.sv-tap-r{position:absolute;right:0;top:0;width:62%;height:100%;z-index:5;}

/* COMMENT DRAWER */
.drawer{position:fixed;inset:0;z-index:350;pointer-events:none;}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .25s;}
.drawer-bg.open{opacity:1;pointer-events:auto;}
.drawer-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;pointer-events:auto;display:flex;flex-direction:column;}
.drawer-panel.open{transform:none;}
.drawer-handle{width:38px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 4px;}
.drawer-head{padding:8px 16px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;position:sticky;top:0;background:#fff;z-index:2;}
.drawer-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;flex:1;margin-top:0;}
.drawer-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.cmt-list{padding:8px 16px;flex:1;}
.cmt-item{padding:8px 0;border-bottom:1px solid #f8f8f8;}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--red);}
.cmt-msg{font-size:.85rem;margin-top:2px;line-height:1.4;}
.cmt-time{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-top:2px;}
.cmt-form{padding:10px 16px 18px;border-top:1px solid #f0f0f0;background:#fff;position:sticky;bottom:0;}
.inp{width:100%;padding:10px 12px;border:1.5px solid #eee;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.85rem;outline:none;margin-bottom:8px;}
.inp:focus{border-color:var(--red);}
.btn-send{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;z-index:600;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- Top Bar -->

    <div class="topbar-logo">CQP Toulouse</div>

<nav class="bnav">

  </a>
  <a href="annonces.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

<!-- Pub Menu -->
<div class="pub-menu" id="pub-menu">

    <span>Story</span>
  </div>

<!-- Story Modal -->

    <input type="file" id="sinput-video" accept="video/*" capture="environment" style="display:none">
    <input type="file" id="sinput-gallery" accept="image/*,video/*" style="display:none">
    <button class="btn-primary" id="story-submit-btn" onclick="submitStory()" disabled>Publier la story</button>

</div>

<!-- Story Viewer -->
<div class="sv" id="sv">
  <div class="sv-progress" id="sv-progress"></div>
  <div class="sv-ui">
    <div class="sv-views" id="sv-views">👁 0</div>

  </div>
  <img id="sv-img" class="sv-media" style="display:none" alt="">
  <video id="sv-vid" class="sv-media" style="display:none" playsinline autoplay muted></video>
  <div class="sv-tap-l" onclick="svNav(-1)"></div>
  <div class="sv-tap-r" onclick="svNav(1)"></div>
</div>

<!-- Comment Drawer -->
<div class="drawer" id="cmt-drawer">
  <div class="drawer-bg" id="cmt-bg" onclick="closeDrawer()"></div>
  <div class="drawer-panel" id="cmt-panel">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="cmt-title">Commentaires</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="cmt-list" id="cmt-list"></div>
    <div class="cmt-form">
      <input class="inp" id="cmt-name" placeholder="Votre prénom" maxlength="40">
      <input class="inp" id="cmt-text" placeholder="Votre commentaire…" maxlength="500">
      <button class="btn-send" onclick="sendCmt()">Envoyer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL = 'https://vzfwtyczqfbhbjzotjft.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Global state ──────────────────────────────────────────────
var feedItems = [];
var feedPage = 0;
var feedDone = false;
var feedLoading = false;
var likedSet = {};
var cmtTarget = null;
var BATCH = 10;

// Stories globals (on window per spec)
window.storyFile = null;
window.storyFileType = null;
window.svStories = [];
var svIdx = 0;
var svTimer = null;

// ── Utilities ─────────────────────────────────────────────────
function getSid() {
  var s = sessionStorage.getItem('cqp_sid');
  if (!s) { s = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2)); sessionStorage.setItem('cqp_sid', s); }
  return s;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d) {
  var diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return 'à l\'instant';
  if (diff < 3600) return Math.floor(diff/60) + ' min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'j';
  return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function countdown(d) {
  var diff = new Date(d) - Date.now();
  if (diff < 0) return 'Terminé';
  var days = Math.floor(diff/86400000);
  var hrs = Math.floor((diff%86400000)/3600000);
  var mins = Math.floor((diff%3600000)/60000);
  if (days > 0) return 'Dans ' + days + 'j ' + hrs + 'h';
  if (hrs > 0) return 'Dans ' + hrs + 'h ' + mins + 'min';
  return 'Dans ' + mins + ' min';
}
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 3200);
}

// ── Stories bar ───────────────────────────────────────────────
function loadStories() {
  var now = new Date().toISOString();
  sb.from('stories').select('*').eq('visible', true).gt('expires_at', now).order('created_at', {ascending: false}).then(function(res) {
    if (res.error) return;
    window.svStories = res.data || [];
    renderStoriesBar();
  });
}

function renderStoriesBar() {
  var bar = document.getElementById('stories-bar');
  var addBtn = document.getElementById('story-add-btn');
  bar.innerHTML = '';
  bar.appendChild(addBtn);
  window.svStories.forEach(function(s, i) {
    var el = document.createElement('div');
    el.className = 'story-item';
    el.setAttribute('data-idx', i);
    el.onclick = function() { openSv(i); };
    var inner = s.type === 'video'
      ? '<div class="story-inner" style="background:#111;display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" fill="#fff" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
      : '<div class="story-inner"><img src="' + esc(s.url) + '" loading="lazy" alt="story"></div>';
    el.innerHTML =
      '<div class="story-ring' + (s.type === 'video' ? '' : '') + '">' +
        inner +
        (s.type === 'video' ? '<span class="story-vid-badge">▶</span>' : '') +
      '</div>' +
      '<span class="story-label">Story</span>' +
      '<span class="story-views">👁 ' + (s.views || 0) + '</span>';
    bar.appendChild(el);
  });
}

// ── Story modal ───────────────────────────────────────────────
function openStoryModal() {
  resetStoryModal();
  document.getElementById('story-overlay').classList.add('open');
}
function closeStoryModal() {
  document.getElementById('story-overlay').classList.remove('open');
  resetStoryModal();
}
function resetStoryModal() {
  window.storyFile = null;
  window.storyFileType = null;
  document.getElementById('story-preview').style.display = 'none';
  document.getElementById('sprev-img').style.display = 'none';
  document.getElementById('sprev-img').src = '';
  document.getElementById('sprev-vid').style.display = 'none';
  document.getElementById('sprev-vid').src = '';
  document.getElementById('story-btns').style.display = 'flex';
  document.getElementById('story-submit-btn').disabled = true;
  document.getElementById('story-submit-btn').textContent = 'Publier la story';
  ['sinput-photo','sinput-video','sinput-gallery'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
}
function triggerCapture(type) {
  if (type === 'photo') document.getElementById('sinput-photo').click();
  else if (type === 'video') document.getElementById('sinput-video').click();
  else document.getElementById('sinput-gallery').click();
}
function handleStoryFile(file) {
  if (!file) return;
  var maxSize = 50 * 1024 * 1024;
  if (file.size > maxSize) { toast('Fichier trop lourd (max 50 Mo)'); return; }
  window.storyFile = file;
  window.storyFileType = file.type.startsWith('video') ? 'video' : 'image';
  var preview = document.getElementById('story-preview');
  preview.style.display = 'block';
  document.getElementById('story-btns').style.display = 'none';
  var url = URL.createObjectURL(file);
  if (window.storyFileType === 'video') {
    var vid = document.getElementById('sprev-vid');
    vid.src = url;
    vid.style.display = 'block';
    document.getElementById('sprev-img').style.display = 'none';
  } else {
    var img = document.getElementById('sprev-img');
    img.src = url;
    img.style.display = 'block';
    document.getElementById('sprev-vid').style.display = 'none';
  }
  document.getElementById('story-submit-btn').disabled = false;
}
document.getElementById('sinput-photo').addEventListener('change', function(){ handleStoryFile(this.files[0]); });
document.getElementById('sinput-video').addEventListener('change', function(){ handleStoryFile(this.files[0]); });
document.getElementById('sinput-gallery').addEventListener('change', function(){ handleStoryFile(this.files[0]); });

function submitStory() {
  if (!window.storyFile) return;
  var btn = document.getElementById('story-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Upload en cours…';
  var nameParts = window.storyFile.name.split('.');
  var ext = nameParts.length > 1 ? nameParts.pop() : (window.storyFileType === 'video' ? 'mp4' : 'jpg');
  var path = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
  sb.storage.from('stories').upload(path, window.storyFile, {contentType: window.storyFile.type, upsert: false}).then(function(upRes) {
    if (upRes.error) {
      toast('Erreur upload : ' + upRes.error.message);
      btn.disabled = false;
      btn.textContent = 'Publier la story';
      return;
    }
    var url = SUPA_URL + '/storage/v1/object/public/stories/' + path;
    var expires = new Date(Date.now() + 24 * 3600 * 1000).toISOString();
    sb.from('stories').insert({
      url: url,
      type: window.storyFileType,
      visible: false,
      expires_at: expires,
      views: 0,
      session_id: getSid()
    }).then(function(insRes) {
      if (insRes.error) {
        toast('Erreur : ' + insRes.error.message);
        btn.disabled = false;
        btn.textContent = 'Publier la story';
        return;
      }
      closeStoryModal();
      toast('✓ Visible après validation (quelques minutes)');
    });
  });
}

// ── Story viewer ──────────────────────────────────────────────
function openSv(idx) {
  if (!window.svStories.length) return;
  svIdx = Math.max(0, Math.min(idx, window.svStories.length - 1));
  document.getElementById('sv').classList.add('open');
  svShow();
}
function closeSv() {
  document.getElementById('sv').classList.remove('open');
  clearTimeout(svTimer);
  var vid = document.getElementById('sv-vid');
  vid.pause();
  vid.src = '';
}
function svShow() {
  clearTimeout(svTimer);
  var s = window.svStories[svIdx];
  if (!s) { closeSv(); return; }
  document.getElementById('sv-views').textContent = '👁 ' + (s.views || 0);
  var img = document.getElementById('sv-img');
  var vid = document.getElementById('sv-vid');
  vid.pause();
  if (s.type === 'video') {
    img.style.display = 'none';
    vid.style.display = 'block';
    vid.src = s.url;
    vid.play();
  } else {
    vid.style.display = 'none';
    img.style.display = 'block';
    img.src = s.url;
  }
  // Progress segments
  var prog = document.getElementById('sv-progress');
  prog.innerHTML = window.svStories.map(function(_, i) {
    return '<div class="sv-seg"><div class="sv-seg-fill" id="svf-' + i + '"></div></div>';
  }).join('');
  for (var i = 0; i < svIdx; i++) {
    var f = document.getElementById('svf-' + i);
    if (f) f.style.width = '100%';
  }
  var dur = s.type === 'video' ? 15000 : 5000;
  var fill = document.getElementById('svf-' + svIdx);
  if (fill) {
    fill.style.transition = 'width ' + (dur / 1000) + 's linear';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { fill.style.width = '100%'; });
    });
  }
  svTimer = setTimeout(function() { svNav(1); }, dur);
  // Count view once per session
  var key = 'sv_' + s.id;
  if (!sessionStorage.getItem(key)) {
    sessionStorage.setItem(key, '1');
    var newViews = (s.views || 0) + 1;
    sb.from('stories').update({views: newViews}).eq('id', s.id).then(function() {
      s.views = newViews;
      var el = document.getElementById('sv-views');
      if (el) el.textContent = '👁 ' + newViews;
    });
  }
}
function svNav(dir) {
  svIdx += dir;
  if (svIdx < 0 || svIdx >= window.svStories.length) { closeSv(); return; }
  svShow();
}
// Swipe support
(function() {
  var sx = 0;
  var ov = document.getElementById('sv');
  ov.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; }, {passive: true});
  ov.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 48) svNav(dx < 0 ? 1 : -1);
  });
})();

// ── Feed ──────────────────────────────────────────────────────
function loadFeed() {
  Promise.all([
    sb.from('actus').select('id,titre,contenu,categorie,date_publication,photo_url').eq('visible', true),
    sb.from('evenements').select('id,titre,description,lieu,categorie,date_debut,photo_url').eq('visible', true).eq('validee', true).gt('date_debut', new Date().toISOString()),
    sb.from('annonces').select('id,titre,categorie,quartier,description,date_depot').eq('validee', true)
  ]).then(function(results) {
    var items = [];
    (results[0].data || []).forEach(function(a) {
      items.push({_type:'actu', _dbtype:'actu', _date: a.date_publication, id:a.id, titre:a.titre, contenu:a.contenu, categorie:a.categorie, photo_url:a.photo_url});
    });
    (results[1].data || []).forEach(function(e) {
      items.push({_type:'evt', _dbtype:'evenement', _date: e.date_debut, id:e.id, titre:e.titre, contenu:e.description, categorie:e.categorie, photo_url:e.photo_url, lieu:e.lieu, date_debut:e.date_debut});
    });
    (results[2].data || []).forEach(function(a) {
      items.push({_type:'ann', _dbtype:'annonce', _date: a.date_depot, id:a.id, titre:a.titre, contenu:a.description, categorie:a.categorie, quartier:a.quartier});
    });
    items.sort(function(a, b) { return new Date(b._date) - new Date(a._date); });
    feedItems = items;
    feedPage = 0;
    feedDone = false;
    document.getElementById('feed-count').textContent = items.length + ' publications';
    document.getElementById('feed').innerHTML = '';
    renderBatch();
    loadAllCounts();
  });
}

function renderBatch() {
  if (feedLoading || feedDone) return;
  feedLoading = true;
  var start = feedPage * BATCH;
  var batch = feedItems.slice(start, start + BATCH);
  if (!batch.length) { feedDone = true; feedLoading = false; showEnd(); return; }
  var feed = document.getElementById('feed');
  batch.forEach(function(item, i) {
    var el = document.createElement('div');
    el.className = 'card';
    el.id = 'card-' + item._type + '-' + item.id;
    el.innerHTML = buildCard(item);
    feed.appendChild(el);
    setTimeout(function() { el.classList.add('vis'); }, i * 35 + 20);
  });
  feedPage++;
  feedLoading = false;
  if (feedPage * BATCH >= feedItems.length) { feedDone = true; showEnd(); }
  // Start countdowns for evt cards
  batch.filter(function(i) { return i._type === 'evt'; }).forEach(function(e) {
    updateCountdown(e.id, e.date_debut);
  });
}

function showEnd() {
  var feed = document.getElementById('feed');
  if (!document.getElementById('feed-end')) {
    var el = document.createElement('div');
    el.id = 'feed-end';
    el.className = 'feed-end';
    el.textContent = feedItems.length ? '✓ Vous êtes à jour' : 'Aucune publication pour le moment';
    feed.appendChild(el);
  }
}

function updateCountdown(id, date) {
  var el = document.getElementById('cd-' + id);
  if (el) el.textContent = countdown(date);
  setTimeout(function() { updateCountdown(id, date); }, 30000);
}

function buildCard(item) {
  var typeLabel = {actu:'Actu', evt:'Événement', ann:'Annonce'}[item._type];
  var img = item.photo_url ? '<img class="card-img" src="' + esc(item.photo_url) + '" loading="lazy" alt="">' : '';
  var date = timeAgo(item._date);
  var extra = '';
  if (item._type === 'evt') {
    extra = '<div class="card-extra">' +
      '<div class="card-countdown" id="cd-' + item.id + '"></div>' +
      (item.lieu ? '<div class="card-loc"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(item.lieu) + '</div>' : '') +
    '</div>';
  }
  if (item._type === 'ann' && item.quartier) {
    extra = '<div class="card-extra"><div class="card-loc"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + esc(item.quartier) + '</div></div>';
  }
  return img +
    '<div class="card-body">' +
      '<div class="card-meta">' +
        '<span class="badge ' + item._type + '">' + typeLabel + '</span>' +
        (item.categorie ? '<span class="badge badge-cat">' + esc(item.categorie) + '</span>' : '') +
        '<span class="card-date">' + date + '</span>' +
      '</div>' +
      '<div class="card-title">' + esc(item.titre || '') + '</div>' +
      '<div class="card-text">' + esc(item.contenu || '') + '</div>' +
      extra +
    '</div>' +
    '<div class="card-footer">' +
      '<button class="btn-act" id="like-' + item._type + '-' + item.id + '" onclick="toggleLike(\'' + item._dbtype + '\',' + item.id + ',\'' + item._type + '\')">' +
        '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
        '<span id="lc-' + item._type + '-' + item.id + '">0</span>' +
      '</button>' +
      '<button class="btn-act" onclick="openDrawer(\'' + item._dbtype + '\',' + item.id + ',\'' + item._type + '\',\'' + esc(item.titre || '') + '\')">' +
        '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<span id="cc-' + item._type + '-' + item.id + '">0</span>' +
      '</button>' +
    '</div>';
}

// Infinite scroll
window.addEventListener('scroll', function() {
  if (!feedDone && window.innerHeight + window.scrollY >= document.body.offsetHeight - 240) renderBatch();
}, {passive: true});

// ── Likes & counts ────────────────────────────────────────────
function loadAllCounts() {
  var sid = getSid();
  var byType = {actu: [], evenement: [], annonce: []};
  feedItems.forEach(function(i) { byType[i._dbtype] && byType[i._dbtype].push(i.id); });

  Object.keys(byType).forEach(function(dbtype) {
    var ids = byType[dbtype];
    if (!ids.length) return;
    var localType = dbtype === 'evenement' ? 'evt' : dbtype === 'annonce' ? 'ann' : 'actu';

    sb.from('likes').select('item_id').eq('item_type', dbtype).in('item_id', ids).then(function(res) {
      var counts = {};
      (res.data || []).forEach(function(l) { counts[l.item_id] = (counts[l.item_id] || 0) + 1; });
      Object.keys(counts).forEach(function(id) {
        var el = document.getElementById('lc-' + localType + '-' + id);
        if (el) el.textContent = counts[id];
      });
    });

    sb.from('likes').select('item_id').eq('item_type', dbtype).eq('session_id', sid).in('item_id', ids).then(function(res) {
      (res.data || []).forEach(function(l) {
        likedSet[localType + '-' + l.item_id] = true;
        var btn = document.getElementById('like-' + localType + '-' + l.item_id);
        if (btn) btn.classList.add('liked');
      });
    });

    sb.from('commentaires').select('item_id').eq('item_type', dbtype).eq('visible', true).in('item_id', ids).then(function(res) {
      var counts = {};
      (res.data || []).forEach(function(l) { counts[l.item_id] = (counts[l.item_id] || 0) + 1; });
      Object.keys(counts).forEach(function(id) {
        var el = document.getElementById('cc-' + localType + '-' + id);
        if (el) el.textContent = counts[id];
      });
    });
  });
}

function toggleLike(dbtype, id, localType) {
  var key = localType + '-' + id;
  var btn = document.getElementById('like-' + key);
  var cnt = document.getElementById('lc-' + key);
  var sid = getSid();
  if (likedSet[key]) {
    sb.from('likes').delete().eq('item_type', dbtype).eq('item_id', id).eq('session_id', sid).then(function(r) {
      if (!r.error) { likedSet[key] = false; btn.classList.remove('liked'); cnt.textContent = Math.max(0, parseInt(cnt.textContent || 0) - 1); }
    });
  } else {
    sb.from('likes').insert({item_type: dbtype, item_id: id, session_id: sid}).then(function(r) {
      if (!r.error) { likedSet[key] = true; btn.classList.add('liked'); cnt.textContent = parseInt(cnt.textContent || 0) + 1; }
    });
  }
}

// ── Comment drawer ────────────────────────────────────────────
function openDrawer(dbtype, id, localType, title) {
  cmtTarget = {dbtype: dbtype, id: id, localType: localType};
  document.getElementById('cmt-title').textContent = title;
  document.getElementById('cmt-drawer').style.pointerEvents = 'auto';
  document.getElementById('cmt-bg').classList.add('open');
  document.getElementById('cmt-panel').classList.add('open');
  var saved = localStorage.getItem('cqp_prenom');
  if (saved) document.getElementById('cmt-name').value = saved;
  loadCmts();
}
function closeDrawer() {
  document.getElementById('cmt-bg').classList.remove('open');
  document.getElementById('cmt-panel').classList.remove('open');
  cmtTarget = null;
}
function loadCmts() {
  if (!cmtTarget) return;
  sb.from('commentaires').select('*').eq('item_type', cmtTarget.dbtype).eq('item_id', cmtTarget.id).eq('visible', true).order('created_at', {ascending: true}).then(function(res) {
    var list = document.getElementById('cmt-list');
    if (!res.data || !res.data.length) {
      list.innerHTML = '<div style="padding:14px 0;text-align:center;color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem;">Aucun commentaire</div>';
      return;
    }
    list.innerHTML = res.data.map(function(c) {
      return '<div class="cmt-item"><div class="cmt-name">' + esc(c.prenom) + '</div><div class="cmt-msg">' + esc(c.message) + '</div><div class="cmt-time">' + timeAgo(c.created_at) + '</div></div>';
    }).join('');
  });
}
function sendCmt() {
  if (!cmtTarget) return;
  var name = document.getElementById('cmt-name').value.trim();
  var text = document.getElementById('cmt-text').value.trim();
  if (!name || !text) { toast('Prénom et commentaire requis'); return; }
  localStorage.setItem('cqp_prenom', name);
  sb.from('commentaires').insert({item_type: cmtTarget.dbtype, item_id: cmtTarget.id, prenom: name, message: text, visible: true}).then(function(r) {
    if (r.error) { toast('Erreur : ' + r.error.message); return; }
    document.getElementById('cmt-text').value = '';
    toast('Commentaire publié ✓');
    loadCmts();
    var el = document.getElementById('cc-' + cmtTarget.localType + '-' + cmtTarget.id);
    if (el) el.textContent = parseInt(el.textContent || 0) + 1;
  });
}

// ── Pub menu ──────────────────────────────────────────────────
function togglePubMenu() {
  document.getElementById('pub-menu').classList.toggle('open');
}
function closePubMenu() {
  document.getElementById('pub-menu').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!document.getElementById('pub-menu').contains(e.target) && !document.getElementById('fab-btn').contains(e.target)) {
    closePubMenu();
  }
}, {passive: true});

// ── Init ──────────────────────────────────────────────────────
loadStories();
loadFeed();
</script>
