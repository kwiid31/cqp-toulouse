<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CQP Toulouse — Quartiers Populaires</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --r:#C8102E; --r2:#fff0f2; --or:#E8940F;
  --txt:#1A1A1A; --txt2:#555; --txt3:#999;
  --bg:#fff; --bg2:#F7F8FA; --bg3:#F0F2F5;
  --brd:#E4E6EA; --radius:12px;
  --nav:60px; --bar:64px;
}
html{font-size:16px}
body{background:var(--bg2);color:var(--txt);font-family:'Barlow',sans-serif;
  padding-bottom:calc(var(--bar) + env(safe-area-inset-bottom) + 8px)}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none}
img,video{max-width:100%;display:block}
</style>
</head>
<style>
/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--brd);
  height:var(--nav);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo-pill{background:var(--r);color:#fff;font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;letter-spacing:1px;padding:5px 12px;border-radius:6px}
.logo-right .logo-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px}
.logo-right .logo-tag{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;
  letter-spacing:2px;text-transform:uppercase;color:var(--txt3)}
.topbar-right{display:flex;align-items:center;gap:8px}
.live-ticker{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;
  font-size:.68rem;letter-spacing:1px;color:var(--txt3)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;
  animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.icon-btn{width:38px;height:38px;background:var(--bg2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:var(--bg3)}
.icon-btn svg{width:20px;height:20px;stroke:var(--txt2);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
</style>
<style>
/* ── STORIES BAR ── */
.stories-bar{background:var(--bg);border-bottom:1px solid var(--brd);
  padding:10px 0 10px 12px;display:flex;gap:10px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.stories-bar::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:4px;
  flex-shrink:0;cursor:pointer;user-select:none}
.story-ring{width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--r),var(--or));
  padding:2.5px;transition:transform .15s}
.story-ring:active{transform:scale(.92)}
.story-ring.seen{background:var(--brd)}
.story-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:var(--bg2);border:2.5px solid var(--bg);
  display:flex;align-items:center;justify-content:center}
.story-inner img,.story-inner video{width:100%;height:100%;object-fit:cover}
.story-add-icon{font-size:1.5rem;color:var(--r)}
.story-label{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;
  letter-spacing:.3px;color:var(--txt2);text-align:center;
  max-width:58px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-views{font-size:.5rem;color:var(--txt3);font-family:'Barlow Condensed',sans-serif}
.story-vid-badge{position:absolute;bottom:1px;right:1px;background:rgba(0,0,0,.65);
  color:#fff;border-radius:3px;font-size:.42rem;padding:1px 3px}
</style>
<style>
/* ── FEED CARDS ── */
.feed{max-width:680px;margin:0 auto;padding:10px 0}
.feed-card{background:var(--bg);border-radius:var(--radius);
  margin:0 8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  overflow:hidden;transition:box-shadow .2s}
.feed-card:active{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.card-av{width:38px;height:38px;min-width:38px;border-radius:50%;
  background:var(--r);display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#fff;overflow:hidden}
.card-av img{width:100%;height:100%;object-fit:cover}
.card-meta{flex:1;min-width:0}
.card-source{font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.88rem;color:var(--txt)}
.card-time{font-size:.72rem;color:var(--txt3)}
.card-badge{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;
  letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;
  border-radius:4px;white-space:nowrap;color:#fff}
.badge-actu{background:var(--r)}
.badge-evt{background:#1565C0}
.badge-ann{background:#2E7D32}
.card-cover{width:100%;height:195px;object-fit:cover;display:block}
.card-cover-ph{height:175px;display:flex;flex-direction:column;
  justify-content:flex-end;padding:16px;position:relative;overflow:hidden}
.card-cover-ph::before{content:'';position:absolute;inset:0;opacity:.92}
.cov-actu::before{background:linear-gradient(155deg,#1a0508,#5a0b18 50%,var(--r))}
.cov-evt::before{background:linear-gradient(155deg,#0a0d2a,#1a2a7a 50%,#2244cc)}
.cov-ann::before{background:linear-gradient(155deg,#0a1a0e,#1a4a24 50%,#2a7a3a)}
.card-cover-cat{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;
  letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.6);
  position:relative;z-index:1;margin-bottom:4px}
.card-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;
  color:#fff;line-height:1.15;position:relative;z-index:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-cover-date{font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:#fff;opacity:.9;position:relative;z-index:1;line-height:1}
</style>
<style>
/* ── CARD BODY & ACTIONS ── */
.card-body{padding:12px 14px 8px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:1.02rem;line-height:1.3;color:var(--txt);margin-bottom:5px}
.card-text{font-size:.86rem;color:var(--txt2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;letter-spacing:1px;
  text-transform:uppercase;background:var(--bg2);color:var(--txt2);
  padding:3px 8px;border-radius:20px;border:1px solid var(--brd)}
.tag-countdown{background:var(--r2);color:var(--r);border-color:rgba(200,16,46,.2);font-weight:700}
.tag-new{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}

.card-read-btn{display:block;margin:0 14px 12px;padding:9px;
  background:var(--bg2);border-radius:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--txt2);text-align:center;transition:background .15s;width:calc(100% - 28px)}
.card-read-btn:hover{background:var(--bg3)}

.card-actions{display:flex;border-top:1px solid var(--bg2);padding:4px 8px;gap:2px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 4px;background:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--txt2);
  transition:background .15s}
.act-btn:hover,.act-btn:active{background:var(--bg2)}
.act-btn.liked{color:var(--r)}
.act-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.act-btn.liked svg{stroke:var(--r);fill:var(--r)}
.act-sep{width:1px;height:26px;background:var(--brd);align-self:center;flex-shrink:0}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.popping{animation:pop .25s ease}
</style>
<style>
/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--bg);
  border-top:1px solid var(--brd);box-shadow:0 -2px 10px rgba(0,0,0,.05);
  display:flex;align-items:stretch;height:var(--bar);
  padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;color:var(--txt3);text-decoration:none;
  font-family:'Barlow Condensed',sans-serif;font-size:.5rem;
  letter-spacing:.5px;text-transform:uppercase;padding:6px 0}
.nav-item.active{color:var(--r)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-pub-wrap{display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding-bottom:6px;flex-shrink:0}
.nav-pub{width:50px;height:50px;border-radius:50%;background:var(--r);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;margin-top:-14px;box-shadow:0 4px 14px rgba(200,16,46,.45);
  transition:transform .15s,box-shadow .15s;font-family:'Barlow Condensed',sans-serif}
.nav-pub:active{transform:scale(.92);box-shadow:0 2px 6px rgba(200,16,46,.3)}
.nav-pub-icon{font-size:1.3rem;line-height:1}
.nav-pub-lbl{font-size:.4rem;letter-spacing:1.5px;text-transform:uppercase}

/* ── PUB MENU ── */
.pub-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400}
.pub-overlay.open{display:block}
.pub-menu{position:fixed;bottom:calc(var(--bar) + env(safe-area-inset-bottom) + 10px);
  left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg);border-radius:16px;padding:8px;min-width:240px;
  z-index:401;box-shadow:0 8px 32px rgba(0,0,0,.15);
  opacity:0;pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1)}
.pub-menu.open{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
.pub-item{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-radius:10px;width:100%;text-align:left;background:none;
  font-family:'Barlow Condensed',sans-serif;font-size:.88rem;
  letter-spacing:.5px;text-transform:uppercase;color:var(--txt);
  transition:background .15s}
.pub-item:hover,.pub-item:active{background:var(--bg2)}
.pub-item-ico{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.pub-item-sub{font-size:.7rem;color:var(--txt3);text-transform:none;
  letter-spacing:0;font-family:'Barlow',sans-serif;margin-top:1px}
</style>
<style>
/* ── DRAWERS ── */
.drawer-ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5)}
.drawer-ov.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideIn .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:var(--bg);
  border-bottom:1px solid var(--brd);padding:16px;
  display:flex;align-items:flex-start;gap:12px;flex-shrink:0;z-index:1}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;flex:1;line-height:1.2}
.drawer-body{padding:16px;overflow-y:auto;flex:1}
.drawer-text{font-size:.9rem;color:var(--txt2);line-height:1.85;white-space:pre-wrap}
.close-btn{width:30px;height:30px;border:1px solid var(--brd);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
  background:none;cursor:pointer;flex-shrink:0;color:var(--txt2)}

/* ── MINI DRAWER COMMENTAIRES ── */
.mini-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600}
.mini-ov.open{display:block}
.mini-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);
  border-top:3px solid var(--r);border-radius:20px 20px 0 0;
  max-height:75vh;display:flex;flex-direction:column;z-index:601;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mini-drawer.open{transform:none}
.mini-drag{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto 6px}
.mini-head{padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bg2);flex-shrink:0}
.mini-head h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:1rem;letter-spacing:.5px}
.mini-body{overflow-y:auto;padding:12px 16px;flex:1}
.mini-foot{padding:12px 16px;border-top:1px solid var(--bg2);
  display:flex;flex-direction:column;gap:8px;flex-shrink:0;
  padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cmt-item{display:flex;gap:9px;margin-bottom:10px}
.cmt-av{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:#fff}
.cmt-bubble{background:var(--bg2);border-radius:0 10px 10px 10px;padding:8px 12px;flex:1}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;
  letter-spacing:1px;text-transform:uppercase;color:var(--r);margin-bottom:2px;font-weight:700}
.cmt-text{font-size:.84rem;color:var(--txt);line-height:1.5}
.cmt-input{background:var(--bg2);border:1px solid var(--brd);border-radius:24px;
  padding:10px 16px;color:var(--txt);font-family:'Barlow',sans-serif;
  font-size:.9rem;outline:none;width:100%;transition:border .15s}
.cmt-input:focus{border-color:var(--r)}
.cmt-row{display:flex;gap:8px}
.cmt-send{background:var(--r);color:#fff;width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-send svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.5;
  stroke-linecap:round;stroke-linejoin:round}
</style>
<style>
/* ── STORY MODAL ── */
.story-modal-ov{display:none;position:fixed;inset:0;z-index:700;
  background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center}
.story-modal-ov.open{display:flex}
.story-modal{background:var(--bg);border-radius:20px 20px 0 0;
  width:100%;max-width:520px;padding:20px 20px 32px;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.story-modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;margin-bottom:16px}
.story-zone{border:2px dashed var(--r);border-radius:12px;height:185px;
  position:relative;overflow:hidden;background:var(--r2);margin-bottom:14px;
  display:flex;align-items:center;justify-content:center}
.story-zone img,.story-zone video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.story-zone-btns{display:flex;gap:8px;flex-direction:column;align-items:center;z-index:1;position:relative}
.story-zone-row{display:flex;gap:8px}
.sz-btn{padding:8px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;border:none}
.sz-photo{background:var(--r)}
.sz-video{background:#1565C0}
.sz-gallery{background:#2E7D32}
.story-label-inp{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:4px}
.story-inp{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;
  padding:10px 14px;font-family:'Barlow',sans-serif;font-size:.9rem;
  color:var(--txt);outline:none;transition:border .15s;margin-bottom:12px}
.story-inp:focus{border-color:var(--r)}
.story-submit{width:100%;background:var(--r);color:#fff;border-radius:8px;
  padding:13px;font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;letter-spacing:2px;text-transform:uppercase}
.story-msg{text-align:center;padding:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;border-radius:6px;margin-top:10px;display:none}
.story-msg.ok{background:#f0fdf4;color:#16a34a;display:block}
.story-msg.err{background:var(--r2);color:var(--r);display:block}

/* ── STORY VIEWER ── */
.story-viewer{display:none;position:fixed;inset:0;z-index:800;
  background:#000;flex-direction:column}
.story-viewer.open{display:flex}
.sv-progress{display:flex;gap:3px;padding:12px 12px 8px;position:relative;z-index:2}
.sv-bar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.sv-fill{height:100%;background:#fff;width:0;border-radius:2px}
.sv-fill.done{width:100%}
.sv-head{display:flex;align-items:center;gap:10px;padding:0 12px 12px;position:relative;z-index:2}
.sv-av{width:36px;height:36px;border-radius:50%;background:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#fff;flex-shrink:0}
.sv-meta{flex:1}
.sv-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.88rem;color:#fff}
.sv-time{font-size:.72rem;color:rgba(255,255,255,.6)}
.sv-views-badge{display:flex;align-items:center;gap:3px;font-family:'Barlow Condensed',sans-serif;
  font-size:.75rem;color:rgba(255,255,255,.7);margin-right:6px}
.sv-close{background:rgba(255,255,255,.15);border:none;color:#fff;
  width:32px;height:32px;border-radius:50%;font-size:1rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.sv-media{position:absolute;inset:0}
.sv-media img,.sv-media video{width:100%;height:100%;object-fit:cover}
.sv-nav{position:absolute;inset:0;display:flex;z-index:1}
.sv-prev{flex:1;cursor:pointer}
.sv-next{flex:1;cursor:pointer}
</style>
<style>
/* ── FORMULAIRE ANNONCE ── */
.form-group{margin-bottom:12px}
.form-lbl{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:4px}
.form-ctrl{width:100%;background:var(--bg2);border:1px solid var(--brd);
  border-radius:8px;padding:10px 14px;font-family:'Barlow',sans-serif;
  font-size:.9rem;color:var(--txt);outline:none;transition:border .15s}
.form-ctrl:focus{border-color:var(--r)}
textarea.form-ctrl{resize:vertical;min-height:80px}
select.form-ctrl{cursor:pointer}
.form-submit{width:100%;background:var(--r);color:#fff;border-radius:8px;
  padding:13px;font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;letter-spacing:2px;text-transform:uppercase}
.form-msg{text-align:center;padding:8px;font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;border-radius:6px;margin-top:10px;display:none}
.form-msg.ok{background:#f0fdf4;color:#16a34a;display:block}
.form-msg.err{background:var(--r2);color:var(--r);display:block}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--bar) + 10px);left:50%;
  transform:translateX(-50%);background:rgba(13,13,13,.9);color:#fff;
  padding:8px 18px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;
  font-size:.82rem;letter-spacing:.5px;z-index:9999;pointer-events:none;
  transition:opacity .3s;opacity:0;white-space:nowrap}
.toast.show{opacity:1}

/* ── SPINNER / EMPTY ── */
.spinner{text-align:center;padding:40px;color:var(--txt3);
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(10px);
  transition:opacity .3s ease,transform .3s ease}

<script>
// ── LIKES ────────────────────────────────────────────────
async function loadCounts(type, ids) {
  if (!ids.length) return;
  const sid = getSid();
  const [{ data: lk }, { data: my }, { data: cm }] = await Promise.all([
    sb.from('likes').select('item_id').eq('item_type', type).in('item_id', ids),
    sb.from('likes').select('item_id').eq('item_type', type).eq('session_id', sid).in('item_id', ids),
    sb.from('commentaires').select('item_id').eq('item_type', type).eq('visible', true).in('item_id', ids)
  ]);
  const lm = {}, mm = {}, cm2 = {};
  (lk||[]).forEach(r => { lm[r.item_id] = (lm[r.item_id]||0) + 1; });
  (my||[]).forEach(r => { mm[r.item_id] = true; });
  (cm||[]).forEach(r => { cm2[r.item_id] = (cm2[r.item_id]||0) + 1; });
  ids.forEach(id => {
    const liked = !!mm[id];
    const btn = document.getElementById('lk-' + id);
    if (btn) {
      btn.classList.toggle('liked', liked);
      const svg = btn.querySelector('svg');
      if (svg) svg.style.fill = liked ? 'var(--r)' : 'none';
      const lc = btn.querySelector('.lc');
      if (lc) lc.textContent = lm[id] || 0;
    }
    const cc = document.getElementById('cc-' + id);
    if (cc) cc.textContent = cm2[id] || 0;
  });
}

async function toggleLike(type, id) {
  const sid = getSid();
  const btn = document.getElementById('lk-' + id);
  if (!btn) return;
  const liked = btn.classList.contains('liked');
  btn.classList.add('popping');
  setTimeout(() => btn.classList.remove('popping'), 300);
  if (liked) {
    await sb.from('likes').delete().eq('item_type', type).eq('item_id', id).eq('session_id', sid);
    btn.classList.remove('liked');
    const svg = btn.querySelector('svg'); if (svg) svg.style.fill = 'none';
  } else {
    await sb.from('likes').insert({ item_type: type, item_id: id, session_id: sid }).catch(() => {});
    btn.classList.add('liked');
    const svg = btn.querySelector('svg'); if (svg) svg.style.fill = 'var(--r)';
    heartBurst(btn);
    toast('❤️ +1');
  }
  const { data: l } = await sb.from('likes').select('item_id').eq('item_type', type).eq('item_id', id);
  const lc = btn.querySelector('.lc'); if (lc) lc.textContent = (l||[]).length;
}

function heartBurst(btn) {
  const r = btn.getBoundingClientRect();
  ['❤️','✊','💛'].forEach(e => {
    const p = document.createElement('span');
    p.textContent = e;
    p.style.cssText = `position:fixed;left:${r.left+r.width/2}px;top:${r.top}px;font-size:.95rem;pointer-events:none;z-index:9999;transition:all .65s ease-out;opacity:1`;
    document.body.appendChild(p);
    requestAnimationFrame(() => { p.style.transform = `translate(${(Math.random()-.5)*60}px,-${28+Math.random()*32}px)`; p.style.opacity = '0'; });
    setTimeout(() => p.remove(), 700);
  });
}
</script>
<script>
// ── COMMENTAIRES ────────────────────────────────────────
let miniType = null, miniId = null;

function openMini(type, id, titre) {
  miniType = type; miniId = id;
  document.getElementById('mini-title').textContent = '💬 ' + (titre||'').substring(0, 30);
  document.getElementById('mini-ov').classList.add('open');
  document.getElementById('mini-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  const p = getPre(); if (p) document.getElementById('mini-prenom').value = p;
  loadCmts();
}
function closeMini() {
  document.getElementById('mini-ov').classList.remove('open');
  document.getElementById('mini-drawer').classList.remove('open');
  document.body.style.overflow = '';
  miniType = null; miniId = null;
}
async function loadCmts() {
  if (!miniType || !miniId) return;
  const { data } = await sb.from('commentaires').select('*')
    .eq('item_type', miniType).eq('item_id', miniId)
    .eq('visible', true).order('created_at', { ascending: true });
  const box = document.getElementById('mini-body'); if (!box) return;
  const list = data || [];
  const cc = document.getElementById('cc-' + miniId); if (cc) cc.textContent = list.length;
  box.innerHTML = list.length
    ? list.map(c => `<div class="cmt-item"><div class="cmt-av">${esc(c.prenom||'?')[0].toUpperCase()}</div><div class="cmt-bubble"><div class="cmt-name">${esc(c.prenom)}</div><div class="cmt-text">${esc(c.message)}</div></div></div>`).join('')
    : '<p style="color:var(--txt3);text-align:center;padding:24px;font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem">Soyez le premier à commenter !</p>';
  box.scrollTop = box.scrollHeight;
}
async function sendCmt() {
  const msg = document.getElementById('mini-msg')?.value.trim();
  const prenom = document.getElementById('mini-prenom')?.value.trim() || 'Anonyme';
  if (!msg || !miniType || !miniId) return;
  savePre(prenom);
  document.getElementById('mini-msg').value = '';
  await sb.from('commentaires').insert({ item_type: miniType, item_id: miniId, prenom, message: msg, visible: true });
  loadCmts();
}
</script>

async function updateTicker() {
  const t = new Date(Date.now() - 5 * 60 * 1000).toISOString();
  const { count } = await sb.from('active_sessions').select('*', { count: 'exact', head: true }).gte('last_seen', t).catch(() => ({ count: 0 }));

// ── ANNONCE SUBMIT ───────────────────────────────────────
async function submitAnn() {
  const titre = document.getElementById('a-titre')?.value.trim();
  const quartier = document.getElementById('a-quartier')?.value.trim();
  const desc = document.getElementById('a-desc')?.value.trim();
  const prenom = document.getElementById('a-prenom')?.value.trim();
  const email = document.getElementById('a-email')?.value.trim();
  const cat = document.getElementById('a-cat')?.value;
  const tel = document.getElementById('a-tel')?.value.trim();
  const msg = document.getElementById('a-msg');
  if (!titre || !quartier || !desc || !prenom || !email) {
    if (msg) { msg.textContent = '⚠ Tous les champs * sont requis.'; msg.className = 'form-msg err'; } return;
  }
  const { error } = await sb.from('annonces').insert({ titre, categorie: cat, quartier, description: desc, prenom, email, telephone: tel || null, validee: false });
  if (error) { if (msg) { msg.textContent = '⚠ ' + error.message; msg.className = 'form-msg err'; } }
  else { if (msg) { msg.textContent = '✅ Annonce envoyée ! Publication sous 24–48h.'; msg.className = 'form-msg ok'; } setTimeout(() => closeDr('dr-ann'), 2500); }
}

<script>
// ── STORIES ──────────────────────────────────────────────
let storyFile = null;
let storyVideoFile = null;
let svStories = [];
let svIdx = 0;
let svTimer = null;
const SV_DUR = 5000;

function openStoryModal() {
  storyFile = null; storyVideoFile = null;
  document.getElementById('story-zone').querySelectorAll('img,video').forEach(el => el.remove());
  document.getElementById('story-zone-btns').style.display = '';
  const msg = document.getElementById('story-msg'); if (msg) { msg.className = 'story-msg'; msg.textContent = ''; }
  const btn = document.getElementById('story-submit-btn'); if (btn) { btn.disabled = false; btn.textContent = 'Publier ma story ✨'; }
  const p = getPre(); if (p) document.getElementById('story-prenom-inp').value = p;
  document.getElementById('story-modal-ov').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Ouvrir caméra photo directement
  setTimeout(() => triggerStory('photo'), 150);
}

function closeStoryModal() {
  document.getElementById('story-modal-ov').classList.remove('open');
  document.body.style.overflow = '';
}

function triggerStory(mode) {
  const inp = document.getElementById('story-file-input');
  if (!inp) return;
  if (mode === 'photo') { inp.accept = 'image/*'; inp.setAttribute('capture', 'environment'); }
  else if (mode === 'video') { inp.accept = 'video/*'; inp.setAttribute('capture', 'environment'); }
  else { inp.accept = 'image/*,video/*'; inp.removeAttribute('capture'); }
  inp.click();
}

function onStoryFile(input) {
  const file = input.files[0]; if (!file) return;
  const isVideo = file.type.startsWith('video/');
  if (isVideo) { storyVideoFile = file; storyFile = null; }
  else { storyFile = file; storyVideoFile = null; }
  const zone = document.getElementById('story-zone');
  zone.querySelectorAll('img,video').forEach(el => el.remove());
  document.getElementById('story-zone-btns').style.display = 'none';
  if (isVideo) {
    const v = document.createElement('video');
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true;
    v.src = URL.createObjectURL(file); zone.appendChild(v);
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
      img.src = e.target.result; zone.appendChild(img);
    };
    reader.readAsDataURL(file);
  }
}

function showStoryMsg(txt, type) {
  const el = document.getElementById('story-msg');
  if (!el) return;
  el.textContent = txt; el.className = 'story-msg ' + type;
}

async function submitStory() {
  const prenom = (document.getElementById('story-prenom-inp')?.value || '').trim();
  const file = storyVideoFile || storyFile;
  if (!file) { showStoryMsg('⚠ Choisis une photo ou vidéo', 'err'); return; }
  if (!prenom) { showStoryMsg('⚠ Entre ton prénom', 'err'); return; }
  const btn = document.getElementById('story-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Publication…'; }
  try {
    const isVideo = file.type.startsWith('video/');
    const ext = (file.name || '').split('.').pop() || (isVideo ? 'mp4' : 'jpg');
    const fname = 'story_' + Date.now() + '.' + ext;
    const { data: up, error: upErr } = await sb.storage.from('stories').upload(fname, file, { contentType: file.type, upsert: false });
    if (upErr) throw upErr;
    const { data: { publicUrl } } = sb.storage.from('stories').getPublicUrl(fname);
    const { error: dbErr } = await sb.from('stories').insert({
      prenom, photo_url: publicUrl, visible: false,
      media_type: isVideo ? 'video' : 'photo', views: 0,
      expires_at: new Date(Date.now() + 24 * 3600 * 1000).toISOString()
    });
    if (dbErr) throw dbErr;
    showStoryMsg('✅ Story envoyée ! Visible après validation.', 'ok');
    savePre(prenom);
    setTimeout(() => closeStoryModal(), 2000);
  } catch (e) {
    showStoryMsg('⚠ Erreur: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Publier ma story ✨'; }
  }
}
</script>
<script>
// ── STORIES VIEWER ───────────────────────────────────────
async function loadStories() {
  const now = new Date().toISOString();
  const { data } = await sb.from('stories').select('*')
    .eq('visible', true).gt('expires_at', now)
    .order('created_at', { ascending: false }).limit(20);
  svStories = data || [];
  renderStoriesBar();
}

function getSeen() { try { return new Set(JSON.parse(localStorage.getItem('cqp_seen') || '[]')); } catch { return new Set(); } }
function markSeen(id) { try { const s = getSeen(); s.add(String(id)); localStorage.setItem('cqp_seen', JSON.stringify([...s])); } catch {} }

function renderStoriesBar() {
  const bar = document.getElementById('stories-bar'); if (!bar) return;
  bar.querySelectorAll('.sv-dyn').forEach(el => el.remove());
  const seen = getSeen();
  svStories.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'story sv-dyn';
    div.onclick = () => openStoryViewer(i);
    const isVid = s.media_type === 'video';
    div.innerHTML = `<div class="story-ring${seen.has(String(s.id)) ? ' seen' : ''}" style="position:relative">
      <div class="story-inner"><img src="${esc(s.photo_url || '')}" loading="lazy"></div>
      ${isVid ? '<div class="story-vid-badge">▶</div>' : ''}
    </div>
    <span class="story-label">${esc((s.prenom || '').substring(0, 10))}</span>
    ${(s.views || 0) > 0 ? `<span class="story-views">👁 ${s.views}</span>` : ''}`;
    bar.appendChild(div);
  });
}

function openStoryViewer(idx) {
  if (!svStories.length) return;
  svIdx = idx;
  document.getElementById('story-viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderSvSlide();
  // Incrémenter vues
  const s = svStories[idx];
  if (s && s.id) {
    sb.from('stories').update({ views: (s.views || 0) + 1 }).eq('id', s.id).then(() => {
      s.views = (s.views || 0) + 1;
      const vc = document.getElementById('sv-views'); if (vc) vc.textContent = s.views;
      renderStoriesBar();
    });
  }
}

function closeStoryViewer() {
  clearTimeout(svTimer);
  document.getElementById('story-viewer').classList.remove('open');
  document.body.style.overflow = '';
  const media = document.getElementById('sv-media'); if (media) { const v = media.querySelector('video'); if (v) { v.pause(); v.src = ''; } media.innerHTML = ''; }
}

function svNav(dir) {
  clearTimeout(svTimer);
  svIdx += dir;
  if (svIdx < 0 || svIdx >= svStories.length) { closeStoryViewer(); return; }
  renderSvSlide();
}

function renderSvSlide() {
  clearTimeout(svTimer);
  const s = svStories[svIdx]; if (!s) return;
  markSeen(s.id);
  // Vues
  const vc = document.getElementById('sv-views'); if (vc) vc.textContent = s.views || 0;
  // Média
  const media = document.getElementById('sv-media');
  const v = media.querySelector('video'); if (v) { v.pause(); v.src = ''; }
  media.innerHTML = '';
  if (s.media_type === 'video') {
    const vid = document.createElement('video');
    vid.src = s.photo_url || ''; vid.autoplay = true; vid.muted = true; vid.loop = true; vid.playsInline = true;
    vid.style.cssText = 'width:100%;height:100%;object-fit:cover';
    media.appendChild(vid); vid.play().catch(() => {});
  } else {
    const img = document.createElement('img');
    img.src = s.photo_url || ''; img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    media.appendChild(img);
  }
  // Meta
  document.getElementById('sv-av').textContent = (s.prenom || '?')[0].toUpperCase();
  document.getElementById('sv-name').textContent = s.prenom || '';
  document.getElementById('sv-time').textContent = timeAgo(s.created_at);
  // Progress
  const prog = document.getElementById('sv-progress');
  prog.innerHTML = svStories.map((_, i) => `<div class="sv-bar"><div class="sv-fill${i < svIdx ? ' done' : ''}" id="svf-${i}"></div></div>`).join('');
  requestAnimationFrame(() => {
    const fill = document.getElementById('svf-' + svIdx);
    if (fill) { fill.style.transition = `width ${SV_DUR}ms linear`; fill.style.width = '100%'; }
  });
  svTimer = setTimeout(() => svNav(1), SV_DUR);
}

// Swipe stories
(function () {
  let sx = 0, sy = 0;
  const v = document.getElementById('story-viewer');
  if (!v) return;
  v.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
  v.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx, dy = Math.abs(e.changedTouches[0].clientY - sy);
    if (Math.abs(dx) > 50 && dy < 60) { dx < 0 ? svNav(1) : svNav(-1); }
  }, { passive: true });
})();
</script>
<script>
// ── FEED BUILDER ─────────────────────────────────────────
function actBar(type, id, titre) {
  const t = esc(titre.substring(0, 28).replace(/'/g, "\\'"));
  return `<div class="card-actions">
    <button class="act-btn" id="lk-${id}" onclick="toggleLike('${type}',${id})">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="lc">0</span>
    </button>
    <div class="act-sep"></div>
    <button class="act-btn" id="cm-${id}" onclick="openMini('${type}',${id},'${t}')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span id="cc-${id}">0</span>
    </button>
    <div class="act-sep"></div>
    <button class="act-btn" onclick="navigator.share?.({title:'${t}',url:location.href})">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>`;
}

function renderActu(a) {
  const cover = a.photo_url
    ? `<img class="card-cover" src="${esc(a.photo_url)}" loading="lazy" alt="">`
    : `<div class="card-cover-ph cov-actu"><div class="card-cover-cat">${esc(a.categorie)}</div><div class="card-cover-title">${esc(a.titre)}</div></div>`;
  return `<article class="feed-card reveal" id="card-${a.id}">
    <div class="card-head">
      <div class="card-av">CQP</div>
      <div class="card-meta"><div class="card-source">CQP Toulouse</div><div class="card-time">${timeAgo(a.date_publication)}</div></div>
      <span class="card-badge badge-actu">Actu</span>
    </div>
    ${cover}
    <div class="card-body">
      <div class="card-title">${esc(a.titre)}</div>
      <div class="card-text">${esc(a.contenu).substring(0,200)}${a.contenu.length>200?'…':''}</div>
      <div class="card-tags"><span class="tag">${esc(a.categorie)}</span><span class="tag">${readTime(a.contenu)} de lecture</span></div>
    </div>
    <button class="card-read-btn" onclick="openActu(${a.id})">Lire l'article →</button>
    ${actBar('actu', a.id, a.titre)}
  </article>`;
}

function renderEvt(e) {
  const d = new Date(e.date_debut);
  const cover = e.photo_url
    ? `<img class="card-cover" src="${esc(e.photo_url)}" loading="lazy" alt="">`
    : `<div class="card-cover-ph cov-evt"><div class="card-cover-date">${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'long'}).toUpperCase()}</div><div class="card-cover-title">${esc(e.titre)}</div></div>`;
  return `<article class="feed-card reveal" id="card-${e.id}">
    <div class="card-head">
      <div class="card-av" style="background:#1565C0">ÉVT</div>
      <div class="card-meta"><div class="card-source">Événement</div><div class="card-time">${d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})} à ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div></div>
      <span class="card-badge badge-evt">Événement</span>
    </div>
    ${cover}
    <div class="card-body">
      <div class="card-title">${esc(e.titre)}</div>
      <div class="card-text">📍 ${esc(e.lieu)}${e.description?'<br>'+esc(e.description).substring(0,120):''}</div>
      <div class="card-tags"><span class="tag tag-countdown">${countdown(e.date_debut)}</span>${e.places_max>0?`<span class="tag">Max ${e.places_max} places</span>`:''}</div>
    </div>
    <button class="card-read-btn" onclick="window.location='evenements.html'">Voir et s'inscrire →</button>
    ${actBar('evenement', e.id, e.titre)}
  </article>`;
}

function renderAnn(a) {
  const fr = fresh(a.date_depot);
  return `<article class="feed-card reveal" id="card-${a.id}">
    <div class="card-head">
      <div class="card-av" style="background:#2E7D32;font-size:.8rem">${esc((a.prenom||'?')[0]).toUpperCase()}</div>
      <div class="card-meta"><div class="card-source">${esc(a.prenom)} · ${esc(a.quartier)}</div><div class="card-time">${timeAgo(a.date_depot)}</div></div>
      <span class="card-badge badge-ann">Annonce</span>
    </div>
    <div class="card-body">
      <div class="card-title">${esc(a.titre)}</div>
      <div class="card-text">${esc(a.description).substring(0,180)}${a.description.length>180?'…':''}</div>
      <div class="card-tags"><span class="tag">${esc(a.categorie)}</span>${fr?`<span class="tag tag-new">${fr}</span>`:''}</div>
    </div>
    <button class="card-read-btn" onclick="window.location='annonces.html'">Voir + contacter →</button>
    ${actBar('annonce', a.id, a.titre)}
  </article>`;
}
</script>
<script>
// ── FEED + SCROLL INFINI ─────────────────────────────────
const PAGE = 8;
let allItems = [];
let cursor = 0;
let loading = false;
let allActus = [];

async function buildFeed() {
  document.getElementById('feed-spinner').style.display = 'block';
  try {
    const [{ data: actus }, { data: evts }, { data: ann }] = await Promise.all([
      sb.from('actus').select('*').eq('visible', true).order('date_publication', { ascending: false }).limit(15),
      sb.from('evenements').select('*').eq('visible', true).eq('validee', true).gte('date_debut', new Date().toISOString()).order('date_debut', { ascending: true }).limit(8),
      sb.from('annonces').select('*').eq('validee', true).order('date_depot', { ascending: false }).limit(8)
    ]);
    allActus = actus || [];
    allItems = [
      ...(actus || []).map(a => ({ ...a, _type: 'actu', _date: a.date_publication })),
      ...(evts   || []).map(e => ({ ...e, _type: 'evt',  _date: e.created_at || e.date_debut })),
      ...(ann    || []).map(a => ({ ...a, _type: 'ann',  _date: a.date_depot }))
    ].sort((a, b) => new Date(b._date) - new Date(a._date));

    document.getElementById('feed-spinner').style.display = 'none';
    document.getElementById('feed').innerHTML = '';
    cursor = 0;
    renderBatch();
    initSentinel();

    // Charger les counts
    const ai = (actus || []).map(a => a.id);
    const ei = (evts  || []).map(e => e.id);
    const ani = (ann  || []).map(a => a.id);
    if (ai.length)  loadCounts('actu',      ai);
    if (ei.length)  loadCounts('evenement', ei);
    if (ani.length) loadCounts('annonce',   ani);

    // Scroll reveal
    const obs = new IntersectionObserver(ents => {
      ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); } });
    }, { threshold: 0.05 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  } catch (err) {
    document.getElementById('feed-spinner').innerHTML =
      `<span style="color:var(--txt3)">Impossible de charger. <button onclick="buildFeed()" style="color:var(--r);background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.9rem">Réessayer →</button></span>`;
  }
}

function renderBatch() {
  if (loading) return;
  const batch = allItems.slice(cursor, cursor + PAGE);
  if (!batch.length) return;
  loading = true;
  const feed = document.getElementById('feed');
  // Retirer l'ancien sentinel
  document.getElementById('sentinel')?.remove();
  batch.forEach(item => {
    let html = '';
    if (item._type === 'actu') html = renderActu(item);
    else if (item._type === 'evt') html = renderEvt(item);
    else if (item._type === 'ann') html = renderAnn(item);
    if (!html) return;
    const tmp = document.createElement('div'); tmp.innerHTML = html;
    const card = tmp.firstElementChild;
    feed.appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('in')));
  });
  cursor += PAGE;
  loading = false;
  if (cursor >= allItems.length) {
    const sep = document.createElement('div');
    sep.style.cssText = 'text-align:center;padding:24px;color:var(--txt3);font-family:\'Barlow Condensed\',sans-serif;font-size:.72rem;letter-spacing:2px';
    sep.textContent = '— Depuis le début —';
    feed.appendChild(sep);
    cursor = 0; // boucler
  }
  initSentinel();
}

function initSentinel() {
  document.getElementById('sentinel')?.remove();
  const s = document.createElement('div'); s.id = 'sentinel'; s.style.height = '1px';
  document.getElementById('feed')?.appendChild(s);
  new IntersectionObserver(ents => { if (ents[0].isIntersecting) renderBatch(); }, { rootMargin: '300px' }).observe(s);
}

function openActu(id) {
  const a = allActus.find(x => x.id === id); if (!a) return;
  document.getElementById('dr-actu-titre').textContent = a.titre;
  document.getElementById('dr-actu-cat').textContent = a.categorie;
  document.getElementById('dr-actu-date').textContent = new Date(a.date_publication).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
  document.getElementById('dr-actu-content').textContent = a.contenu;
  openDr('dr-actu');
}
</script>
