<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C8102E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CQP Toulouse">
<meta name="description" content="Événements des quartiers populaires de Toulouse.">
<meta property="og:title" content="Événements — CQP Toulouse">
<meta property="og:image" content="https://kwiid31.github.io/cqp-toulouse/icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Événements — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rouge:#C8102E;--rouge-light:#fff0f2;--or:#E8940F;
  --txt:#1A1A1A;--txt2:#555;--txt3:#999;
  --bg:#FFFFFF;--bg2:#F7F8FA;--bg3:#F0F2F5;
  --border:#E4E6EA;--radius:12px;--nav-h:60px;--bar-h:64px;
}
html{font-size:16px}
body{background:var(--bg2);color:var(--txt);font-family:'Barlow',sans-serif;
  padding-bottom:calc(var(--bar-h) + env(safe-area-inset-bottom) + 8px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:center;gap:12px;padding:0 16px;
  box-shadow:0 1px 4px rgba(0,0,0,.06)}
.back-btn{width:36px;height:36px;border:none;background:var(--bg2);border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.back-btn svg{width:20px;height:20px;stroke:var(--txt2);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.topbar h1{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.5px;flex:1}
.topbar-pill{background:var(--rouge);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem;letter-spacing:2px;padding:4px 10px;border-radius:20px}

/* PAGE HERO */
.page-hero{background:linear-gradient(135deg,#0d0d0d,var(--rouge));
  padding:32px 16px 24px;color:#fff}
.page-hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:4px;
  text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.page-hero h2{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1}
.page-hero p{font-size:.85rem;color:rgba(255,255,255,.6);margin-top:6px}

/* GRID */
.content{max-width:900px;margin:0 auto;padding:16px}
.actus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* CARD */
.actu-card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  overflow:hidden;cursor:pointer;transition:box-shadow .2s;display:flex;flex-direction:column}
.actu-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
.actu-cover{height:160px;display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;position:relative;overflow:hidden}
.actu-cover::before{content:'';position:absolute;inset:0;opacity:.9}
.actu-cover-bg1::before{background:linear-gradient(160deg,#1a0508,#5a0b18 50%,var(--rouge))}
.actu-cover-bg2::before{background:linear-gradient(160deg,#0a1520,#0a3a6a 50%,#1a5acc)}
.actu-cover-bg3::before{background:linear-gradient(160deg,#0a1a0e,#1a4a24 50%,#2a7a3a)}
.actu-cover-bg4::before{background:linear-gradient(160deg,#1a0a1a,#4a0a6a 50%,#8a2acc)}
.actu-cover-cat{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,.6);position:relative;z-index:1;margin-bottom:4px}
.actu-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:#fff;
  line-height:1.15;position:relative;z-index:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actu-body{padding:12px 14px 8px;flex:1}
.actu-excerpt{font-size:.85rem;color:var(--txt2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.actu-footer{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;
  letter-spacing:.5px;color:var(--txt3)}

/* SOCIAL */
.card-actions{display:flex;padding:4px 8px;border-top:1px solid var(--bg2);gap:2px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 4px;border:none;background:none;border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--txt2);
  transition:background .15s}
.action-btn:hover{background:var(--bg2)}
.action-btn.liked{color:var(--rouge)}
.action-btn .h{font-size:1rem;transition:transform .15s;display:inline-block}
.action-btn.pop .h{transform:scale(1.5)}
.action-sep{width:1px;height:26px;background:var(--border);flex-shrink:0;align-self:center}

/* MINI DRAWER */
.mini-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600}
.mini-overlay.open{display:block}
.mini-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:3px solid var(--rouge);border-radius:20px 20px 0 0;z-index:601;
  max-height:75vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.mini-drawer.open{transform:none}
.mini-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
.mini-head{padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bg2);flex-shrink:0}
.mini-head h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.5px}
.mini-body{overflow-y:auto;padding:12px 16px;flex:1}
.mini-foot{padding:12px 16px;border-top:1px solid var(--bg2);display:flex;flex-direction:column;gap:8px;flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.cmt-item{display:flex;gap:10px;margin-bottom:12px}
.cmt-av{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--rouge);
  display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#fff}
.cmt-bubble{background:var(--bg2);border-radius:0 10px 10px 10px;padding:8px 12px;flex:1}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:1px;
  text-transform:uppercase;color:var(--rouge);margin-bottom:3px;font-weight:700}
.cmt-text{font-size:.85rem;color:var(--txt);line-height:1.5}
input.cmt-input{background:var(--bg2);border:1px solid var(--border);border-radius:24px;
  padding:10px 16px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;
  outline:none;width:100%;transition:border .15s}
input.cmt-input:focus{border-color:var(--rouge)}
.cmt-send-row{display:flex;gap:8px}
.cmt-send-btn{background:var(--rouge);border:none;color:#fff;width:42px;height:42px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;
  stroke-linecap:round;stroke-linejoin:round}

/* DRAWER ACTU */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;
  display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);
  padding:16px;display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;flex:1;line-height:1.2}
.drawer-close-btn{width:32px;height:32px;border:1px solid var(--border);background:none;
  border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.drawer-body{padding:16px;flex:1}
.drawer-text{font-size:.92rem;color:var(--txt2);line-height:1.9;white-space:pre-wrap}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;
  border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.06);
  display:flex;align-items:stretch;height:var(--bar-h);
  padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;
  font-size:.52rem;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;padding:8px 0}
.nav-item.active{color:var(--rouge)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round}
.nav-publish{width:52px;height:52px;border-radius:50%;background:var(--rouge);color:#fff;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(200,16,46,.45);margin-top:-14px;flex-shrink:0;gap:1px;
  font-family:'Barlow Condensed',sans-serif}
.nav-publish-icon{font-size:1.4rem;line-height:1}
.nav-publish-lbl{font-size:.42rem;letter-spacing:1.5px;text-transform:uppercase}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;flex-shrink:0}

/* SPINNER / EMPTY */
.spinner{text-align:center;padding:48px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3)}

/* REVEAL */
.reveal-card{opacity:0;transform:translateY(12px);transition:opacity .3s ease,transform .3s ease}
.reveal-card.revealed{opacity:1;transform:none}
@keyframes ripple{to{transform:scale(2.5);opacity:0}}

@media(min-width:701px){.bottom-nav{display:none}body{padding-bottom:0}}

/* EVT spécifique */
.evt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.evt-card{background:#fff;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);overflow:hidden;cursor:pointer;transition:box-shadow .2s;display:flex;flex-direction:column}
.evt-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
.evt-cover{height:160px;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;position:relative;overflow:hidden}
.evt-cover::before{content:'';position:absolute;inset:0;opacity:.9;background:linear-gradient(160deg,#0a0d2a,#1a2a7a 60%,#2244cc)}
.evt-cover-date{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;position:relative;z-index:1;line-height:1}
.evt-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;position:relative;z-index:1;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.evt-body{padding:12px 14px 8px;flex:1}
.evt-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;line-height:1.3;color:var(--txt);margin-bottom:6px}
.evt-lieu{font-size:.82rem;color:var(--txt2);margin-bottom:4px}
.evt-countdown{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--rouge);background:var(--rouge-light);padding:3px 8px;border-radius:4px;margin-bottom:6px}
.evt-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.5px;color:var(--txt3)}
/* Formulaire proposer */
.proposer-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-top:24px;display:none}
.proposer-section.open{display:block}
.proposer-trigger{width:100%;padding:14px;background:var(--rouge);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Barlow',sans-serif;font-size:.9rem;color:var(--txt);outline:none;transition:border .15s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--rouge)}
.form-group textarea{resize:vertical;min-height:80px}
.btn-submit{width:100%;background:var(--rouge);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:2px;text-transform:uppercase}
.form-msg{text-align:center;padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;border-radius:6px;display:none}
.form-msg.ok{background:#f0fdf4;color:#16a34a;display:block}
.form-msg.err{background:var(--rouge-light);color:var(--rouge);display:block}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <h1>Événements</h1>
  <span class="topbar-pill" id="count-pill">…</span>
</header>
<div class="page-hero" style="background:linear-gradient(135deg,#0a0d2a,#1565C0)">
  <div class="page-hero-tag">Réunions · Ateliers · Mobilisations</div>
  <h2>Événements à venir</h2>
  <p>Rejoins-nous dans les quartiers de Toulouse.</p>
</div>
<div class="content">
  <button class="proposer-trigger" onclick="document.getElementById('form-proposer').classList.toggle('open');this.style.display='none'">
    📅 Proposer un événement
  </button>
  <div class="proposer-section" id="form-proposer">
    <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;margin-bottom:4px">Proposer un événement</h3>
    <p style="font-size:.82rem;color:var(--txt2);margin-bottom:16px">Votre proposition sera validée par notre équipe (24–48h).</p>
    <div class="form-group"><label>Titre *</label><input type="text" id="pe-titre" placeholder="Ex: Réunion de quartier Mirail"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Votre prénom *</label><input type="text" id="pe-prenom"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="pe-email"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Date *</label><input type="date" id="pe-date"></div>
      <div class="form-group"><label>Heure *</label><input type="time" id="pe-heure" value="18:00"></div>
    </div>
    <div class="form-group"><label>Lieu *</label><input type="text" id="pe-lieu" placeholder="Salle des fêtes du Mirail"></div>
    <div class="form-group"><label>Catégorie</label>
      <select id="pe-cat"><option>Réunion</option><option>Atelier</option><option>Manifestation</option><option>Culturel</option><option>Solidarité</option><option>Autre</option></select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="pe-desc" rows="3" placeholder="Décrivez l'événement…"></textarea></div>
    <div class="form-group"><label>Places max (0 = illimitées)</label><input type="number" id="pe-places" value="0" min="0"></div>
    <button class="btn-submit" onclick="submitProposer()">Envoyer la proposition</button>
    <div class="form-msg" id="pe-msg"></div>
  </div>
  <div class="evt-grid" id="evt-grid"><div class="spinner">Chargement…</div></div>
</div>
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Accueil</span></a>
  <a href="actus.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Actus</span></a>
  <div class="nav-middle"><button class="nav-publish" onclick="window.location='index.html'"><span class="nav-publish-icon">+</span><span class="nav-publish-lbl">Publier</span></button></div>
  <a href="evenements.html" class="nav-item active"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Évts</span></a>
  <a href="annonces.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Annonces</span></a>
</nav>
<!-- Mini drawer -->
<div class="mini-overlay" id="mini-ov" onclick="closeMini()"></div>
<div class="mini-drawer" id="mini-drawer">
  <div class="mini-drag"></div>
  <div class="mini-head"><h4 id="mini-title">Commentaires</h4><button style="border:none;background:none;color:var(--txt3);font-size:1.1rem;cursor:pointer" onclick="closeMini()">✕</button></div>
  <div class="mini-body" id="mini-body"></div>
  <div class="mini-foot">
    <input class="cmt-input" id="mini-prenom" placeholder="Votre prénom">
    <div class="cmt-send-row"><input class="cmt-input" id="mini-msg" placeholder="Votre commentaire…" onkeydown="if(event.key==='Enter')sendCmt()" style="flex:1"><button class="cmt-send-btn" onclick="sendCmt()"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>
  </div>
</div>
<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co',SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function getSid(){try{let s=sessionStorage.getItem('sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);sessionStorage.setItem('sid',s);}return s;}catch{return 'x'+Math.random().toString(36).slice(2);}}
function savePrenomLocal(v){try{if(v.trim())localStorage.setItem('cqp_prenom',v.trim());}catch{}}
function countdownStr(d){const diff=new Date(d)-Date.now();if(diff<0)return'Passé';const days=Math.floor(diff/86400000);if(days===0)return'⚡ Aujourd\'hui';if(days===1)return'🔴 Demain';if(days<=7)return`🟠 Dans ${days} j`;return`📅 ${new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`; }
let cache=[];
async function load(){
  const g=document.getElementById('evt-grid');
  try{
    const{data,error}=await sb.from('evenements').select('*').eq('visible',true).eq('validee',true).gte('date_debut',new Date().toISOString()).order('date_debut',{ascending:true});
    if(error)throw error;cache=data||[];
    document.getElementById('count-pill').textContent=cache.length+' evt';
    if(!cache.length){g.innerHTML='<div class="empty-state">Aucun événement à venir.</div>';return;}
    g.innerHTML=cache.map(e=>{
      const d=new Date(e.date_debut);
      const cover=e.photo_url?`<img src="${esc(e.photo_url)}" style="height:160px;width:100%;object-fit:cover;display:block">`:`<div class="evt-cover"><div class="evt-cover-date">${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'long'}).toUpperCase()}</div><div class="evt-cover-title">${esc(e.titre)}</div></div>`;
      return `<article class="evt-card reveal-card" id="card-${e.id}">
        ${cover}
        <div class="evt-body">
          <div class="evt-countdown">${countdownStr(e.date_debut)}</div>
          <div class="evt-title">${esc(e.titre)}</div>
          <div class="evt-lieu">📍 ${esc(e.lieu)}</div>
          ${e.description?`<div style="font-size:.82rem;color:var(--txt2);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(e.description).substring(0,120)}</div>`:''}
        </div>
        <div class="evt-footer">
          <span>${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
          <span>${e.places_max>0?'Max '+e.places_max+' places':'Places illimitées'}</span>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="action-btn" id="lk-${e.id}" onclick="toggleLike(${e.id})"><span class="h">🤍</span><span id="lc-${e.id}">0</span> J'aime</button>
          <div class="action-sep"></div>
          <button class="action-btn" onclick="openMini(${e.id},'${esc(e.titre).substring(0,28).replace(/'/g,"\\'")}')">💬 <span id="cc-${e.id}">0</span> Commenter</button>
        </div>
      </article>`;
    }).join('');
    loadAllCounts(cache.map(e=>e.id));
    const obs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}})},{threshold:.05});
    document.querySelectorAll('.reveal-card').forEach(el=>obs.observe(el));
  }catch(e){g.innerHTML=`<div class="empty-state">Erreur: ${e.message}</div>`;}
}
async function loadAllCounts(ids){
  const sid=getSid();
  try{
    const[{data:lk},{data:my},{data:cm}]=await Promise.all([sb.from('likes').select('item_id').eq('item_type','evenement').in('item_id',ids),sb.from('likes').select('item_id').eq('item_type','evenement').eq('session_id',sid).in('item_id',ids),sb.from('commentaires').select('item_id').eq('item_type','evenement').eq('visible',true).in('item_id',ids)]);
    const lm={},mm={},cm2={};(lk||[]).forEach(r=>{lm[r.item_id]=(lm[r.item_id]||0)+1;});(my||[]).forEach(r=>{mm[r.item_id]=true;});(cm||[]).forEach(r=>{cm2[r.item_id]=(cm2[r.item_id]||0)+1;});
    ids.forEach(id=>{const liked=!!mm[id];const btn=document.getElementById('lk-'+id);if(btn){btn.classList.toggle('liked',liked);btn.querySelector('.h').textContent=liked?'❤️':'🤍';}const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=lm[id]||0;const cc=document.getElementById('cc-'+id);if(cc)cc.textContent=cm2[id]||0;});
  }catch{}
}
async function toggleLike(id){
  const sid=getSid();const btn=document.getElementById('lk-'+id);if(!btn)return;
  const liked=btn.classList.contains('liked');btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);
  if(liked){await sb.from('likes').delete().eq('item_type','evenement').eq('item_id',id).eq('session_id',sid);btn.classList.remove('liked');btn.querySelector('.h').textContent='🤍';}
  else{(()=>{try{sb.from(\'likes\').insert({item_type:'evenement',item_id:id,session_id:sid});}catch{}})();btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';}
  const{data:l}=await sb.from('likes').select('item_id').eq('item_type','evenement').eq('item_id',id);
  const lc=document.getElementById('lc-'+id);if(lc)lc.textContent=(l||[]).length;
}
let miniId=null;
function openMini(id,titre){miniId=id;document.getElementById('mini-title').textContent='💬 '+titre;document.getElementById('mini-ov').classList.add('open');document.getElementById('mini-drawer').classList.add('open');document.body.style.overflow='hidden';try{const p=localStorage.getItem('cqp_prenom');if(p)document.getElementById('mini-prenom').value=p;}catch{}refreshCmts();}
function closeMini(){document.getElementById('mini-ov').classList.remove('open');document.getElementById('mini-drawer').classList.remove('open');document.body.style.overflow='';miniId=null;}
async function refreshCmts(){if(!miniId)return;const{data}=await sb.from('commentaires').select('*').eq('item_type','evenement').eq('item_id',miniId).eq('visible',true).order('created_at',{ascending:true});const list=data||[];const cc=document.getElementById('cc-'+miniId);if(cc)cc.textContent=list.length;const box=document.getElementById('mini-body');if(!box)return;box.innerHTML=list.length?list.map(c=>`<div class="cmt-item"><div class="cmt-av">${esc(c.prenom[0]).toUpperCase()}</div><div class="cmt-bubble"><div class="cmt-name">${esc(c.prenom)}</div><div class="cmt-text">${esc(c.message)}</div></div></div>`).join(''):'<p style="color:var(--txt3);text-align:center;padding:24px">Soyez le premier !</p>';box.scrollTop=box.scrollHeight;}
async function sendCmt(){const msg=document.getElementById('mini-msg')?.value.trim();const prenom=document.getElementById('mini-prenom')?.value.trim()||'Anonyme';if(!msg||!miniId)return;savePrenomLocal(prenom);document.getElementById('mini-msg').value='';await sb.from('commentaires').insert({item_type:'evenement',item_id:miniId,prenom,message:msg});refreshCmts();}
async function submitProposer(){
  const titre=document.getElementById('pe-titre')?.value.trim();const prenom=document.getElementById('pe-prenom')?.value.trim();const email=document.getElementById('pe-email')?.value.trim();const dateV=document.getElementById('pe-date')?.value;const heure=document.getElementById('pe-heure')?.value||'18:00';const lieu=document.getElementById('pe-lieu')?.value.trim();const cat=document.getElementById('pe-cat')?.value;const desc=document.getElementById('pe-desc')?.value.trim();const places=parseInt(document.getElementById('pe-places')?.value||'0');const msg=document.getElementById('pe-msg');
  if(!titre||!prenom||!email||!dateV||!lieu){if(msg){msg.textContent='⚠ Remplissez tous les champs obligatoires.';msg.className='form-msg err';}return;}
  const date_debut=new Date(dateV+'T'+heure).toISOString();
  const{error}=await sb.from('evenements').insert({titre,description:desc||'',lieu,categorie:cat,date_debut,places_max:places,validee:false,visible:false,propose_par:prenom,email_contact:email});
  if(error){if(msg){msg.textContent='⚠ Erreur: '+error.message;msg.className='form-msg err';}}
  else{if(msg){msg.textContent='✅ Proposition envoyée ! Réponse sous 24–48h.';msg.className='form-msg ok';}}
}
load();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/cqp-toulouse/sw.js').catch(()=>{});
</script>
