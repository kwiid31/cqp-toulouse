<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1877F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Événements — CQP Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --rouge:#C8102E;--blue:#1877F2;--blue-light:#e7f3ff;--green:#42B72A;
  --txt:#050505;--txt2:#65676B;--txt3:#8A8D91;
  --bg:#F0F2F5;--bg2:#fff;--bg3:#E4E6EB;--border:#CED0D4;
  --shadow:0 1px 2px rgba(0,0,0,.1);--radius:8px;--nav-h:56px;
}
html,body{font-size:15px;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;}
body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 4px)}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;outline:none}
img{max-width:100%;display:block}

.topbar{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:var(--shadow)}
.back-btn{width:38px;height:38px;border:none;background:var(--bg3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn svg{width:20px;height:20px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.5px;flex:1}
.topbar-count{background:var(--blue);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:2px;padding:4px 10px;border-radius:20px}

.page-hero{background:linear-gradient(135deg,#050a1a 0%,#0e2472 60%,var(--blue) 100%);
  padding:28px 16px 24px;color:#fff;position:relative;overflow:hidden}
.page-hero::after{content:'';position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,.05)"/></svg>')}
.hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;position:relative;z-index:1}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;position:relative;z-index:1}
.hero-sub{font-size:.83rem;color:rgba(255,255,255,.6);margin-top:6px;position:relative;z-index:1}

.filter-wrap{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;
  padding:0 8px;scrollbar-width:none;position:sticky;top:var(--nav-h);z-index:190}
.filter-wrap::-webkit-scrollbar{display:none}
.filter-btn{border:none;background:none;padding:12px 14px;font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);
  border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s}
.filter-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

.evts-wrap{max-width:680px;margin:0 auto;padding:8px 0}

/* Inscription drawer */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45)}
.drawer-overlay.open{display:flex;justify-content:flex-end}
.drawer{width:min(560px,100vw);height:100vh;background:#fff;overflow-y:auto;
  display:flex;flex-direction:column;animation:drawerIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:none}}
.drawer-head{position:sticky;top:0;background:var(--blue);padding:18px 16px;
  display:flex;align-items:flex-start;gap:12px;z-index:1;flex-shrink:0}
.drawer-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;flex:1;line-height:1.2;color:#fff;letter-spacing:.5px}
.dh-close{width:30px;height:30px;background:rgba(255,255,255,.2);border:none;
  border-radius:50%;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.drawer-body{padding:20px;flex:1}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.73rem;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:8px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--blue)}
.btn-submit{width:100%;padding:14px;background:var(--blue);border:none;border-radius:8px;color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;margin-top:8px}
.btn-submit:active{opacity:.85}
.form-msg{margin-top:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:1px}

/* Cards événement */
.evt-card{background:#fff;margin:0 0 8px;overflow:hidden;opacity:0;transform:translateY(12px);transition:opacity .35s,transform .35s}
.evt-card.revealed{opacity:1;transform:none}
@media(min-width:600px){.evt-card{border-radius:var(--radius);margin:0 8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.15)}}

.ec-img{width:100%;height:200px;object-fit:cover;display:block}
.ec-cover{display:flex;flex-direction:column;justify-content:flex-end;
  min-height:140px;padding:18px;position:relative;overflow:hidden}
.ec-cover::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#050a1a 0%,#0e2472 60%,var(--blue) 100%);opacity:.95}
.ec-cover-date{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#fff;opacity:.9;position:relative;z-index:1;line-height:1}
.ec-cover-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:#fff;line-height:1.1;position:relative;z-index:1;margin-top:4px}

.ec-body{padding:12px 14px 8px}
.ec-title{font-family:'Barlow',sans-serif;font-weight:600;font-size:.96rem;line-height:1.35;color:var(--txt);margin-bottom:5px}
.ec-lieu{font-size:.85rem;color:var(--txt2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ec-desc{font-size:.85rem;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ec-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
.ec-tag{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;letter-spacing:1px;text-transform:uppercase;background:var(--bg3);color:var(--txt2);padding:3px 9px;border-radius:20px}
.ec-countdown{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--blue);background:var(--blue-light);padding:3px 9px;border-radius:4px}
.ec-register{margin:8px 14px 12px;padding:12px;background:var(--blue);border:none;border-radius:8px;
  width:calc(100% - 28px);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;text-align:center;transition:opacity .15s}
.ec-register:active{opacity:.85}
.ec-full{background:var(--bg3);color:var(--txt3)}
.ec-stats{display:flex;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--bg3);font-size:.77rem;color:var(--txt3)}
.ec-actions{display:flex;align-items:center;padding:2px 6px}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border:none;background:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:600;color:var(--txt2);transition:background .15s}
.act-btn:hover,.act-btn:active{background:var(--bg3)}
.act-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.act-btn.liked{color:var(--rouge)}
.act-btn.liked svg{stroke:var(--rouge);fill:var(--rouge)}
.act-sep{width:1px;height:24px;background:var(--bg3)}

.spinner{text-align:center;padding:36px;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase}
@keyframes pul{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-state p{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:1px;text-transform:uppercase}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;transition:color .15s;text-decoration:none;padding:6px 0}
.nav-item.active,.nav-item:hover{color:var(--blue)}
.nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{stroke:var(--blue)}
.nav-pub{width:48px;height:48px;border-radius:50%;background:var(--rouge);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(200,16,46,.45);margin-top:-12px;flex-shrink:0}
.nav-pub svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-middle{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;flex-shrink:0}
@media(min-width:700px){.bottom-nav{display:none}body{padding-bottom:0}}
</style>
<body>
<header class="topbar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='index.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">Événements</span>
  <span class="topbar-count" id="evt-count">…</span>
</header>

<div class="page-hero">
  <div class="hero-tag">CQP Toulouse</div>
  <h2 class="hero-title">Événements</h2>
  <p class="hero-sub">Réunions, manifestations et rassemblements</p>
</div>

<div class="filter-wrap">
  <button class="filter-btn active" onclick="filterEvts('',this)">À venir</button>
  <button class="filter-btn" onclick="filterEvts('Réunion',this)">Réunions</button>
  <button class="filter-btn" onclick="filterEvts('Manifestation',this)">Manif.</button>
  <button class="filter-btn" onclick="filterEvts('Culture',this)">Culture</button>
  <button class="filter-btn" onclick="filterEvts('Solidarité',this)">Solidarité</button>
  <button class="filter-btn" onclick="filterEvts('Sport',this)">Sport</button>
</div>

<main class="evts-wrap">
  <div class="spinner" id="spinner">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px">
      <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:pul 1.2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:pul 1.2s .2s infinite"></div>
      <div style="width:8px;height:8px;background:var(--blue);border-radius:50%;animation:pul 1.2s .4s infinite"></div>
    </div>
  </div>
  <div id="evts-list"></div>
</main>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil</a>
  <a class="nav-item" href="actus.html"><svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Actus</a>
  <div class="nav-middle"><a href="index.html" class="nav-pub"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a></div>
  <a class="nav-item active" href="evenements.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Évts</a>
  <a class="nav-item" href="annonces.html"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Annonces</a>
</nav>

<!-- DRAWER INSCRIPTION -->
<div class="drawer-overlay" id="dr-insc" onclick="if(event.target===this)closeDr()">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="dr-evt-titre">S'inscrire</h3>
      <button class="dh-close" onclick="closeDr()">✕</button>
    </div>
    <div class="drawer-body">
      <p style="font-size:.85rem;color:var(--txt2);margin-bottom:20px;line-height:1.7" id="dr-evt-info">Inscrivez-vous à cet événement.</p>
      <div class="form-group"><label>Prénom *</label><input type="text" id="insc-prenom" placeholder="Karim"></div>
      <div class="form-group"><label>Nom *</label><input type="text" id="insc-nom" placeholder="Benali"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="insc-email" placeholder="karim@exemple.fr"></div>
      <div class="form-group"><label>Téléphone</label><input type="tel" id="insc-tel" placeholder="06 xx xx xx xx"></div>
      <div class="form-group"><label>Nombre de personnes</label><select id="insc-nb"><option value="1">1 personne</option><option value="2">2 personnes</option><option value="3">3 personnes</option><option value="4">4 personnes</option></select></div>
      <button class="btn-submit" onclick="submitInscription()">📅 Confirmer l'inscription</button>
      <div class="form-msg" id="insc-msg"></div>
    </div>
  </div>
</div>

<script>
const SBU='https://vzfwtyczqfbhbjzotjft.supabase.co';
const SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
const sb=supabase.createClient(SBU,SBK);
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function getSid(){try{let s=sessionStorage.getItem('sid');if(!s){s=crypto.randomUUID?.()??Math.random().toString(36).slice(2);sessionStorage.setItem('sid',s);}return s;}catch{return 'x'+Math.random().toString(36).slice(2);}}
function countdownStr(dateStr){const diff=new Date(dateStr)-Date.now();if(diff<0)return'Passé';const days=Math.floor(diff/86400000);if(days===0)return'⚡ Aujourd\'hui';if(days===1)return'🔴 Demain';if(days<=7)return`🟠 Dans ${days} j`;return`📅 ${new Date(dateStr).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;}

let allEvts=[],curEvtId=null;
async function loadEvts(){
  try{
    const{data}=await sb.from('evenements').select('*').eq('visible',true).eq('validee',true).order('date_debut',{ascending:true}).limit(50);
    allEvts=data||[];
    document.getElementById('evt-count').textContent=allEvts.filter(e=>new Date(e.date_debut)>Date.now()).length+' à venir';
    renderEvts(allEvts.filter(e=>new Date(e.date_debut)>Date.now()));
  }catch(e){document.getElementById('spinner').textContent='Erreur de chargement.';console.error(e);}
}
function filterEvts(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const now=new Date().toISOString();
  const filtered=cat?allEvts.filter(e=>e.categorie===cat):allEvts.filter(e=>new Date(e.date_debut)>Date.now());
  renderEvts(filtered);
}
async function getInscrits(ids){
  if(!ids.length)return{};
  try{const{data}=await sb.from('inscriptions').select('evenement_id').in('evenement_id',ids);const m={};(data||[]).forEach(r=>{m[r.evenement_id]=(m[r.evenement_id]||0)+1;});return m;}catch{return{};}
}
async function renderEvts(list){
  document.getElementById('spinner').style.display='none';
  const el=document.getElementById('evts-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><p>Aucun événement disponible</p></div>';return;}
  const inscrits=await getInscrits(list.map(e=>e.id));
  el.innerHTML=list.map(e=>{
    const d=new Date(e.date_debut);
    const cover=e.photo_url
      ?`<img class="ec-img" src="${esc(e.photo_url)}" loading="lazy">`
      :`<div class="ec-cover"><div class="ec-cover-date">${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'long'}).toUpperCase()}</div><div class="ec-cover-title">${esc(e.titre)}</div></div>`;
    const nb=inscrits[e.id]||0;
    const full=e.places_max>0&&nb>=e.places_max;
    return `<article class="evt-card reveal-card" id="card-${e.id}">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 6px">
        <div style="width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:#fff">${d.getDate()}<br><span style="font-size:.45rem;display:block;letter-spacing:1px">${d.toLocaleDateString('fr-FR',{month:'short'}).toUpperCase()}</span></div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Barlow',sans-serif;font-weight:600;font-size:.92rem;color:var(--txt)">Événement CQP</div>
          <div style="font-size:.75rem;color:var(--txt3)">📅 ${d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'})} à ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:var(--blue);color:#fff">${esc(e.categorie||'Évt')}</span>
      </div>
      ${cover}
      <div class="ec-body">
        <div class="ec-title">${esc(e.titre)}</div>
        ${e.lieu?`<div class="ec-lieu">📍 ${esc(e.lieu)}</div>`:''}
        ${e.description?`<div class="ec-desc">${esc(e.description.substring(0,150))}${e.description.length>150?'…':''}</div>`:''}
        <div class="ec-meta">
          <span class="ec-countdown">${countdownStr(e.date_debut)}</span>
          ${e.places_max>0?`<span class="ec-tag">${nb}/${e.places_max} inscrits</span>`:''}
          ${e.categorie?`<span class="ec-tag">${esc(e.categorie)}</span>`:''}
        </div>
      </div>
      <button class="ec-register ${full?'ec-full':''}" onclick="${full?'':'openInscription('+e.id+')'}">
        ${full?'🔴 Complet — inscription fermée':'📝 S\'inscrire à cet événement'}
      </button>
      <div class="ec-stats"><span>👥 ${nb} inscrit${nb>1?'s':''}</span><span id="sl-${e.id}">0 j'aime</span></div>
      <div class="ec-actions">
        <button class="act-btn" id="lk-${e.id}" onclick="toggleLike(${e.id})"><span class="h">👍</span> J'aime</button>
        <div class="act-sep"></div>
        <button class="act-btn" onclick="navigator.share?.({title:'${esc(e.titre).substring(0,30)}',url:location.href})">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Partager
        </button>
      </div>
    </article>`;
  }).join('');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});},{threshold:.05});
  document.querySelectorAll('.reveal-card').forEach(el=>obs.observe(el));
  loadLikes(list.map(e=>e.id));
}
async function loadLikes(ids){
  if(!ids.length)return;
  const sid=getSid();
  try{
    const[{data:lk},{data:my}]=await Promise.all([
      sb.from('likes').select('item_id').eq('item_type','evenement').in('item_id',ids),
      sb.from('likes').select('item_id').eq('item_type','evenement').eq('session_id',sid).in('item_id',ids)
    ]);
    const lm={},mm={};
    (lk||[]).forEach(r=>{lm[r.item_id]=(lm[r.item_id]||0)+1;});
    (my||[]).forEach(r=>{mm[r.item_id]=true;});
    ids.forEach(id=>{
      const liked=!!mm[id];
      const btn=document.getElementById('lk-'+id);if(btn){btn.classList.toggle('liked',liked);btn.querySelector('.h').textContent=liked?'❤️':'👍';}
      const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(lm[id]||0)+" j'aime";
    });
  }catch{}
}
async function toggleLike(id){
  const sid=getSid(),btn=document.getElementById('lk-'+id);if(!btn)return;
  const liked=btn.classList.contains('liked');
  if(liked){await sb.from('likes').delete().eq('item_type','evenement').eq('item_id',id).eq('session_id',sid);btn.classList.remove('liked');btn.querySelector('.h').textContent='👍';}
  else{try{await sb.from('likes').insert({item_type:'evenement',item_id:id,session_id:sid});}catch{}btn.classList.add('liked');btn.querySelector('.h').textContent='❤️';}
  const{data:l}=await sb.from('likes').select('item_id').eq('item_type','evenement').eq('item_id',id);
  const sl=document.getElementById('sl-'+id);if(sl)sl.textContent=(l||[]).length+" j'aime";
}
function openInscription(id){
  curEvtId=id;
  const e=allEvts.find(x=>x.id===id);
  const d=new Date(e.date_debut);
  document.getElementById('dr-evt-titre').textContent='📅 '+esc(e.titre);
  document.getElementById('dr-evt-info').textContent=`${d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})} à ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}${e.lieu?' — '+e.lieu:''}`;
  document.getElementById('dr-insc').classList.add('open');document.body.style.overflow='hidden';
}
function closeDr(){document.getElementById('dr-insc').classList.remove('open');document.body.style.overflow='';curEvtId=null;}
async function submitInscription(){
  const prenom=document.getElementById('insc-prenom').value.trim();
  const nom=document.getElementById('insc-nom').value.trim();
  const email=document.getElementById('insc-email').value.trim();
  const tel=document.getElementById('insc-tel').value.trim();
  const nb=document.getElementById('insc-nb').value;
  const msg=document.getElementById('insc-msg');
  if(!prenom||!nom||!email){msg.textContent='Champs obligatoires manquants.';msg.style.color='var(--rouge)';return;}
  try{
    await sb.from('inscriptions').insert({evenement_id:curEvtId,prenom,nom,email,tel:tel||null,nb_personnes:parseInt(nb)});
    msg.textContent='✅ Inscription confirmée ! À bientôt !';msg.style.color='var(--green)';
    setTimeout(()=>{closeDr();loadEvts();},2000);
  }catch(e){msg.textContent='Erreur lors de l\'inscription.';msg.style.color='var(--rouge)';console.error(e);}
}
loadEvts();
</script>
