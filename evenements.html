<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Événements – CQP Toulouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--red:#C8102E;--blue:#2563eb;--bg:#F7F8FA;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-tap-highlight-color:transparent;}

.topbar{background:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.topbar-back{color:var(--muted);text-decoration:none;display:flex;align-items:center;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.5px;}
.topbar-count{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);margin-left:auto;}
.topbar-propose{background:var(--red);color:#fff;border:none;padding:7px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}

.list{padding:12px;}
.card{background:#fff;border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:12px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;}
.card.visible{opacity:1;transform:none;}
.card-img{width:100%;height:180px;object-fit:cover;}
.card-body{padding:12px 14px 8px;}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;background:var(--blue);color:#fff;}
.badge-cat{background:#f3f4f6;color:var(--muted);}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-left:auto;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1.2;margin-bottom:6px;}
.card-desc{font-size:.85rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-info{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.card-info-row{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:var(--muted);}
.card-info-row svg{width:13px;height:13px;flex-shrink:0;}
.card-countdown{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:var(--blue);font-weight:600;margin-top:6px;}
.card-footer{display:flex;align-items:center;gap:8px;padding:8px 14px 12px;border-top:1px solid #f5f5f5;margin-top:8px;}
.btn-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--muted);padding:5px 10px;border-radius:20px;transition:all .18s;}
.btn-act:hover{background:var(--bg);}
.btn-act.liked{color:var(--red);}
.btn-act svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-act.liked svg{fill:var(--red);stroke:var(--red);}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty p{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;}

/* Modal Proposer */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-bg.open{opacity:1;pointer-events:auto;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;}
.modal-bg.open .modal-sheet{transform:none;}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 0;}
.modal-head{padding:14px 16px 12px;display:flex;align-items:center;border-bottom:1px solid #f0f0f0;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;flex:1;}
.modal-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.form-body{padding:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:5px;}
.inp{width:100%;padding:11px 12px;border:1.5px solid #eee;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--red);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px;cursor:pointer;margin-top:4px;}
.btn-primary:disabled{opacity:.5;cursor:default;}
.success-msg{text-align:center;padding:24px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;color:#059669;display:none;}

/* Comment drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:#fff;border-radius:20px 20px 0 0;z-index:301;transform:translateY(100%);transition:transform .3s;overflow:hidden;display:flex;flex-direction:column;}
.drawer.open{transform:none;}
.drawer-handle-bar{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:10px auto 4px;}
.drawer-head{padding:10px 16px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;}
.drawer-head-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;flex:1;}
.drawer-close{background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;}
.drawer-body{overflow-y:auto;flex:1;padding:0 16px;}
.cmt-item{padding:9px 0;border-bottom:1px solid #f8f8f8;}
.cmt-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--red);}
.cmt-msg{font-size:.85rem;margin-top:2px;line-height:1.4;}
.cmt-time{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-top:2px;}
.cmt-form{padding:12px 16px 20px;border-top:1px solid #f0f0f0;background:#fff;}
.btn-send{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;cursor:pointer;}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px 8px;z-index:100;height:64px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.65rem;text-decoration:none;padding:8px 4px 0;flex:1;}
.bnav-item.active{color:var(--red);}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.bnav-fab-wrap{flex:0 0 64px;display:flex;justify-content:center;align-items:flex-end;padding-bottom:4px;}
.bnav-fab{width:52px;height:52px;background:var(--red);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(200,16,46,.4);margin-bottom:10px;}
.bnav-fab svg{width:26px;height:26px;fill:#fff;stroke:none;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Événements</div>
  <span class="topbar-count" id="count-label"></span>
  <button class="topbar-propose" onclick="openPropose()">+ Proposer</button>
  <a href="admin.html" style="color:var(--muted);display:flex;align-items:center;" title="Admin">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
  </a>
</header>

<div class="list" id="list">
  <div class="loading">Chargement…</div>
</div>

<!-- Modal Proposer -->
<div class="modal-bg" id="propose-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title">Proposer un événement</div>
      <button class="modal-close" onclick="closePropose()">✕</button>
    </div>
    <div class="form-body" id="propose-form">
      <div class="field">
        <label>Titre *</label>
        <input class="inp" id="pe-titre" placeholder="Nom de l'événement" maxlength="120">
      </div>
      <div class="row2">
        <div class="field">
          <label>Date *</label>
          <input class="inp" id="pe-date" type="date">
        </div>
        <div class="field">
          <label>Heure *</label>
          <input class="inp" id="pe-heure" type="time">
        </div>
      </div>
      <div class="field">
        <label>Lieu *</label>
        <input class="inp" id="pe-lieu" placeholder="Adresse ou salle" maxlength="200">
      </div>
      <div class="field">
        <label>Catégorie</label>
        <select class="inp" id="pe-cat">
          <option value="">— Choisir —</option>
          <option>Réunion</option>
          <option>Manifestation</option>
          <option>Atelier</option>
          <option>Culturel</option>
          <option>Solidarité</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea class="inp" id="pe-desc" rows="3" placeholder="Décrivez l'événement…" maxlength="1000" style="resize:vertical"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Votre prénom *</label>
          <input class="inp" id="pe-prenom" placeholder="Prénom" maxlength="50">
        </div>
        <div class="field">
          <label>Places max</label>
          <input class="inp" id="pe-places" type="number" placeholder="0 = illimité" min="0">
        </div>
      </div>
      <div class="field">
        <label>Email *</label>
        <input class="inp" id="pe-email" type="email" placeholder="contact@example.com" maxlength="150">
      </div>
      <button class="btn-primary" id="propose-btn" onclick="submitPropose()">Envoyer la proposition</button>
    </div>
    <div class="success-msg" id="propose-success">
      ✅ Proposition envoyée !<br>Elle sera visible après validation par l'équipe CQP.
    </div>
  </div>
</div>

<!-- Comments Drawer -->
<div class="drawer-overlay" id="cmt-overlay" onclick="closeCmt()"></div>
<div class="drawer" id="cmt-drawer">
  <div class="drawer-handle-bar"></div>
  <div class="drawer-head">
    <div class="drawer-head-title" id="cmt-title">Commentaires</div>
    <button class="drawer-close" onclick="closeCmt()">✕</button>
  </div>
  <div class="drawer-body" id="cmt-list"></div>
  <div class="cmt-form">
    <input class="inp" id="cmt-name" placeholder="Votre prénom" maxlength="40" style="margin-bottom:8px">
    <input class="inp" id="cmt-text" placeholder="Votre commentaire…" maxlength="500" style="margin-bottom:8px">
    <button class="btn-send" onclick="sendCmt()">Envoyer</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <a href="index.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Accueil</span>
  </a>
  <a href="actus.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
    <span>Actus</span>
  </a>
  <div class="bnav-fab-wrap">
    <button class="bnav-fab" onclick="openPropose()" aria-label="Proposer">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
  <a href="evenements.html" class="bnav-item active">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Évts</span>
  </a>
  <a href="annonces.html" class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Annonces</span>
  </a>
</nav>

<script>
var SUPA_URL = 'https://vzfwtyczqfbhbjzotjft.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Znd0eWN6cWZiaGJqem90amZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY0OTIsImV4cCI6MjA5MTMyMjQ5Mn0.heto5Qc6WdIjlurllzXhi1PmnRY7_x65Bdof-vKqyGk';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var evts = [];
var likedSet = {};
var cmtTarget = null;
var cdTimers = [];

function getSid() {
  var s = sessionStorage.getItem('cqp_sid');
  if (!s) { s = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2)); sessionStorage.setItem('cqp_sid', s); }
  return s;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(d) {
  var diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return 'à l\'instant';
  if (diff < 3600) return Math.floor(diff/60) + ' min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'j';
}
function countdown(d) {
  var diff = new Date(d) - Date.now();
  if (diff < 0) return 'En cours / terminé';
  var days = Math.floor(diff/86400000);
  var hrs = Math.floor((diff%86400000)/3600000);
  var mins = Math.floor((diff%3600000)/60000);
  if (days > 0) return 'Dans ' + days + 'j ' + hrs + 'h';
  if (hrs > 0) return 'Dans ' + hrs + 'h ' + mins + 'min';
  return 'Dans ' + mins + ' min';
}
function formatDate(d) {
  return new Date(d).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function load() {
  sb.from('evenements').select('*').eq('visible', true).eq('validee', true)
    .gt('date_debut', new Date().toISOString())
    .order('date_debut', {ascending: true}).then(function(res) {
    if (res.error) { document.getElementById('list').innerHTML = '<div class="loading">Erreur de chargement</div>'; return; }
    evts = res.data || [];
    document.getElementById('count-label').textContent = evts.length + ' événement' + (evts.length > 1 ? 's' : '');
    renderList();
    loadCounts();
  });
}

function renderList() {
  cdTimers.forEach(clearInterval);
  cdTimers = [];
  var el = document.getElementById('list');
  if (!evts.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>Aucun événement à venir</p></div>';
    return;
  }
  el.innerHTML = evts.map(function(e) {
    return '<div class="card" id="card-'+e.id+'">' +
      (e.photo_url ? '<img class="card-img" src="'+esc(e.photo_url)+'" loading="lazy">' : '') +
      '<div class="card-body">' +
        '<div class="card-meta">' +
          '<span class="badge">Événement</span>' +
          (e.categorie ? '<span class="badge badge-cat">'+esc(e.categorie)+'</span>' : '') +
          '<span class="card-date">'+formatDate(e.date_debut).split(' à ')[0]+'</span>' +
        '</div>' +
        '<div class="card-title">'+esc(e.titre)+'</div>' +
        '<div class="card-desc">'+esc(e.description||'')+'</div>' +
        '<div class="card-info">' +
          '<div class="card-info-row"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>'+esc(e.lieu||'Lieu à confirmer')+'</div>' +
          (e.places_max > 0 ? '<div class="card-info-row"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'+e.places_max+' places max</div>' : '') +
        '</div>' +
        '<div class="card-countdown" id="cd-'+e.id+'"></div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<button class="btn-act" id="like-'+e.id+'" onclick="toggleLike('+e.id+')">' +
          '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
          '<span id="lc-'+e.id+'">0</span>' +
        '</button>' +
        '<button class="btn-act" onclick="openCmt('+e.id+',\''+esc(e.titre)+'\')">' +
          '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '<span id="cc-'+e.id+'">0</span>' +
        '</button>' +
      '</div>' +
    '</div>';
  }).join('');

  setTimeout(function() {
    document.querySelectorAll('.card').forEach(function(c, i) {
      setTimeout(function(){ c.classList.add('visible'); }, i * 50);
    });
  }, 50);

  evts.forEach(function(e) {
    var el = document.getElementById('cd-'+e.id);
    if (el) el.textContent = countdown(e.date_debut);
    var t = setInterval(function() {
      var cel = document.getElementById('cd-'+e.id);
      if (cel) cel.textContent = countdown(e.date_debut);
    }, 30000);
    cdTimers.push(t);
  });
}

function loadCounts() {
  var ids = evts.map(function(e){ return e.id; });
  if (!ids.length) return;
  var sid = getSid();
  sb.from('likes').select('item_id').eq('item_type','evenement').in('item_id',ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id] = (counts[l.item_id]||0)+1; });
    Object.keys(counts).forEach(function(id){ var el=document.getElementById('lc-'+id); if(el) el.textContent=counts[id]; });
  });
  sb.from('likes').select('item_id').eq('item_type','evenement').eq('session_id',sid).in('item_id',ids).then(function(res) {
    (res.data||[]).forEach(function(l){
      likedSet[l.item_id]=true;
      var btn=document.getElementById('like-'+l.item_id);
      if(btn) btn.classList.add('liked');
    });
  });
  sb.from('commentaires').select('item_id').eq('item_type','evenement').eq('visible',true).in('item_id',ids).then(function(res) {
    var counts = {};
    (res.data||[]).forEach(function(l){ counts[l.item_id]=(counts[l.item_id]||0)+1; });
    Object.keys(counts).forEach(function(id){ var el=document.getElementById('cc-'+id); if(el) el.textContent=counts[id]; });
  });
}

function toggleLike(id) {
  var btn=document.getElementById('like-'+id);
  var cnt=document.getElementById('lc-'+id);
  var sid=getSid();
  if (likedSet[id]) {
    sb.from('likes').delete().eq('item_type','evenement').eq('item_id',id).eq('session_id',sid).then(function(r){
      if(!r.error){likedSet[id]=false;btn.classList.remove('liked');cnt.textContent=Math.max(0,parseInt(cnt.textContent||0)-1);}
    });
  } else {
    sb.from('likes').insert({item_type:'evenement',item_id:id,session_id:sid}).then(function(r){
      if(!r.error){likedSet[id]=true;btn.classList.add('liked');cnt.textContent=parseInt(cnt.textContent||0)+1;}
    });
  }
}

function openCmt(id, titre) {
  cmtTarget = {id: id};
  document.getElementById('cmt-title').textContent = titre;
  document.getElementById('cmt-overlay').classList.add('open');
  document.getElementById('cmt-drawer').classList.add('open');
  var saved=localStorage.getItem('cqp_prenom');
  if(saved) document.getElementById('cmt-name').value=saved;
  loadCmts(id);
}
function closeCmt() {
  document.getElementById('cmt-overlay').classList.remove('open');
  document.getElementById('cmt-drawer').classList.remove('open');
  cmtTarget=null;
}
function loadCmts(id) {
  sb.from('commentaires').select('*').eq('item_type','evenement').eq('item_id',id).eq('visible',true).order('created_at',{ascending:true}).then(function(res) {
    var el=document.getElementById('cmt-list');
    if(!res.data||!res.data.length){el.innerHTML='<div style="padding:16px;font-family:\'Barlow Condensed\',sans-serif;font-size:.85rem;color:var(--muted)">Aucun commentaire</div>';return;}
    el.innerHTML=res.data.map(function(c){return '<div class="cmt-item"><div class="cmt-name">'+esc(c.prenom)+'</div><div class="cmt-msg">'+esc(c.message)+'</div><div class="cmt-time">'+timeAgo(c.created_at)+'</div></div>';}).join('');
  });
}
function sendCmt() {
  if(!cmtTarget) return;
  var name=document.getElementById('cmt-name').value.trim();
  var text=document.getElementById('cmt-text').value.trim();
  if(!name||!text){toast('Prénom et commentaire requis');return;}
  localStorage.setItem('cqp_prenom',name);
  sb.from('commentaires').insert({item_type:'evenement',item_id:cmtTarget.id,prenom:name,message:text,visible:true}).then(function(r){
    if(r.error){toast('Erreur: '+r.error.message);return;}
    document.getElementById('cmt-text').value='';
    toast('Commentaire publié ✓');
    loadCmts(cmtTarget.id);
    var el=document.getElementById('cc-'+cmtTarget.id);
    if(el) el.textContent=parseInt(el.textContent||0)+1;
  });
}

function openPropose() {
  document.getElementById('propose-modal').classList.add('open');
  document.getElementById('propose-form').style.display='block';
  document.getElementById('propose-success').style.display='none';
  document.getElementById('propose-btn').disabled=false;
  var saved=localStorage.getItem('cqp_prenom');
  if(saved) document.getElementById('pe-prenom').value=saved;
}
function closePropose() {
  document.getElementById('propose-modal').classList.remove('open');
}
function submitPropose() {
  var titre=document.getElementById('pe-titre').value.trim();
  var date=document.getElementById('pe-date').value;
  var heure=document.getElementById('pe-heure').value;
  var lieu=document.getElementById('pe-lieu').value.trim();
  var prenom=document.getElementById('pe-prenom').value.trim();
  var email=document.getElementById('pe-email').value.trim();
  if(!titre||!date||!heure||!lieu||!prenom||!email){toast('Champs obligatoires manquants');return;}
  if(!/\S+@\S+\.\S+/.test(email)){toast('Email invalide');return;}
  var btn=document.getElementById('propose-btn');
  btn.disabled=true;
  btn.textContent='Envoi…';
  localStorage.setItem('cqp_prenom',prenom);
  var dateDebut=date+'T'+heure+':00';
  var places=parseInt(document.getElementById('pe-places').value)||0;
  sb.from('evenements').insert({
    titre:titre,
    description:document.getElementById('pe-desc').value.trim(),
    lieu:lieu,
    categorie:document.getElementById('pe-cat').value||null,
    date_debut:dateDebut,
    places_max:places,
    visible:false,
    validee:false,
    propose_par:prenom + ' (' + email + ')'
  }).then(function(r){
    if(r.error){toast('Erreur: '+r.error.message);btn.disabled=false;btn.textContent='Envoyer la proposition';return;}
    document.getElementById('propose-form').style.display='none';
    document.getElementById('propose-success').style.display='block';
  });
}

// Auto-open form if hash
if(window.location.hash==='#proposer') openPropose();
load();
(function(){ var k='pv_'+location.pathname; if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');sb.from('page_views').insert({session_id:getSid(),page:location.pathname});} })();
</script>
</body>
